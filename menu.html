<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สั่งอาหาร | FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-emerald-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold">เมนูอาหาร 🍽️</h1>
            <div id="tableDisplay" class="bg-emerald-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                โต๊ะ: กำลังโหลด...
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-40 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-emerald-500 mb-4"></div>
        <p class="text-emerald-700 font-bold text-base">กำลังจัดเตรียมเมนูอาหาร...</p>
    </div>

    <div class="bg-white border-b border-gray-200 sticky top-14 z-40">
        <div id="categoryContainer" class="flex overflow-x-auto hide-scroll p-3 gap-2"></div>
    </div>

    <div class="p-4">
        <div id="productGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="bottomCartBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] transition-transform duration-300 transform translate-y-full z-50">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div class="flex flex-col">
                <span class="text-sm text-gray-500 font-bold">ตะกร้าของคุณ</span>
                <span class="text-xl font-bold text-emerald-600"><span id="cartCount">0</span> รายการ</span>
            </div>
            <button onclick="openCartModal()" class="bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold hover:bg-emerald-600 transition shadow-lg flex items-center gap-2">
                ดูตะกร้า / สั่งอาหาร ➔
            </button>
        </div>
    </div>

    <div id="cartModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center sm:items-center">
        <div class="bg-white w-full sm:max-w-lg sm:rounded-3xl rounded-t-3xl h-[85vh] sm:h-[80vh] flex flex-col shadow-2xl">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">🛒 ยืนยันคำสั่งซื้อ</h2>
                <button onclick="closeCartModal()" class="text-gray-400 hover:text-red-500 text-3xl font-bold">&times;</button>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-5 space-y-3 bg-gray-50"></div>
            <div class="p-5 bg-white border-t border-gray-100 rounded-b-3xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-lg font-bold text-gray-600">ยอดรวมทั้งสิ้น</span>
                    <span id="cartTotal" class="text-3xl font-black text-emerald-600">฿0.00</span>
                </div>
                <button id="btnSubmitOrder" onclick="submitOrder()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-xl hover:bg-emerald-600 transition shadow-xl">
                    ส่งออเดอร์เข้าครัว 🔥
                </button>
            </div>
        </div>
    </div>

    <div id="customAlertModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm shadow-2xl flex flex-col items-center text-center transform scale-95 transition-transform duration-300" id="customAlertBox">
            <div id="customAlertIcon" class="text-6xl mb-4 drop-shadow-md">🔔</div>
            <h3 id="customAlertTitle" class="text-xl font-black text-gray-800 mb-2">แจ้งเตือน</h3>
            <p id="customAlertMessage" class="text-gray-500 mb-6 font-medium leading-relaxed">ข้อความ...</p>
            <button onclick="closeCustomAlert()" id="customAlertBtn" class="w-full bg-emerald-500 text-white py-3.5 rounded-xl font-bold text-lg hover:bg-emerald-600 transition shadow-lg active:scale-95">ตกลง</button>
        </div>
    </div>

    <script>
        // 🚨 ระบบดักจับ Error อัจฉริยะ (ถ้าโค้ดช็อตตรงไหน จะแจ้งบอกบนจดทันที ไม่ปล่อยให้ขาวค้าง)
        window.onerror = function(msg, url, line) {
            alert("❌ ระบบตรวจพบ Error: " + msg + " (บรรทัดที่ " + line + ")");
            return false;
        };

        // ลิงก์ API หลังบ้านของคุณเฟรม
        const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec"; 
        
        let allProducts = [];
        let cart = [];
        let currentTable = "ไม่ระบุ";

        // ฟังก์ชันเปิดแจ้งเตือนแบบสวย
        function showAlert(title, message, icon = '🔔', type = 'info') {
            document.getElementById('customAlertIcon').innerText = icon;
            document.getElementById('customAlertTitle').innerText = title;
            document.getElementById('customAlertMessage').innerText = message;
            
            let btn = document.getElementById('customAlertBtn');
            btn.className = type === 'error' 
                ? "w-full bg-rose-500 text-white py-3.5 rounded-2xl font-bold text-lg hover:bg-rose-600 transition shadow-lg active:scale-95"
                : "w-full bg-emerald-500 text-white py-3.5 rounded-2xl font-bold text-lg hover:bg-emerald-600 transition shadow-lg active:scale-95";

            let modal = document.getElementById('customAlertModal');
            let box = document.getElementById('customAlertBox');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            }, 10);
        }

        function closeCustomAlert() {
            let modal = document.getElementById('customAlertModal');
            let box = document.getElementById('customAlertBox');
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // ดึงเมนูจากระบบ POS หลัก
        function fetchMenuData() {
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getProducts" }), 
                redirect: "follow"
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loadingOverlay').classList.add('hidden');
                if(data.status === "Success") {
                    processRawProducts(data.result);
                } else {
                    showAlert("ข้อผิดพลาดหลังบ้าน", "ดึงเมนูไม่ได้: " + data.message, "❌", "error");
                }
            })
            .catch(err => {
                document.getElementById('loadingOverlay').classList.add('hidden');
                showAlert("การเชื่อมต่อล้มเหลว", "ไม่สามารถติดต่อฐานข้อมูลได้ โปรดลองอีกครั้ง", "❌", "error");
            });
        }

        function fetchMenuDataSilent() {
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getProducts" }),
                redirect: "follow"
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "Success") {
                    processRawProducts(data.result, true); 
                }
            })
            .catch(e => console.log("Silent Sync Waiting..."));
        }

        function processRawProducts(rawArray, isSilent = false) {
            if (!rawArray || !Array.isArray(rawArray)) return;
            
            let tempProducts = [];
            for (let i = 0; i < rawArray.length; i++) {
                let p = rawArray[i];
                if (!p || !p[1] || p[1].toString().trim() === "" || p[1] === "ชื่อสินค้า") continue;
                
                let stock = p[6];
                if (stock === "" || stock === undefined || parseFloat(stock) > 0) {
                    let finalPrice = parseFloat(p[3]) || 0;
                    tempProducts.push({
                        name: p[1].toString(),
                        category: (p[2] || "ทั่วไป").toString().trim(),
                        price: finalPrice,
                        image: (p[8] || "").toString().trim()
                    });
                }
            }
            
            if (isSilent) {
                if (JSON.stringify(allProducts) !== JSON.stringify(tempProducts)) {
                    allProducts = tempProducts;
                    let activeBtn = document.querySelector('.cat-btn.bg-emerald-50');
                    let currentCat = activeBtn ? activeBtn.getAttribute('data-cat') : "ทั้งหมด";
                    renderCategories();
                    filterCategory(currentCat);
                }
            } else {
                allProducts = tempProducts;
                renderCategories();
                renderProducts("ทั้งหมด");
            }
        }

        function renderCategories() {
            let cats = ["ทั้งหมด"];
            allProducts.forEach(p => { if(p.category && !cats.includes(p.category)) cats.push(p.category); });
            
            let html = '';
            cats.forEach(c => {
                let safeCat = c.replace(/'/g, "\\'");
                let btnStyle = (c === 'ทั้งหมด') 
                    ? "cat-btn shrink-0 px-4 py-2 rounded-xl font-bold text-sm border-2 transition bg-emerald-50 border-emerald-500 text-emerald-700"
                    : "cat-btn shrink-0 px-4 py-2 rounded-xl font-bold text-sm border-2 transition bg-white border-gray-200 text-gray-500";
                html += '<button onclick="filterCategory(\'' + safeCat + '\')" data-cat="' + safeCat + '" class="' + btnStyle + '">' + c + '</button>';
            });
            document.getElementById('categoryContainer').innerHTML = html;
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.getAttribute('data-cat') === cat) {
                    btn.className = "cat-btn shrink-0 px-4 py-2 rounded-xl font-bold text-sm border-2 transition bg-emerald-50 border-emerald-500 text-emerald-700";
                } else {
                    btn.className = "cat-btn shrink-0 px-4 py-2 rounded-xl font-bold text-sm border-2 transition bg-white border-gray-200 text-gray-500";
                }
            });
            renderProducts(cat);
        }

        function renderProducts(category) {
            let container = document.getElementById('productGrid');
            let filtered = category === "ทั้งหมด" ? allProducts : allProducts.filter(p => p.category === category);
            
            if(filtered.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center py-10 text-gray-400 font-bold">ไม่พบเมนูอาหารในหมวดหมู่นี้ 📭</div>';
                return;
            }

            let html = '';
            filtered.forEach(p => {
                let safeName = p.name.replace(/'/g, "\\'");
                let imgHtml = '';
                
                if (p.image && p.image !== "") {
                    imgHtml = '<img src="' + p.image + '" class="w-full h-32 object-cover rounded-xl mb-2" onerror="this.onerror=null; this.src=\'https://i.postimg.cc/tTdwcG69/83fe4691-1f1a-45ee-8e1c-5e24882dd667.png\';">';
                } else {
                    imgHtml = '<div class="w-full h-32 bg-emerald-50 rounded-xl flex items-center justify-center text-3xl mb-2 border border-emerald-100">🍽️</div>';
                }
                
                html += `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full relative">
                    ${imgHtml}
                    <h3 class="font-bold text-sm text-gray-800 line-clamp-2 leading-tight">${p.name}</h3>
                    <div class="mt-auto pt-3 flex justify-between items-end">
                        <span class="text-emerald-600 font-bold">฿${p.price.toFixed(2)}</span>
                        <button onclick="addToCart('${safeName}', ${p.price})" class="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center font-bold shadow-md hover:bg-emerald-600 transition active:scale-95">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function addToCart(name, price) {
            let existing = cart.find(item => item.name === name);
            if(existing) existing.qty++;
            else cart.push({ name: name, price: price, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').innerText = count;
            
            let bar = document.getElementById('bottomCartBar');
            if(count > 0) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');
            
            renderCartModal();
        }

        function renderCartModal() {
            let container = document.getElementById('cartItemsContainer');
            let total = 0;
            let html = '';
            
            if(cart.length === 0) {
                html = '<div class="text-center py-10 text-gray-400 font-bold">ยังไม่มีสินค้าในตะกร้า</div>';
            } else {
                cart.forEach((item, index) => {
                    let lineTotal = item.price * item.qty;
                    total += lineTotal;
                    html += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-gray-800 text-sm leading-tight">${item.name}</h4>
                            <div class="text-emerald-600 font-bold text-xs mt-1">฿${item.price.toFixed(2)} / รายการ</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="adjustQty(${index}, -1)" class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition">-</button>
                            <span class="font-bold w-4 text-center">${item.qty}</span>
                            <button onclick="adjustQty(${index}, 1)" class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 font-bold hover:bg-emerald-200 transition">+</button>
                        </div>
                    </div>`;
                });
            }
            container.innerHTML = html;
            document.getElementById('cartTotal').innerText = `฿${total.toFixed(2)}`;
        }

        function adjustQty(index, change) {
            cart[index].qty += change;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function openCartModal() { document.getElementById('cartModal').classList.remove('hidden'); }
        function closeCartModal() { document.getElementById('cartModal').classList.add('hidden'); }

        function submitOrder() {
            if(cart.length === 0) return showAlert("ตะกร้าว่างเปล่า", "กรุณาเลือกเมนูอาหารที่ต้องการก่อนกดสั่งซื้อนะครับ", "🛒", "error");
            if(currentTable === "ไม่ระบุ") return showAlert("เกิดข้อผิดพลาด", "ไม่สามารถส่งออเดอร์ได้ เนื่องจากระบบไม่ทราบหมายเลขโต๊ะ", "❌", "error");
            
            let btn = document.getElementById('btnSubmitOrder');
            btn.disabled = true;
            btn.innerHTML = "กำลังส่งออเดอร์... ⏳";
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let orderPayload = { table: currentTable, items: cart, total: total };

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "submitCustomerOrder", args: [orderPayload] }),
                redirect: "follow"
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "Success" && data.result === "Success") {
                    showAlert("ส่งออเดอร์สำเร็จ!", "รายการอาหารของคุณถูกส่งเข้าครัวเรียบร้อยแล้ว นั่งรอรับความอร่อยได้เลยครับ", "✅", "success");
                    cart = [];
                    updateCartUI();
                    closeCartModal();
                } else {
                    showAlert("เกิดข้อผิดพลาด", "ระบบส่งออเดอร์ไม่ได้: " + (data.message || data.result), "❌", "error");
                }
                btn.disabled = false;
                btn.innerHTML = "ส่งออเดอร์เข้าครัว 🔥";
            })
            .catch(err => {
                showAlert("เกิดข้อผิดพลาด", "การเชื่อมต่อล้มเหลว: " + err, "❌", "error");
                btn.disabled = false;
                btn.innerHTML = "ส่งออเดอร์เข้าครัว 🔥";
            });
        }

        // 🧠 ฟังก์ชันเริ่มต้นทำงานแบบยิงตรง (เปิดปุ๊บรันปั๊บ ไม่พึ่งจังหวะเวลาเบราว์เซอร์)
        function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('table')) {
                currentTable = urlParams.get('table').trim();
                document.getElementById('tableDisplay').innerText = "โต๊ะ: " + currentTable;
                fetchMenuData(); // ดึงเมนูสินค้า
            } else {
                // 🛑 กรณีเปิดตรงๆ ไม่ผ่านการสแกน QR
                document.getElementById('tableDisplay').innerText = "โปรดสแกน QR ใหม่";
                document.getElementById('loadingOverlay').classList.add('hidden'); // ปิดหน้าต่างโหลด
                showAlert("ไม่พบหมายเลขโต๊ะ", "กรุณาสแกน QR Code ที่ตั้งอยู่บนโต๊ะ เพื่อดูเมนูและสั่งอาหารนะครับ", "⚠️", "error");
            }
        }

        // สั่งทำงานทันทีตรงนี้เลย
        initPage();
        setInterval(fetchMenuDataSilent, 5000); 
    </script>
</body>
</html>
