<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamePOS Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  <link rel="icon" type="image/png" href="https://i.postimg.cc/258bYngX/448351cf-d806-4d25-99ce-c92dd34de621.png" sizes="192x192">

<link rel="apple-touch-icon" href="https://i.postimg.cc/258bYngX/448351cf-d806-4d25-99ce-c92dd34de621.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="KDS FamePOS">

<meta name="mobile-web-app-capable" content="yes">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
    /* 🎨 ปรับโทนสีหลักให้แมตช์ตรงตามไฟล์ระบบหลัก index18.txt */
    body { font-family: 'Kanit', sans-serif; background-color: #fdecec; color: #4e0606; margin: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fdecec; }
    ::-webkit-scrollbar-thumb { background: #fad1d1; border-radius: 10px; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <header class="bg-white border-b border-rose-100 p-4 flex justify-between items-center shrink-0 shadow-sm">
    <div class="flex items-center gap-3">
      <span class="text-3xl">👨‍🍳</span>
      <div>
        <h1 class="text-xl font-bold text-rose-800 tracking-wide">FamePOS จอห้องครัว</h1>
        <p class="text-xs text-rose-500/80">ระบบอัปเดตคิวและรายการอาหารอัตโนมัติ Real-time</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <div id="clockTime" class="text-xl font-black text-rose-600 tracking-wider">00:00:00</div>
        <div id="orderCount" class="text-xs text-rose-700/60 font-semibold">กำลังเชื่อมโยงคิว...</div>
      </div>
      <button onclick="fetchKitchenOrders()" class="bg-rose-50 hover:bg-rose-100 border border-rose-200 px-4 py-2 rounded-xl text-sm font-bold text-rose-700 transition flex items-center gap-1.5 shadow-sm active:scale-95 transform">
        🔄 รีเฟรชคิวอาหาร
      </button>
    </div>
  </header>

  <main id="kitchenGrid" class="flex-1 p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 overflow-y-auto content-start">
    <div class="col-span-full h-96 flex flex-col items-center justify-center text-rose-400 font-bold gap-3">
      <span class="text-5xl animate-spin">⏳</span>
      <span class="text-lg">กำลังดึงคิวใบสั่งอาหารจากระบบหลังบ้าน...</span>
    </div>
  </main>

  <script>
    // 🔗 ลิงก์ยิง API ตรงเข้า Google Apps Script หลังบ้านของคุณเฟรม
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

    // ================= MAGIC PROXY (V2) CONNECT =================
    const google = {
        script: {
            get run() {
                let successCb = null; let failureCb = null;
                const proxy = new Proxy({}, {
                    get: function(target, prop) {
                        if (prop === 'withSuccessHandler') { return function(cb) { successCb = cb; return proxy; }; }
                        if (prop === 'withFailureHandler') { return function(cb) { failureCb = cb; return proxy; }; }
                        return function(...args) {
                            fetch(API_URL, {
                                method: "POST",
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify({ action: prop, args: args }),
                                redirect: "follow"
                            })
                            .then(res => res.json())
                            .then(data => {
                                if(data.status === "Success" && successCb) successCb(data.result);
                                else if (data.status !== "Success" && failureCb) failureCb(data.message);
                            })
                            .catch(err => { if(failureCb) failureCb(err); else console.error("Fetch Error:", err); });
                        };
                    }
                });
                return proxy;
            }
        }
    };

    let activeOrdersList = [];
    let previousOrdersCount = 0;
    let lastRenderedIds = "";

    // ระบบแจ้งเตือนเสียง (Beep อัจฉริยะเมื่อมีออเดอร์ใหม่สแกนหรือพักบิลเข้าครัว)
    function playAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // คีย์เสียงใส สบายหู
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } catch(e) { console.log("Audio feedback blocked by screen styling rules."); }
    }

    // ฟังก์ชันยิงอ่านค่าข้อมูลคิวอาหาร
function fetchKitchenOrders() {
    google.script.run
      .withSuccessHandler(function(orders) {
        // เช็คว่ามีรายการเปลี่ยนไปจากเดิมไหม?
        let currentIds = orders.map(o => o.orderId).join(',');
        
        // ถ้าข้อมูลเหมือนเดิมเป๊ะ ไม่ต้องทำอะไรเลย (ป้องกันการกระพริบ)
        if (currentIds === lastRenderedIds && orders.length > 0) return;
        
        lastRenderedIds = currentIds;
        activeOrdersList = orders;
        
        document.getElementById('orderCount').innerText = `คิวค้างในครัว: ${orders.length} ออเดอร์`;
        
        if (orders.length > previousOrdersCount && previousOrdersCount !== 0) {
          playAlertSound();
        }
        previousOrdersCount = orders.length;
        
        // วาดใหม่เฉพาะเมื่อมีข้อมูลอัปเดตจริงเท่านั้น
        renderKitchenCards();
      })
      .getKitchenOrdersGS();
  }

// ============================================
// ฟังก์ชันเจนหัวข้อและพ่นการ์ดรายการอาหาร (เวอร์ชันสมบูรณ์)
// ============================================
function renderKitchenCards() {
    const grid = document.getElementById('kitchenGrid');

    // 1. เช็คกรณีว่าง
    if (activeOrdersList.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full h-96 flex flex-col items-center justify-center text-rose-300 font-bold gap-2">
                <span class="text-6xl">🎉</span>
                <span class="text-xl text-rose-700">ห้องครัวว่าง! ไม่มีออเดอร์ค้างแล้วค่ะคุณเฟรม</span>
            </div>`;
        return;
    }

    // 2. ใช้ DocumentFragment เพื่อสร้าง DOM เก็บไว้ก่อน แล้วค่อยนำไปแปะที่ grid
    const fragment = document.createDocumentFragment();

    activeOrdersList.forEach(order => {
        const itemsArray = order.items.split(', ');
        let itemsHtml = '';

        itemsArray.forEach((itemStr, index) => {
            let baseName = itemStr;
            let optionsText = "";
            let qty = "1";

            let qtyMatch = itemStr.match(/\(x(\d+)\)/);
            if (qtyMatch) {
                qty = qtyMatch[1];
                baseName = baseName.replace(/\s*\(x\d+\)/, '');
            }

            let optMatch = baseName.match(/\[(.*?)\]/);
            if (optMatch) {
                optionsText = optMatch[1];
                baseName = baseName.replace(/\s*\[.*?\]/, '');
            }

            // 🟢 ระบบติ๊กรายการ (ใช้ orderId + index เพื่อระบุตัวตนเมนู)
            let itemId = `item-${order.orderId}-${index}`;
            let isChecked = localStorage.getItem(itemId) === 'true';

            itemsHtml += `
                <div class="py-2.5 border-b border-rose-50 flex justify-between items-center gap-2 group">
                    <div class="flex items-center gap-3 min-w-0 flex-1">
                        <input type="checkbox" id="${itemId}" ${isChecked ? 'checked' : ''} 
                            onchange="localStorage.setItem('${itemId}', this.checked)"
                            class="w-5 h-5 accent-rose-500 cursor-pointer">
                        <label for="${itemId}" class="flex-1 cursor-pointer">
                            <div class="font-bold text-base text-gray-800 leading-tight has-[:checked]:line-through has-[:checked]:text-gray-400 transition-all">${baseName}</div>
                            ${optionsText ? `
                                <div class="text-xs font-bold text-rose-600 mt-1 bg-rose-50/60 px-2 py-0.5 rounded-md inline-block border border-rose-100 has-[:checked]:opacity-50">
                                    🌿 ${optionsText}
                                </div>` : ''}
                        </label>
                    </div>
                    <div class="text-xl font-black text-rose-700 bg-rose-50 px-2.5 py-0.5 rounded-xl border border-rose-100 shrink-0 has-[:checked]:text-gray-300">
                        x${qty}
                    </div>
                </div>`;
        });

        let minutesElapsed = Math.floor((Date.now() - order.timestamp) / 60000);
        if (minutesElapsed < 0) minutesElapsed = 0;

        let cardColorStyles = "border-rose-200/80 bg-white";
        let timerColor = "text-gray-400";
        if (minutesElapsed >= 10) { cardColorStyles = "border-red-300 bg-red-50/40 ring-2 ring-red-200"; timerColor = "text-red-500 font-bold"; } 
        else if (minutesElapsed >= 5) { cardColorStyles = "border-amber-300 bg-amber-50/30"; timerColor = "text-amber-500 font-bold"; }

        let typeBadge = `🛎️ ${order.orderType}`;
        let badgeColor = "bg-gray-100 text-gray-600 border border-gray-200";
        if (order.orderType && order.orderType.includes("ร้าน")) { typeBadge = `🪑 โต๊ะ: ${order.tableNo || '-'}`; badgeColor = "bg-rose-50 text-rose-700 border border-rose-200"; }
        else if (order.orderType && order.orderType.includes("บ้าน")) { typeBadge = `🛍️ กลับบ้าน`; badgeColor = "bg-emerald-50 text-emerald-700 border border-emerald-200"; }
        else if (order.orderType && order.orderType.includes("เดลิ")) { typeBadge = `🛵 ${order.deliveryApp || ''} ${order.deliveryId ? '#' + order.deliveryId : ''}`; badgeColor = "bg-purple-50 text-purple-700 border border-purple-200"; }

        // สร้าง Element
        let div = document.createElement('div');
        div.innerHTML = `
            <div class="rounded-[2rem] border-2 flex flex-col justify-between shadow-sm h-[420px] transition-transform hover:scale-[1.02] duration-200 ${cardColorStyles}">
                <div class="p-5 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-start gap-2 mb-3 shrink-0 border-b border-rose-50 pb-2">
                        <div>
                            <span class="text-2xl font-black text-rose-800 leading-none">${order.queueNo}</span>
                            <div class="text-[9px] text-gray-400 font-medium mt-0.5 font-mono">ID: ${order.orderId}</div>
                        </div>
                        <div class="text-right shrink-0">
                            <span class="text-xs px-2.5 py-1 rounded-xl font-bold ${badgeColor}">${typeBadge}</span>
                            <div class="text-xs font-semibold mt-2 ${timerColor}">⏳ รอแล้ว ${minutesElapsed} นาที</div>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-1 mt-1 pr-1">
                        ${itemsHtml}
                    </div>
                </div>
                <div class="p-4 bg-rose-50/20 border-t border-rose-100/60 shrink-0 rounded-b-[2rem]">
                    <button onclick="serveOrder(${order.rowIdx}, '${order.queueNo}', '${order.source}')" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-4 rounded-xl text-base shadow-md transition active:scale-95 transform shadow-rose-500/10">
                        ✔️ เสิร์ฟอาหารสำเร็จ
                    </button>
                </div>
            </div>`;
        fragment.appendChild(div.firstElementChild);
    });

    // 3. อัปเดต grid ครั้งเดียวตอนจบ (หน้าจอจะไม่กระพริบ)
    grid.innerHTML = '';
    grid.appendChild(fragment);
}
// ฟังก์ชันคุมปุ่มเสิร์ฟอาหาร (ดีไซน์ใหม่)
function serveOrder(rowIdx, queueNo, source = "Sales") {
  Swal.fire({
    title: `เสิร์ฟคิว ${queueNo}?`,
    text: "ยืนยันทำรายการอาหารคิวนี้เสร็จสิ้นแล้ว",
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'ยืนยัน',
    cancelButtonText: 'ยกเลิก',
    buttonsStyling: false,
    customClass: {
      popup: 'rounded-[2.5rem] p-8 max-w-sm bg-white shadow-2xl border border-pink-100 text-center font-bold animate-fade-in',
      icon: 'mx-auto mb-2 text-pink-500 scale-110', // ไอคอนสีชมพู
      title: 'text-2xl font-bold text-gray-800 mt-3 block',
      htmlContainer: 'text-sm text-gray-500 font-medium my-2 leading-relaxed',
      actions: 'flex gap-3 w-full mt-4 justify-center items-center',
      cancelButton: 'flex-1 py-3.5 px-4 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 active:scale-95 transition-all text-sm',
      confirmButton: 'flex-1 py-3.5 px-4 bg-pink-600 text-white font-bold rounded-2xl shadow-md hover:bg-pink-700 active:scale-95 transition-all text-sm'
    }
  }).then((result) => {
    if (result.isConfirmed) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res === "Success") {
            // ล้างค่าติ๊กใน LocalStorage ของออเดอร์นั้นๆ
            Object.keys(localStorage).forEach(key => {
               if(key.includes(`item-${queueNo}`)) {
                   localStorage.removeItem(key);
               }
            });
            showToast(`เคลียร์คิว ${queueNo} เรียบร้อยแล้ว`, "success");
            fetchKitchenOrders();
          } else {
            Swal.fire('ผิดพลาด', res, 'error');
          }
        })
        .completeKitchenOrderGS(rowIdx, source);
    }
  });
}

function showToast(message, type = "success") {
  Swal.fire({
    toast: true,
    position: "top-end",
    icon: type,
    title: message,
    showConfirmButton: false,
    timer: 2000
  });
}

// =========================
// นาฬิกา Real-Time
// =========================
function updateClock() {
  const clock = document.getElementById('clockTime');

  if (!clock) return;

  clock.innerText = new Date().toLocaleTimeString(
    'th-TH',
    {
      hour12: false,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    }
  );
}

updateClock();
setInterval(updateClock, 1000);

function toggleItemStatus(id) {
    let checkbox = document.getElementById(id);
    localStorage.setItem(id, checkbox.checked); // บันทึกลงใน Browser เลย
}

// =========================
// โหลดคิวครัวอัตโนมัติ
// =========================
fetchKitchenOrders();
setInterval(fetchKitchenOrders, 3000);

  </script>
</body>
</html>
