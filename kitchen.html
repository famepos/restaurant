<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamePOS Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KDS FamePOS">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
   body { font-family: 'Kanit', sans-serif; background-color: var(--bg-app); color: #4e0606; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fdecec; }
    ::-webkit-scrollbar-thumb { background: #fad1d1; border-radius: 10px; }

    .item-done {
        text-decoration: line-through;
        opacity: 0.5;
        background-color: #fff1f2;
    }
    /* 🎨 ปรับโทนสี FamePOS Kitchen ให้เป็นอันหนึ่งอันเดียวกัน */
:root {
    --primary: #db2777; /* ชมพูเข้ม FamePOS */
    --bg-app: #fdecec;  /* พื้นหลังชมพูอ่อน */
    --border-app: #fad1d1;
}


/* ปุ่มสถานะตามสีแอป */
.btn-new { background-color: #f43f5e; color: white; }      /* แดงชมพู (ออเดอร์ใหม่) */
.btn-cooking { background-color: #d97706; color: white; }  /* ส้มทอง (กำลังทำ) */
.btn-done { background-color: #059669; color: white; }     /* เขียว (เสร็จแล้ว) */

.filter-tab {
    transition: all 0.2s;
}
.filter-tab.active-tab {
    border: 3px solid #db2777 !important; /* สีชมพู FamePOS */
}

  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
  
  <div id="toastContainer" class="fixed top-5 right-5 z-[10000] flex flex-col gap-3 pointer-events-none w-80"></div>

  <!-- ส่วน Header -->
  <header class="bg-white border-b border-pink-100 p-4 flex justify-between items-center shrink-0 shadow-sm z-10">
    <div class="flex items-center gap-3">
      <img src="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png" alt="Kitchen Logo" class="w-12 h-12 object-contain drop-shadow-sm">
      <div>
        <h1 class="text-xl font-bold text-pink-800 tracking-wide">FamePOS จอห้องครัว</h1>
        <p class="text-xs text-pink-500/80">ระบบอัปเดตคิวและรายการอาหารอัตโนมัติ Real-time</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <div id="clockTime" class="text-xl font-black text-pink-600 tracking-wider">00:00:00</div>
      </div>
      <button onclick="fetchKitchenOrders()" class="bg-pink-50 hover:bg-pink-100 border border-pink-200 px-4 py-2 rounded-xl text-sm font-bold text-pink-700 transition flex items-center gap-1.5 shadow-sm active:scale-95 transform">
        🔄 รีเฟรชคิวอาหาร
      </button>
    </div>
  </header>

<!-- แถบสรุปสถานะออเดอร์ (เพิ่ม onclick เพื่อกดกรองสถานะ) -->
<div class="bg-white border-b border-pink-100 px-6 py-3 shrink-0 flex justify-between items-center shadow-sm">
    <div class="flex gap-4 w-full">
        <div id="tab-Pending" onclick="setFilter('Pending')" class="filter-tab flex-1 bg-red-50 border-2 border-red-100 rounded-xl p-2 text-center shadow-sm cursor-pointer hover:bg-red-100 transition">
            <div class="text-xs font-bold text-red-400">ออเดอร์ใหม่</div>
            <div id="countNew" class="text-2xl font-black text-red-600">0</div>
        </div>
        <div id="tab-รับออเดอร์แล้ว" onclick="setFilter('รับออเดอร์แล้ว')" class="filter-tab flex-1 bg-amber-50 border-2 border-amber-100 rounded-xl p-2 text-center shadow-sm cursor-pointer hover:bg-amber-100 transition">
            <div class="text-xs font-bold text-amber-500">รับออเดอร์แล้ว</div>
            <div id="countAccepted" class="text-2xl font-black text-amber-600">0</div>
        </div>
      <!-- ปรับกล่อง กำลังทำ ให้เป็นสีม่วงพาสเทล -->
<div id="tab-กำลังทำ" onclick="setFilter('กำลังทำ')" class="filter-tab flex-1 bg-purple-50 border-2 border-purple-100 rounded-xl p-2 text-center shadow-sm cursor-pointer hover:bg-purple-100 transition">
    <div class="text-xs font-bold text-purple-500">กำลังทำ</div>
    <div id="countCooking" class="text-2xl font-black text-purple-600">0</div>
</div>
        <div id="tab-All" onclick="setFilter('All')" class="filter-tab flex-1 bg-emerald-50 border-2 border-emerald-400 rounded-xl p-2 text-center shadow-sm cursor-pointer hover:bg-emerald-100 transition">
            <div class="text-xs font-bold text-emerald-500">รวมทั้งหมด</div>
            <div id="countTotal" class="text-2xl font-black text-emerald-700">0</div>
        </div>
    </div>
</div>

  <main id="kitchenGrid" class="flex-1 p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 overflow-y-auto content-start">
    <div class="col-span-full h-96 flex flex-col items-center justify-center text-pink-400 font-bold gap-3">
      <span class="text-5xl animate-spin">⏳</span>
      <span class="text-lg">กำลังดึงคิวใบสั่งอาหารจากระบบหลังบ้าน...</span>
    </div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";

    const google = {
        script: {
            get run() {
                let successCb = null; let failureCb = null;
                const proxy = new Proxy({}, {
                    get: function(target, prop) {
                        if (prop === 'withSuccessHandler') { return function(cb) { successCb = cb; return proxy; }; }
                        if (prop === 'withFailureHandler') { return function(cb) { failureCb = cb; return proxy; }; }
                        return function(...args) {
                            fetch(API_URL, {
                                method: "POST",
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify({ action: prop, args: args }),
                                redirect: "follow"
                            })
                            .then(res => res.json())
                            .then(data => {
                                if(data.status === "Success" && successCb) successCb(data.result);
                                else if (data.status !== "Success" && failureCb) failureCb(data.message);
                            })
                            .catch(err => { if(failureCb) failureCb(err); else console.error("Fetch Error:", err); });
                        };
                    }
                });
                return proxy;
            }
        }
    };

    let activeOrdersList = [];
    let previousNewCount = 0; // เปลี่ยนมาจับเฉพาะออเดอร์ "ใหม่" สำหรับเสียงแจ้งเตือน

    function playAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } catch(e) { console.log("Audio feedback blocked"); }
    }

    function fetchKitchenOrders() {
      google.script.run
        .withSuccessHandler(function(orders) {
          // กรองออเดอร์เฉพาะของ "วันนี้" (00.00 - 23.59)
          let now = new Date();
          let startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).getTime();
          let endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).getTime();

          activeOrdersList = orders.filter(o => o.timestamp >= startOfDay && o.timestamp <= endOfDay);
          
          updateSummaryCounts();
          renderKitchenCards();
        })
        .withFailureHandler(function(err) {
          console.error("Kitchen Fetch Error:", err);
          document.getElementById('kitchenGrid').innerHTML = `
            <div class="col-span-full h-96 flex flex-col items-center justify-center text-red-500 font-bold gap-2 text-center">
              <span class="text-5xl">❌</span>
              <span class="text-lg">ระบบการเชื่อมต่อคลาวด์ขัดข้อง:<br>
                <span class="text-xs text-pink-800 font-mono bg-white px-3 py-2 rounded-xl border border-pink-200 mt-2 inline-block shadow-sm">${err}</span>
              </span>
            </div>`;
        })
        .getKitchenOrdersGS();
    }

    function updateSummaryCounts() {
        let countNew = 0, countAccepted = 0, countCooking = 0;
        
        activeOrdersList.forEach(o => {
            let status = o.status || "Pending";
            if (status === "Pending") countNew++;
            else if (status === "รับออเดอร์แล้ว") countAccepted++;
            else if (status === "กำลังทำ") countCooking++;
        });

        document.getElementById('countNew').innerText = countNew;
        document.getElementById('countAccepted').innerText = countAccepted;
        document.getElementById('countCooking').innerText = countCooking;
        document.getElementById('countTotal').innerText = activeOrdersList.length;

        // เสียงเตือนจะดังเมื่อ "ออเดอร์ใหม่" มีจำนวนเพิ่มขึ้น
        if (countNew > previousNewCount && previousNewCount !== 0) {
            playAlertSound();
        }
        previousNewCount = countNew;
    }

// 1. เพิ่มตัวแปรสำหรับเก็บสถานะที่เลือก
let currentStatusFilter = 'All'; 

// 2. ฟังก์ชันกดเลือกสถานะ
function setFilter(status) {
    currentStatusFilter = status;
    
    // ไฮไลต์ปุ่มที่ถูกเลือก
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('border-pink-500', 'ring-2', 'ring-pink-300');
        if(tab.id === 'tab-' + status) {
            tab.classList.add('border-pink-500', 'ring-2', 'ring-pink-300');
        }
    });
    
    renderKitchenCards(); // สั่งวาดหน้าจอใหม่ด้วยเงื่อนไขใหม่
}

// ฟังก์ชันเจนหัวข้อและพ่นการ์ดรายการอาหาร (อัปเดตสีม่วงพาสเทลสำหรับสถานะ "กำลังทำ")
function renderKitchenCards() {
    const grid = document.getElementById('kitchenGrid');

    // กรองข้อมูลตามสถานะที่กดเลือก (จากระบบ Tab Filter)
    let displayOrders = activeOrdersList;
    if (currentStatusFilter !== 'All') {
        displayOrders = activeOrdersList.filter(o => (o.status || "Pending") === currentStatusFilter);
    }

    if (displayOrders.length === 0) {
        grid.innerHTML = `
        <div class="col-span-full h-96 flex flex-col items-center justify-center text-pink-300 font-bold gap-2">
            <span class="text-6xl">🎉</span>
            <span class="text-xl text-pink-700">ไม่มีออเดอร์ในสถานะนี้</span>
        </div>`;
        return;
    }

    let html = '';

    displayOrders.forEach(order => {
        let status = order.status || "Pending";
        
        // 🎨 สีการ์ดตามธีม FamePOS (เปลี่ยน "กำลังทำ" เป็น ม่วงพาสเทล)
        let cardColor = "bg-white border-pink-100";
        if (status === "รับออเดอร์แล้ว") cardColor = "bg-amber-50 border-amber-300";
        else if (status === "กำลังทำ") cardColor = "bg-purple-50 border-purple-300"; // 🟣 ม่วงพาสเทล
        else if (status === "Pending") cardColor = "bg-red-50 border-red-300 animate-pulse";

        // Logic แยกชื่อรายการ
        const rawItems = []; let buffer = ""; let bracket = 0;
        for (let ch of order.items) {
            if (ch === "[") bracket++; if (ch === "]") bracket--;
            if (ch === "," && bracket === 0) { rawItems.push(buffer.trim()); buffer = ""; } else { buffer += ch; }
        }
        if (buffer.trim()) rawItems.push(buffer.trim());

        const groupedItems = {};
        rawItems.forEach(itemStr => {
            let qtyMatch = itemStr.match(/\(x(\d+)\)/);
            let qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
            let baseName = itemStr.replace(/\s*\(x\d+\)/, "").trim();
            let mainName = baseName.replace(/\[.*?\]/g, "").trim();
            if (!groupedItems[mainName]) groupedItems[mainName] = { name: mainName, qty: 0 };
            groupedItems[mainName].qty += qty;
        });

        let itemsHtml = "";
        Object.values(groupedItems).forEach(item => {
            itemsHtml += `
            <div class="py-2 border-b border-pink-100/50 flex justify-between items-center font-bold text-gray-800">
                <span>${item.name}</span>
                <span class="text-pink-600 bg-white px-2 py-0.5 rounded-lg border border-pink-100">x${item.qty}</span>
            </div>`;
        });

        // 🔘 สร้างปุ่มตามสถานะ (ใช้สีธีม FamePOS)
        let actionButtonHtml = "";
        if (status === "กำลังทำ") {
            actionButtonHtml = `<button onclick="serveOrder(${order.rowIdx}, '${order.queueNo}', '${order.source}')" class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md text-base hover:bg-emerald-700 transition active:scale-95 transform">✅ เสร็จแล้ว (พร้อมเสิร์ฟ)</button>`;
        } else if (status === "รับออเดอร์แล้ว") {
            actionButtonHtml = `<button onclick="updateKitchenStatus(${order.rowIdx}, '${order.source}', 'กำลังทำ')" class="w-full bg-purple-500 text-white font-bold py-3.5 rounded-xl shadow-md text-base hover:bg-purple-600 transition active:scale-95 transform">👨‍🍳 เริ่มทำอาหาร</button>`;
        } else {
            actionButtonHtml = `<button onclick="updateKitchenStatus(${order.rowIdx}, '${order.source}', 'รับออเดอร์แล้ว')" class="w-full bg-pink-600 text-white font-bold py-3.5 rounded-xl shadow-md text-base hover:bg-pink-700 transition active:scale-95 transform">📥 รับออเดอร์</button>`;
        }

        // 🪑 แสดงโต๊ะ (ถ้าเป็น QR)
        let tableBadge = order.tableNo ? `<div class="mt-1 bg-pink-100 text-pink-700 px-2 py-0.5 rounded-lg text-xs font-bold w-fit">🪑 โต๊ะ: ${order.tableNo}</div>` : "";

        html += `
        <div class="rounded-[2rem] border-2 flex flex-col justify-between shadow-sm h-[420px] transition-all ${cardColor}">
            <div class="p-5 flex flex-col overflow-hidden h-full">
                <div class="flex justify-between items-start mb-3 border-b border-pink-100/50 pb-2">
                    <div>
                        <div class="text-2xl font-black text-pink-800">${order.queueNo}</div>
                        ${tableBadge}
                    </div>
                    <div class="text-xs font-bold px-2 py-1 rounded-xl bg-white border border-pink-100 text-pink-700">${order.orderType}</div>
                </div>
                <div class="flex-1 overflow-y-auto">${itemsHtml}</div>
            </div>
            <div class="p-4 border-t border-pink-100/60 bg-white/50 rounded-b-[2rem]">
                ${actionButtonHtml}
            </div>
        </div>`;
    });
    grid.innerHTML = html;
}

    function updateKitchenStatus(rowIdx, source, status) {
        showToast("กำลังอัปเดตสถานะ...", "info");
        google.script.run
            .withSuccessHandler(function() {
                 showToast(`อัปเดตเป็น '${status}' แล้ว!`, "success");
                 fetchKitchenOrders();
            })
            .withFailureHandler(function(err) {
                 Swal.fire('ข้อผิดพลาดระบบ', err || 'ไม่สามารถอัปเดตสถานะได้', 'error');
            })
            .updateKitchenStatusGS(rowIdx, source, status);
    }

    function serveOrder(rowIdx, queueNo, source = "Sales") {
        google.script.run
            .withSuccessHandler(function(res) {
                if (res === "Success") {
                    showToast(`เคลียร์คิว ${queueNo} เรียบร้อยแล้ว`, "success");
                    google.script.run.updateCDSWithQueue({
                        queueNo: queueNo, 
                        items: "อาหารพร้อมรับ" 
                    });
                    fetchKitchenOrders();
                } else {
                    Swal.fire('ผิดพลาด', res, 'error');
                }
            })
            .withFailureHandler(function(err) {
                Swal.fire('ข้อผิดพลาดระบบ', 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
            })
            .completeKitchenOrderGS(rowIdx, source);
    }

    function updateClock() {
      const clock = document.getElementById('clockTime');
      if (!clock) return;
      clock.innerText = new Date().toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    updateClock();
    setInterval(updateClock, 1000);

    function toggleItemStatus(el, orderId, itemIdx) {
        el.classList.toggle('item-done');
        let isDone = el.classList.contains('item-done');
        localStorage.setItem(`done_${orderId}_${itemIdx}`, isDone);
    }

function showToast(message, type = "success") {
  const container = document.getElementById('toastContainer');
  if (!container) return; 
  
  const toast = document.createElement('div');
  
  // ใช้สีชมพูหลักของ FamePOS เท่านั้น
  const bgColor = type === 'error' ? 'bg-red-500' : 'bg-pink-600';
  
  toast.className = `flex items-center gap-3 ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto font-bold text-lg`;
  toast.innerHTML = `<span class="text-xl">${type === 'error' ? '❌' : '✅'}</span> <span>${message}</span>`;
  
  container.appendChild(toast);
  
  setTimeout(() => { 
    toast.classList.remove('translate-x-full', 'opacity-0'); 
    toast.classList.add('translate-x-0', 'opacity-100'); 
  }, 50);

  setTimeout(() => { 
    toast.classList.remove('translate-x-0', 'opacity-100'); 
    toast.classList.add('translate-x-full', 'opacity-0'); 
    setTimeout(() => toast.remove(), 300); 
  }, 3000);
}

    fetchKitchenOrders();
    setInterval(fetchKitchenOrders, 15000); // รีเฟรชทุกๆ 15 วินาที
  </script>
</body>
</html>
