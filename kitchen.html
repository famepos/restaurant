<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamePOS Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KDS FamePOS">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
    /* 🎨 ปรับโทนสีหลักให้แมตช์ตรงตามไฟล์ระบบหลัก */
    body { font-family: 'Kanit', sans-serif; background-color: #fdecec; color: #4e0606; margin: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fdecec; }
    ::-webkit-scrollbar-thumb { background: #fad1d1; border-radius: 10px; }

    /* สไตล์สำหรับการคลิกเมนูเสร็จแล้ว */
    .item-done {
        text-decoration: line-through;
        opacity: 0.5;
        background-color: #fff1f2;
    }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<header class="bg-white border-b border-pink-100 p-4 flex justify-between items-center shrink-0 shadow-sm">
    <div class="flex items-center gap-3">
      <img src="https://i.postimg.cc/Znng4wjg/fe8393f8-8504-475f-976c-727390b6c790.png" alt="Kitchen Logo" class="w-12 h-12 object-contain drop-shadow-sm">
      <div>
        <h1 class="text-xl font-bold text-pink-800 tracking-wide">FamePOS จอห้องครัว</h1>
        <p class="text-xs text-pink-500/80">ระบบอัปเดตคิวและรายการอาหารอัตโนมัติ Real-time</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <div id="clockTime" class="text-xl font-black text-pink-600 tracking-wider">00:00:00</div>
        <div id="orderCount" class="text-xs text-pink-700/60 font-semibold">กำลังเชื่อมโยงคิว...</div>
      </div>
      <button onclick="fetchKitchenOrders()" class="bg-pink-50 hover:bg-pink-100 border border-pink-200 px-4 py-2 rounded-xl text-sm font-bold text-pink-700 transition flex items-center gap-1.5 shadow-sm active:scale-95 transform">
        🔄 รีเฟรชคิวอาหาร
      </button>
    </div>
  </header>

  <main id="kitchenGrid" class="flex-1 p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 overflow-y-auto content-start">
    <div class="col-span-full h-96 flex flex-col items-center justify-center text-pink-400 font-bold gap-3">
      <span class="text-5xl animate-spin">⏳</span>
      <span class="text-lg">กำลังดึงคิวใบสั่งอาหารจากระบบหลังบ้าน...</span>
    </div>
  </main>

  <script>
    // 🔗 ลิงก์ยิง API ตรงเข้า Google Apps Script หลังบ้านของคุณเฟรม
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

    // ================= MAGIC PROXY (V2) CONNECT =================
    const google = {
        script: {
            get run() {
                let successCb = null; let failureCb = null;
                const proxy = new Proxy({}, {
                    get: function(target, prop) {
                        if (prop === 'withSuccessHandler') { return function(cb) { successCb = cb; return proxy; }; }
                        if (prop === 'withFailureHandler') { return function(cb) { failureCb = cb; return proxy; }; }
                        return function(...args) {
                            fetch(API_URL, {
                                method: "POST",
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify({ action: prop, args: args }),
                                redirect: "follow"
                            })
                            .then(res => res.json())
                            .then(data => {
                                if(data.status === "Success" && successCb) successCb(data.result);
                                else if (data.status !== "Success" && failureCb) failureCb(data.message);
                            })
                            .catch(err => { if(failureCb) failureCb(err); else console.error("Fetch Error:", err); });
                        };
                    }
                });
                return proxy;
            }
        }
    };

    let activeOrdersList = [];
    let previousOrdersCount = 0;

    // ระบบแจ้งเตือนเสียง (Beep อัจฉริยะเมื่อมีออเดอร์ใหม่สแกนหรือพักบิลเข้าครัว)
    function playAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // คีย์เสียงใส สบายหู
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } catch(e) { console.log("Audio feedback blocked by screen styling rules."); }
    }

    // ฟังก์ชันยิงอ่านค่าข้อมูลคิวอาหาร
    function fetchKitchenOrders() {
      google.script.run
        .withSuccessHandler(function(orders) {
          activeOrdersList = orders;
          document.getElementById('orderCount').innerText = `คิวค้างในครัว: ${orders.length} ออเดอร์`;
          
          if (orders.length > previousOrdersCount && previousOrdersCount !== 0) {
            playAlertSound();
          }
          previousOrdersCount = orders.length;
          renderKitchenCards();
        })
        .withFailureHandler(function(err) {
          console.error("Kitchen Fetch Error:", err);
          document.getElementById('kitchenGrid').innerHTML = `
            <div class="col-span-full h-96 flex flex-col items-center justify-center text-red-500 font-bold gap-2 text-center">
              <span class="text-5xl">❌</span>
              <span class="text-lg">ระบบการเชื่อมต่อคลาวด์ขัดข้อง:<br>
                <span class="text-xs text-pink-800 font-mono bg-white px-3 py-2 rounded-xl border border-pink-200 mt-2 inline-block shadow-sm">${err}</span>
              </span>
            </div>`;
        })
        .getKitchenOrdersGS();
    }

// ฟังก์ชันเจนหัวข้อและพ่นการ์ดรายการอาหาร (เวอร์ชันรวม Option สมบูรณ์ + โต้ตอบสถานะได้)
function renderKitchenCards() {
    const grid = document.getElementById('kitchenGrid');

    if (activeOrdersList.length === 0) {
        grid.innerHTML = `
        <div class="col-span-full h-96 flex flex-col items-center justify-center text-pink-300 font-bold gap-2">
            <span class="text-6xl">🎉</span>
            <span class="text-xl text-pink-700">ห้องครัวว่าง!</span>
        </div>`;
        return;
    }

    let html = '';

    activeOrdersList.forEach(order => {
        // 🟢 เช็คสถานะจาก Server โดยตรง (ถ้า status เป็น "กำลังทำ" ให้แสดงสีเหลือง)
        const isCooking = (order.status === "กำลังทำ");
        const cardColor = isCooking ? "bg-amber-50 border-amber-400" : "bg-white border-pink-100";

        // ===== แยกรายการโดยไม่ตัด comma ใน [] =====
        const rawItems = [];
        let buffer = "";
        let bracket = 0;

        for (let ch of order.items) {
            if (ch === "[") bracket++;
            if (ch === "]") bracket--;

            if (ch === "," && bracket === 0) {
                rawItems.push(buffer.trim());
                buffer = "";
            } else {
                buffer += ch;
            }
        }
        if (buffer.trim()) rawItems.push(buffer.trim());

        // ===== รวมเมนู =====
        const groupedItems = {};

        rawItems.forEach(itemStr => {
            let qtyMatch = itemStr.match(/\(x(\d+)\)/);
            let qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
            let baseName = itemStr.replace(/\s*\(x\d+\)/, "").trim();
            let options = [];
            let optionMatches = [...baseName.matchAll(/\[(.*?)\]/g)];

            optionMatches.forEach(m => {
                m[1].split(",").map(x => x.trim()).filter(Boolean).forEach(x => options.push(x));
            });

            let mainName = baseName.replace(/\[.*?\]/g, "").trim();

            if (!groupedItems[mainName]) {
                groupedItems[mainName] = { name: mainName, qty: 0, options: [] };
            }

            groupedItems[mainName].qty += qty;
            groupedItems[mainName].options.push(...options);
        });

        // ===== วาดรายการ =====
        let itemsHtml = "";

        Object.values(groupedItems).forEach(item => {
            let uniqueOptions = [...new Set(item.options)];
            let optionDisplay = "";

            if (uniqueOptions.length) {
                optionDisplay = `
                <span class="text-xs text-pink-600 bg-pink-50 px-1.5 py-0.5 rounded border border-pink-100 italic">
                    [${uniqueOptions.join(", ")}]
                </span>`;
            }

            let isDone = localStorage.getItem(`done_${order.orderId}_${item.name}`) === "true" ? "item-done" : "";

            itemsHtml += `
            <div onclick="toggleItemStatus(this,'${order.orderId}','${item.name}')"
                class="item-row ${isDone} cursor-pointer py-2 border-b border-pink-50 flex justify-between items-center gap-2 hover:bg-pink-50/50">
                <div class="min-w-0 flex-1 font-bold text-gray-800">
                    ${item.name} ${optionDisplay}
                </div>
                <div class="text-lg font-black text-pink-700 bg-pink-50 px-2 py-0.5 rounded-xl border border-pink-100">
                    x${item.qty}
                </div>
            </div>`;
        });

        html += `
        <div class="rounded-[2rem] border-2 flex flex-col justify-between shadow-sm h-[420px] transition-all duration-200 hover:scale-[1.02] ${cardColor}">

            <div class="p-5 flex flex-col overflow-hidden">
                <div class="flex justify-between items-start gap-2 mb-3 border-b border-pink-50 pb-2">
                    <div>
                        <span class="text-2xl font-black text-pink-800">
                            ${order.queueNo}
                        </span>
                    </div>
                    <div class="text-right text-xs font-bold px-2 py-1 rounded-xl bg-pink-50 text-pink-700">
                        ${order.orderType}
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto">
                    ${itemsHtml}
                </div>
            </div>

            <div class="p-4 grid grid-cols-2 gap-2 border-t border-pink-100/60 rounded-b-[2rem] bg-pink-50/20">
                <button onclick="updateKitchenStatus(${order.rowIdx}, '${order.source}', 'กำลังทำ')" 
                        class="bg-amber-500 text-white font-bold py-3 rounded-xl shadow-md text-sm hover:bg-amber-600 transition">
                    👨‍🍳 กำลังทำ
                </button>
                <button onclick="serveOrder(${order.rowIdx}, '${order.queueNo}', '${order.source}')" 
                        class="bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-md text-sm hover:bg-emerald-600 transition">
                    ✅ เสร็จแล้ว
                </button>
            </div>

        </div>`;
    });

    grid.innerHTML = html;
}

// 🟢 ฟังก์ชันสำหรับอัปเดตสถานะ "กำลังทำ" ไปยังเซิร์ฟเวอร์
function updateKitchenStatus(rowIdx, source, status) {
    showToast("กำลังเริ่มทำรายการ...", "info");
    google.script.run
        .withSuccessHandler(function() {
             showToast("อัปเดตสถานะ 'กำลังทำ' แล้ว!", "success");
             fetchKitchenOrders();
        })
        .withFailureHandler(function(err) {
             Swal.fire('ข้อผิดพลาด', 'ไม่สามารถอัปเดตสถานะได้', 'error');
        })
        .updateKitchenStatusGS(rowIdx, source, status);
}

// 🟢 ฟังก์ชันคุมปุ่มเสิร์ฟอาหาร (กดแล้วเสิร์ฟทันที และยิงคิวเข้า CDS)
function serveOrder(rowIdx, queueNo, source = "Sales") {
    // 1. ยิงคำสั่งไปหลังบ้านเพื่อเคลียร์ออเดอร์
    google.script.run
        .withSuccessHandler(function(res) {
            if (res === "Success") {
                showToast(`เคลียร์คิว ${queueNo} เรียบร้อยแล้ว`, "success");
                
                // 2. เรียกฟังก์ชันสั่งอัปเดต CDS (หน้าจอลูกค้า) อัตโนมัติ[cite: 2]
                google.script.run.updateCDSWithQueue({
                    queueNo: queueNo, 
                    items: "อาหารพร้อมรับ" 
                });

                // รีเฟรชหน้าจอ KDS
                if (typeof fetchKitchenOrders === 'function') {
                    fetchKitchenOrders();
                }
            } else {
                Swal.fire('ผิดพลาด', res, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.fire('ข้อผิดพลาดระบบ', 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
        })
        .completeKitchenOrderGS(rowIdx, source);
}

function showToast(message, type = "success") {
  let icon = type === 'success' ? 'success' : (type === 'info' ? 'info' : 'error');
  Swal.fire({
    toast: true,
    position: "top-end",
    icon: icon,
    title: message,
    showConfirmButton: false,
    timer: 2000
  });
}

// =========================
// นาฬิกา Real-Time
// =========================
function updateClock() {
  const clock = document.getElementById('clockTime');
  if (!clock) return;
  clock.innerText = new Date().toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

updateClock();
setInterval(updateClock, 1000);

function toggleItemStatus(el, orderId, itemIdx) {
    el.classList.toggle('item-done');
    let isDone = el.classList.contains('item-done');
    localStorage.setItem(`done_${orderId}_${itemIdx}`, isDone);
}

// =========================
// โหลดคิวครัวอัตโนมัติ
// =========================
fetchKitchenOrders();
setInterval(fetchKitchenOrders, 15000);

  </script>
</body>
</html>
