<script>
// 1. ตัวแปร API (ใส่ลิงก์ของคุณให้ถูกต้อง)
const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";

// 2. MAGIC PROXY: ตัวเชื่อมให้คำสั่ง google.script.run ใช้งานได้บน Browser
const google = {
    script: {
        get run() {
            let successCb = null;
            let failureCb = null;
            
            const proxy = new Proxy({}, {
                get: function(target, prop) {
                    if (prop === 'withSuccessHandler') {
                        return function(cb) { successCb = cb; return proxy; };
                    }
                    if (prop === 'withFailureHandler') {
                        return function(cb) { failureCb = cb; return proxy; };
                    }
                    return function(...args) {
                        fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify({ action: prop, args: args }),
                            redirect: "follow"
                        })
                        .then(res => res.json())
                        .then(data => {
                            if(data.status === "Success" && successCb) {
                                successCb(data.result);
                            } else if (data.status !== "Success" && failureCb) {
                                failureCb(data.message);
                            }
                        })
                        .catch(err => {
                            if(failureCb) failureCb(err);
                            else console.error("Fetch Error:", err);
                        });
                    };
                }
            });
            return proxy;
        }
    }
};

// เริ่มโหลดทันทีที่หน้าจอทำงาน
document.addEventListener("DOMContentLoaded", function() {
    // เอาคำสั่งซ่อน productGrid ออก เพราะเราซ่อนกล่องแม่มันไปแล้ว
    loadTableSelector(); // โหลดหน้าโต๊ะทันที
    loadProducts();      // โหลดสินค้ามารอไว้เลย
});

// ตัวแปรสำหรับเก็บรายการในตะกร้าและสินค้า
let cart = []; 
let currentTable = "โต๊ะ 01"; 
let allSalesProducts = [];

// ==========================================
// 1. ระบบจัดการโต๊ะ (อัปเดต Real-time)
// ==========================================

// 🔄 ตั้งเวลาให้ระบบรีเฟรชหน้าโต๊ะอัตโนมัติ ทุกๆ 5 วินาที
setInterval(function() {
    let tableSelector = document.getElementById('tableSelectorView');
    // ให้โหลดข้อมูลใหม่เฉพาะตอนที่พนักงานอยู่หน้าเลือกโต๊ะเท่านั้น (ประหยัดเน็ต)
    if (!tableSelector.classList.contains('hidden')) {
        loadTableSelector(); 
    }
}, 5000);

// ดึงข้อมูลโต๊ะจาก Google Sheets[cite: 2]
function loadTableSelector() {
    google.script.run.withSuccessHandler(function(tables) {
        let container = document.getElementById('tableSelectorView');
        let html = '';
        
        tables.forEach(table => {
            // เช็คสีตามสถานะโต๊ะ
            let color = "";
            if (table.status === 'ว่าง' || table.status === '🟢 ว่าง') {
                color = 'bg-green-100 border-green-300 text-green-700'; // สีเขียว = ว่าง
            } else if (table.status === '🟡 เรียกเก็บเงิน') {
                // 🟡 โต๊ะไหนเรียกเช็คบิล ให้เป็นสีเหลืองและกระพริบ (animate-pulse)
                color = 'bg-yellow-100 border-yellow-400 text-yellow-700 animate-pulse'; 
            } else {
                color = 'bg-red-100 border-red-300 text-red-700'; // สีแดง = มีลูกค้า
            }
            
            html += `
            <div onclick="selectTable('${table.name}', '${table.status}')" class="p-4 rounded-xl border-2 ${color} text-center font-bold shadow-sm cursor-pointer active:scale-95 transition">
                <div class="text-sm">${table.name}</div>
                <div class="text-[10px]">${table.status}</div>
            </div>`;
        });
        container.innerHTML = html;
    }).getTablesData();
}


// ฟังก์ชันยืนยันเปิดโต๊ะ
function confirmOpenTable() {
    let count = document.getElementById('headCountInput').value;
    // ป้องกันการกรอกค่าว่าง
    if(!count) count = 1; 

    google.script.run.withSuccessHandler(() => {
        document.getElementById('openTableModal').classList.add('hidden');
        enterOrderView(selectedTable);
    }).openTableGS(selectedTable, 'A_la_carte', count, '', '');
}

// ==========================================
// 2. ระบบสั่งอาหาร
// ==========================================

// เข้าหน้าสั่งอาหาร
// เข้าหน้าสั่งอาหาร
function enterOrderView(name) {
    currentTable = name;
    
    document.getElementById('tableSelectorView').classList.add('hidden');
    document.getElementById('orderView').classList.remove('hidden'); 
    document.getElementById('productGrid').classList.remove('hidden');
    document.getElementById('orderFooter').classList.remove('hidden');
    
    // 🟢 โชว์ปุ่มย้อนกลับ
    document.getElementById('btnBack').classList.remove('hidden');
    
    document.getElementById('selectedTableDisplay').innerText = "โต๊ะ: " + name;
}
// ฟังก์ชันโหลดข้อมูลสินค้า
function loadProducts() {
    google.script.run.withSuccessHandler(function(data) {
        console.log("ดึงข้อมูลสินค้ามาแล้ว: ", data);
        if (data && data.length > 0) {
            allSalesProducts = data;
            renderProductGrid(allSalesProducts);
        }
    }).getProducts();
}

// ฟังก์ชันวาดการ์ดสินค้า
function renderProductGrid(data) {
    let grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    
    data.forEach(function(row) {
        let name = row[1] || "ไม่มีชื่อ";
        let price = parseFloat(row[3]) || 0;
        let imageUrl = row[8] || "https://via.placeholder.com/150"; 
        
        let card = document.createElement('div');
        card.className = "modern-card p-3 shadow-sm border border-gray-100 flex flex-col bg-white";
        card.innerHTML = `
            <img src="${imageUrl}" class="w-full h-24 object-cover rounded-xl mb-2" onerror="this.src='https://via.placeholder.com/150'">
            <h3 class="font-bold text-sm text-gray-800 line-clamp-1">${name}</h3>
            <p class="text-pink-600 font-bold mt-auto">฿${price.toFixed(2)}</p>
            <button onclick="addToCart('${name}', ${price})" class="mt-2 w-full bg-pink-500 text-white font-bold py-2 rounded-xl text-sm active:scale-95 transition">เพิ่มลงตะกร้า</button>
        `;
        grid.appendChild(card);
    });
}

// ==========================================
// 6. ระบบตะกร้าสินค้า (ก่อนส่งเข้าแคชเชียร์)
// ==========================================

// อัปเดตฟังก์ชัน addToCart เดิม ให้เรียกอัปเดตตัวเลขหน้าปุ่มด้วย
function addToCart(name, price) {
    let existing = cart.find(item => item.name === name);
    if(existing) {
        existing.qty++;
    } else {
        cart.push({ name: name, price: price, qty: 1 });
    }
    
    // อัปเดตตัวเลขบนปุ่ม
    updateCartBadge();

    // เอฟเฟกต์ปุ่ม
    let btn = document.querySelector(`button[onclick="addToCart('${name}', ${price})"]`);
    if(btn) {
        let oldText = btn.innerText;
        btn.innerText = "✅ เพิ่มแล้ว";
        btn.classList.replace("bg-pink-500", "bg-green-500");
        setTimeout(() => {
            btn.innerText = oldText;
            btn.classList.replace("bg-green-500", "bg-pink-500");
        }, 800);
    }
}
// ==========================================
// ส่งออเดอร์เข้าแคชเชียร์ (ระบบแจ้งเตือนแบบใหม่)
// ==========================================
function sendToKitchen() {
    if (cart.length === 0) {
        Swal.fire({
            title: "ตะกร้าว่างเปล่า!",
            text: "กรุณาเลือกเมนูอาหารก่อนกดส่งครับ",
            icon: "warning",
            confirmButtonColor: "#db2777",
            confirmButtonText: "ตกลง"
        });
        return;
    }

    // 1. คำนวณยอดรวม 
    let totalAmount = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

    // 2. จัดรูปแบบข้อมูลให้ตรงกับระบบ
    let orderPayload = { 
        table: currentTable, 
        items: cart.map(item => ({
            name: item.name,
            price: item.price,
            qty: item.qty
        })), 
        total: totalAmount 
    };

    // ป้องกันพนักงานกดปุ่มเบิ้ล
    let btns = document.querySelectorAll('button[onclick="sendToKitchen()"]');
    btns.forEach(btn => { btn.innerText = "กำลังส่ง... ⏳"; btn.disabled = true; });

    // 3. ส่งข้อมูลไปหาแคชเชียร์
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ 
            action: "submitCustomerOrder", 
            args: [orderPayload] 
        }),
        redirect: "follow"
    })
    .then(res => res.json())
    .then(data => {
        // คืนค่าปุ่ม
        btns.forEach(btn => { btn.innerText = "ส่งแคชเชียร์ 🔔"; btn.disabled = false; });

        if(data.status === "Success") {
            // 🟢 แจ้งเตือนแบบใหม่! สวยงามและปิดตัวเองอัตโนมัติใน 1.5 วินาที
            Swal.fire({
                title: "ส่งออเดอร์สำเร็จ!",
                text: "ส่งรายการอาหารเข้าเครื่องแคชเชียร์เรียบร้อยแล้ว",
                icon: "success",
                timer: 1500,
                showConfirmButton: false
            });
            
            // ล้างตะกร้าและเด้งกลับหน้าโต๊ะ
            cart = [];             
            updateCartBadge();     
            closeCartModal();      
            goBackToTables();      
            
        } else {
            Swal.fire({
                title: "เกิดข้อผิดพลาด",
                text: data.message,
                icon: "error",
                confirmButtonColor: "#db2777",
                confirmButtonText: "ตกลง"
            });
        }
    })
    .catch(err => {
        btns.forEach(btn => { btn.innerText = "ส่งแคชเชียร์ 🔔"; btn.disabled = false; });
        Swal.fire({
            title: "การเชื่อมต่อล้มเหลว",
            text: "โปรดตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง",
            icon: "error",
            confirmButtonColor: "#db2777",
            confirmButtonText: "ตกลง"
        });
    });
}

// ==========================================
// 4. ระบบเคลียร์โต๊ะ
// ==========================================

function clearTable() {
    if (!currentTable) return;

    // ใช้ confirm พื้นฐานของ Browser เพื่อป้องกันบั๊ก
    let isConfirm = confirm(`ยืนยันการเคลียร์โต๊ะ ${currentTable} เพื่อให้ลูกค้าท่านใหม่เข้ามาใช้งาน?`);
    
    if (isConfirm) {
     google.script.run
            .withSuccessHandler(function() {
                alert(`เคลียร์โต๊ะ ${currentTable} ว่างแล้วครับ`);
                
                cart = [];
                currentTable = "";
                document.getElementById('orderView').classList.add('hidden');
                document.getElementById('orderFooter').classList.add('hidden');
                
                // 🟢 ซ่อนปุ่มย้อนกลับ
                document.getElementById('btnBack').classList.add('hidden');
                
                document.getElementById('selectedTableDisplay').innerText = "เลือกโต๊ะ...";
                document.getElementById('tableSelectorView').classList.remove('hidden');
                loadTableSelector(); 
            })
            .updateTableStatusGS(currentTable, "ว่าง");
    }
}

// ฟังก์ชันกดย้อนกลับไปหน้าเลือกโต๊ะ
function goBackToTables() {
    // 1. ซ่อนหน้าสั่งอาหารและ Footer
    document.getElementById('orderView').classList.add('hidden');
    document.getElementById('orderFooter').classList.add('hidden');
    
    // 2. ซ่อนปุ่มย้อนกลับ
    document.getElementById('btnBack').classList.add('hidden');
    
    // 3. เคลียร์ตะกร้า (ป้องกันของติดไปโต๊ะอื่น) และรีเซ็ตชื่อโต๊ะ
    cart = [];
    currentTable = "";
    document.getElementById('selectedTableDisplay').innerText = "เลือกโต๊ะ...";
    
    // 4. โชว์หน้าโต๊ะกลับมา
    document.getElementById('tableSelectorView').classList.remove('hidden');
    loadTableSelector(); 
}
// ==========================================
// 5. ดูรายการออเดอร์ปัจจุบันของโต๊ะ
// ==========================================
// ==========================================
// 5. ดูรายการออเดอร์ปัจจุบันของโต๊ะ (อัปเดตรองรับราคาบุฟเฟต์)
// ==========================================
function viewTableOrders() {
    if (!currentTable) return;

    // เปลี่ยนชื่อหัวข้อ และแสดงสถานะกำลังโหลด
    document.getElementById('tableOrdersTitle').innerText = "📋 บิล: " + currentTable;
    document.getElementById('tableOrdersContainer').innerHTML = '<div class="flex flex-col items-center py-10"><span class="text-4xl animate-spin mb-2">⏳</span><span class="text-gray-500 font-bold">กำลังดึงข้อมูล...</span></div>';
    
    // โชว์หน้าต่างป๊อปอัป
    document.getElementById('tableOrdersModal').classList.remove('hidden');

    // 1. ดึงข้อมูลโต๊ะปัจจุบันก่อน เพื่อดูว่าเป็นบุฟเฟต์หรือไม่
    google.script.run
        .withSuccessHandler(function(tables) {
            let myTable = tables.find(t => t.name === currentTable);
            
            // 2. ดึงรายการอาหารที่สั่งเพิ่มผ่านมือถือ (QR/Staff)
            google.script.run
                .withSuccessHandler(function(data) {
                    let html = '';
                    let grandTotal = 0;

                    // --- ส่วนที่ 1: คำนวณราคาบุฟเฟต์ (ถ้ามี) ---
                    if (myTable && myTable.orderMode === 'Buffet') {
                        let pkgName = myTable.packageName;
                        let headCount = parseInt(myTable.headCount) || 0;
                        
                        // หาแพ็กเกจจากตัวแปร buffetPackages ที่เราดึงมาตอนเปิดเว็บ[cite: 7]
                        let pkgInfo = buffetPackages.find(p => p.name === pkgName);
                        let pkgPrice = pkgInfo ? parseFloat(pkgInfo.price) : 0;
                        let buffetTotal = pkgPrice * headCount;
                        
                        grandTotal += buffetTotal;

                        html += `
                        <div class="flex justify-between items-center bg-pink-100 p-3 rounded-xl border border-pink-300 mb-2 shadow-sm">
                            <div class="flex-1">
                                <div class="font-black text-pink-800 text-sm">🥩 ${pkgName}</div>
                                <div class="text-xs text-pink-600 font-bold">฿${pkgPrice.toFixed(2)} x ${headCount} ท่าน</div>
                            </div>
                            <div class="font-black text-pink-700 text-lg">฿${buffetTotal.toFixed(2)}</div>
                        </div>`;
                    }

                    // --- ส่วนที่ 2: รายการสั่งแยก (A la carte หรือสั่งเพิ่ม) ---
                    if (data.items && data.items.length > 0) {
                        data.items.forEach(item => {
                            let itemTotal = parseFloat(item.price) * parseInt(item.qty);
                            grandTotal += itemTotal;
                            html += `
                            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100 mb-2">
                                <div class="flex-1">
                                    <div class="font-bold text-gray-800 text-sm">${item.name}</div>
                                    <div class="text-xs text-gray-500">฿${parseFloat(item.price).toFixed(2)} x ${item.qty}</div>
                                </div>
                                <div class="font-bold text-pink-600">฿${itemTotal.toFixed(2)}</div>
                            </div>`;
                        });
                    } 
                    
                    // ถ้าระบบไม่ได้เป็นบุฟเฟต์ และไม่มีการสั่งของใดๆ เลย
                    if ((!myTable || myTable.orderMode !== 'Buffet') && (!data.items || data.items.length === 0)) {
                        html = '<div class="text-center py-10 text-gray-400 font-bold text-sm">ยังไม่มีรายการสั่งอาหารที่ค้างอยู่ครับ 🍽️</div>';
                    }

                    // --- ส่วนที่ 3: แสดงยอดรวมทั้งหมด ---
                    if (html !== '<div class="text-center py-10 text-gray-400 font-bold text-sm">ยังไม่มีรายการสั่งอาหารที่ค้างอยู่ครับ 🍽️</div>') {
                        html += `
                        <div class="mt-4 border-t-2 border-dashed border-gray-200 pt-3 flex justify-between items-center">
                            <span class="text-lg font-bold text-gray-600">ยอดรวมสุทธิ:</span>
                            <span class="text-3xl font-black text-pink-600">฿${grandTotal.toFixed(2)}</span>
                        </div>`;
                    }
                    
                    document.getElementById('tableOrdersContainer').innerHTML = html;
                })
                .withFailureHandler(function(err) {
                    document.getElementById('tableOrdersContainer').innerHTML = '<div class="text-center py-10 text-red-500 font-bold text-sm">❌ โหลดข้อมูลรายการอาหารล้มเหลว</div>';
                })
                .getTableTotalGS(currentTable);
        })
        .withFailureHandler(function(err) {
            document.getElementById('tableOrdersContainer').innerHTML = '<div class="text-center py-10 text-red-500 font-bold text-sm">❌ โหลดข้อมูลโต๊ะล้มเหลว</div>';
        })
        .getTablesData();
}
// ==========================================
// 6. ระบบเปิดโต๊ะ Full Option (Buffet / A La Carte)
// ==========================================
let currentTableMode = 'Buffet';
let isPrepaidWorkflow = false;
let buffetPackages = [];
let selectedPackage = null;

// 1. ดึงแพ็กเกจจาก Google Sheets ตอนโหลดเว็บ
document.addEventListener("DOMContentLoaded", function() {
    google.script.run.withSuccessHandler(function(pkgs) {
        buffetPackages = pkgs;
        let menuHtml = '';
        if (pkgs.length > 0) {
            pkgs.forEach(pkg => {
                menuHtml += `<div onclick="selectBuffetPackage('${pkg.name}', ${pkg.timeLimit})" class="p-3 hover:bg-pink-50 text-gray-700 font-bold cursor-pointer border-b border-pink-50 transition">${pkg.name} (฿${pkg.price})</div>`;
            });
            selectBuffetPackage(pkgs[0].name, pkgs[0].timeLimit); // เลือกอันแรกเป็นค่าเริ่มต้น
        } else {
            menuHtml = `<div class="p-3 text-red-500 font-bold text-sm">ยังไม่มีแพ็กเกจในระบบ</div>`;
            document.getElementById('buffetPackageSelectedText').innerText = "ไม่มีแพ็กเกจบุฟเฟต์";
        }
        document.getElementById('buffetPackageMenu').innerHTML = menuHtml;
    }).getBuffetPackagesGS();
});

// 2. ปรับปรุงฟังก์ชัน selectTable เพื่อเปิด Modal ตัวใหม่
function selectTable(name, status) {
    selectedTable = name;
    if (status === 'ว่าง' || status === '🟢 ว่าง') {
        document.getElementById('modalTableNameDisplay').innerText = name;
        document.getElementById('openTableModeModal').classList.remove('hidden');
    } else {
        enterOrderView(name);
    }
}

// 3. ฟังก์ชันควบคุม UI
function setTableMode(mode) {
    currentTableMode = mode;
    let btnBuffet = document.getElementById('btnModeBuffet');
    let btnAlacarte = document.getElementById('btnModeAlacarte');
    let pkgContainer = document.getElementById('buffetPackageContainer');
    let timeContainer = document.getElementById('timeLimitContainer');

    if (mode === 'Buffet') {
        btnBuffet.className = "py-3 border-2 border-pink-500 bg-pink-50 text-pink-700 rounded-xl font-bold transition shadow-sm text-sm";
        btnAlacarte.className = "py-3 border-2 border-gray-100 text-gray-500 bg-white rounded-xl font-bold transition shadow-sm text-sm";
        pkgContainer.classList.remove('hidden');
        timeContainer.classList.remove('hidden');
    } else {
        btnBuffet.className = "py-3 border-2 border-gray-100 text-gray-500 bg-white rounded-xl font-bold transition shadow-sm text-sm";
        btnAlacarte.className = "py-3 border-2 border-pink-500 bg-pink-50 text-pink-700 rounded-xl font-bold transition shadow-sm text-sm";
        pkgContainer.classList.add('hidden');
        timeContainer.classList.add('hidden');
    }
}

function selectBuffetPackage(name, timeLimit) {
    selectedPackage = name;
    document.getElementById('buffetPackageSelectedText').innerText = "🥩 " + name;
    document.getElementById('inputTimeLimit').value = timeLimit || 90;
    document.getElementById('buffetPackageMenu').classList.add('hidden');
}

function adjustHeadCount(type, amount) {
    let input = type === 'adult' ? document.getElementById('inputAdultCount') : document.getElementById('inputKidCount');
    let newVal = parseInt(input.value) + amount;
    if (newVal >= 0) input.value = newVal;
}

function adjustTimeLimit(amount) {
    let input = document.getElementById('inputTimeLimit');
    let newVal = parseInt(input.value) + amount;
    if (newVal >= 10) input.value = newVal;
}

function setPaymentWorkflow(isPrepaid) {
    isPrepaidWorkflow = isPrepaid;
    let btnLater = document.getElementById('btnPayLater');
    let btnNow = document.getElementById('btnPayNow');
    
    if (isPrepaid) {
        btnNow.className = "py-2 border-2 border-pink-500 bg-pink-50 text-pink-700 rounded-xl font-bold transition text-xs shadow-sm";
        btnLater.className = "py-2 border-2 border-gray-100 text-gray-500 bg-white rounded-xl font-bold transition text-xs shadow-sm";
    } else {
        btnLater.className = "py-2 border-2 border-pink-500 bg-pink-50 text-pink-700 rounded-xl font-bold transition text-xs shadow-sm";
        btnNow.className = "py-2 border-2 border-gray-100 text-gray-500 bg-white rounded-xl font-bold transition text-xs shadow-sm";
    }
}

// 4. ฟังก์ชันส่งเปิดโต๊ะไปยังระบบ
function submitTableOpen() {
    let adult = parseInt(document.getElementById('inputAdultCount').value) || 0;
    let kid = parseInt(document.getElementById('inputKidCount').value) || 0;
    let totalHeadCount = adult + kid;

    if (totalHeadCount <= 0) {
        alert("กรุณาระบุจำนวนลูกค้าอย่างน้อย 1 ท่านครับ");
        return;
    }

    let pkgName = currentTableMode === 'Buffet' ? (selectedPackage || "-") : "-";
    let timeLimit = currentTableMode === 'Buffet' ? document.getElementById('inputTimeLimit').value : "ไม่จำกัด";

    // เปลี่ยนปุ่มเป็นกำลังโหลด
    let btn = document.querySelector(`button[onclick="submitTableOpen()"]`);
    let originalText = btn.innerText;
    btn.innerText = "กำลังเปิดโต๊ะ... ⏳";
    btn.disabled = true;

    // เรียกฟังก์ชันหลังบ้าน[cite: 2]
    google.script.run.withSuccessHandler(() => {
        document.getElementById('openTableModeModal').classList.add('hidden');
        btn.innerText = originalText;
        btn.disabled = false;
        
        // ถ้าเป็นแบบ "จ่ายก่อนกิน" ให้เตือนพนักงานบอกให้ลูกค้าไปจ่ายเงิน
        if (isPrepaidWorkflow) {
            alert("✅ เปิดโต๊ะสำเร็จ!\n\nระบบเป็นแบบ จ่ายก่อนกิน (Prepaid)\nกรุณาแจ้งให้ลูกค้าไปชำระเงินที่เคาน์เตอร์แคชเชียร์ครับ");
        } else {
            alert(`✅ เปิดโต๊ะ ${selectedTable} สำเร็จแล้ว!`);
        }
        
        enterOrderView(selectedTable);
    }).openTableGS(selectedTable, currentTableMode, totalHeadCount, pkgName, timeLimit);
}

// อัปเดตตัวเลขจำนวนของในปุ่มตะกร้า
function updateCartBadge() {
    let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cartCountBadge').innerText = totalItems;
}

// เปิดหน้าต่างตะกร้า
function openCartModal() {
    document.getElementById('cartTableNameDisplay').innerText = currentTable;
    renderCartItems();
    document.getElementById('cartModal').classList.remove('hidden');
}

// ปิดหน้าต่างตะกร้า
function closeCartModal() {
    document.getElementById('cartModal').classList.add('hidden');
}

// ล้างตะกร้าทิ้ง
function clearCart() {
    cart = [];
    updateCartBadge();
    closeCartModal();
    alert("ล้างรายการในตะกร้าแล้วครับ");
}

// วาดรายการสินค้าลงในตะกร้า
function renderCartItems() {
    let container = document.getElementById('cartItemsContainer');
    let html = '';
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400 font-bold">ยังไม่ได้เลือกเมนูครับ 🍽️</div>';
        document.getElementById('cartTotalDisplay').innerText = "฿0.00";
        return;
    }

    cart.forEach((item, index) => {
        let lineTotal = item.price * item.qty;
        total += lineTotal;
        html += `
        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
            <div class="flex-1 pr-2">
                <div class="font-bold text-gray-800 text-sm">${item.name}</div>
                <div class="text-pink-600 font-bold text-xs">฿${item.price.toFixed(2)}</div>
            </div>
            
            <!-- ปุ่มบวก/ลบจำนวน -->
            <div class="flex items-center gap-3 shrink-0">
                <button onclick="adjustCartQty(${index}, -1)" class="w-8 h-8 rounded-full bg-white border border-gray-200 text-gray-600 font-bold hover:bg-gray-100 active:scale-95 transition">-</button>
                <span class="font-bold w-4 text-center">${item.qty}</span>
                <button onclick="adjustCartQty(${index}, 1)" class="w-8 h-8 rounded-full bg-pink-100 text-pink-700 font-bold hover:bg-pink-200 active:scale-95 transition">+</button>
            </div>
        </div>`;
    });

    container.innerHTML = html;
    document.getElementById('cartTotalDisplay').innerText = "฿" + total.toFixed(2);
}

// ฟังก์ชันปรับเพิ่ม/ลดจำนวนในตะกร้า
function adjustCartQty(index, amount) {
    cart[index].qty += amount;
    if (cart[index].qty <= 0) {
        cart.splice(index, 1); // ถ้าลดเหลือ 0 ให้ลบทิ้ง
    }
    updateCartBadge();
    renderCartItems(); // วาดตะกร้าใหม่
}
</script>
