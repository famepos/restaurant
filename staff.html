<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 pb-28">

  <!-- Header: ชื่อโต๊ะและยอดรวม -->
  <div class="p-4 bg-white border-b sticky top-0 z-50 shadow-sm flex justify-between items-center">
    <h2 id="header-title" class="font-bold text-lg text-pink-600">ยังไม่เลือกโต๊ะ</h2>
    <div id="totalDisplay" class="font-black text-xl text-gray-800">฿0.00</div>
  </div>

  <!-- Category Tabs -->
  <div id="category-tabs" class="flex gap-2 p-3 overflow-x-auto bg-white shadow-sm scrollbar-hide">
    <button onclick="filterProducts('ทั้งหมด')" class="bg-pink-600 text-white px-4 py-2 rounded-full font-bold whitespace-nowrap">ทั้งหมด</button>
  </div>
  
  <!-- Product Grid -->
  <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
    <div class="text-center py-10 col-span-2 text-gray-500">กำลังโหลดเมนู...</div>
  </div>

  <!-- Bottom Bar: เลือกโต๊ะ & ส่ง -->
  <div class="fixed bottom-0 w-full p-4 bg-white border-t border-gray-200 shadow-2xl flex gap-2 z-50">
    <input type="text" id="tableNo" readonly onclick="openTableModal()" placeholder="เลือกโต๊ะ" 
           class="w-1/3 p-3 border-2 border-pink-200 rounded-xl font-bold text-center cursor-pointer">
    <button onclick="sendOrder()" class="flex-1 bg-pink-600 text-white font-bold p-3 rounded-xl hover:bg-pink-700 transition">ส่งเข้าครัว</button>
  </div>

  <!-- Modal สำหรับเลือกโต๊ะ -->
  <div id="tableModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl relative">
      <h3 class="text-xl font-bold mb-4 text-pink-700">🪑 เลือกโต๊ะ</h3>
      <div id="tableGrid" class="grid grid-cols-3 gap-3 max-h-[60vh] overflow-y-auto"></div>
      <button onclick="document.getElementById('tableModal').classList.add('hidden')" class="w-full mt-4 py-3 bg-gray-200 rounded-xl font-bold">ปิด</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";
    
    // Proxy ของ Google Script
    const google = { script: { get run() { 
      let successCb = null;
      const proxy = new Proxy({}, {
        get: function(target, prop) {
          if (prop === 'withSuccessHandler') return function(cb) { successCb = cb; return proxy; };
          return function(...args) {
            fetch(API_URL, { method: "POST", body: JSON.stringify({ action: prop, args: args }) })
            .then(res => res.json()).then(data => { if(successCb) successCb(data.result); });
          };
        }
      });
      return proxy;
    }}};

    let allProducts = [];
    let cart = [];
    let allowedCategories = [];

    // 1. โหลดข้อมูลเริ่มต้น
    google.script.run.withSuccessHandler(data => { allProducts = data; renderCategories(); renderProducts('ทั้งหมด'); }).getProducts();

    function renderCategories() {
      let cats = ['ทั้งหมด', ...new Set(allProducts.map(i => i[2]).filter(c => c))];
      let tabContainer = document.getElementById('category-tabs');
      tabContainer.innerHTML = '';
      cats.forEach(cat => {
        tabContainer.innerHTML += `<button onclick="filterProducts('${cat}')" class="bg-white border border-pink-200 text-pink-700 px-4 py-2 rounded-full font-bold whitespace-nowrap">${cat}</button>`;
      });
    }

    function filterProducts(cat) { renderProducts(cat); }

    function renderProducts(cat) {
      let list = document.getElementById('product-list');
      list.innerHTML = '';
      allProducts.forEach(item => {
        let name = item[1], price = item[3], category = item[2], stock = item[7] || 999;
        let isAllowed = allowedCategories.length === 0 || allowedCategories.includes(category);
        let isOut = stock <= 0;

        if(isAllowed) {
          list.innerHTML += `
            <div class="bg-white p-3 rounded-2xl shadow border ${isOut ? 'opacity-50' : 'cursor-pointer'}" 
                 onclick="${isOut ? '' : `addToCart('${name}', ${price})`}">
              <img src="${item[8]}" class="w-full h-20 object-cover rounded-lg mb-2">
              <div class="font-bold text-sm truncate">${name}</div>
              <div class="text-pink-600 font-bold text-xs">฿${price} ${isOut ? '(หมด)' : ''}</div>
            </div>`;
        }
      });
    }

    function addToCart(name, price) {
      cart.push({name: name, qty: 1, price: price, total: price});
      updateUI();
    }

    function updateUI() {
      let total = cart.reduce((sum, item) => sum + item.total, 0);
      document.getElementById('totalDisplay').innerText = "฿" + total.toFixed(2);
    }

    // ระบบเลือกโต๊ะ
    function openTableModal() {
      document.getElementById('tableModal').classList.remove('hidden');
      google.script.run.withSuccessHandler(renderTableGrid).getTablesData();
    }

    function renderTableGrid(tables) {
      let grid = document.getElementById('tableGrid');
      grid.innerHTML = '';
      tables.forEach(table => {
        let isAvailable = (table.status === "ว่าง" || table.status === "🟢 ว่าง");
        grid.innerHTML += `
            <button onclick="selectTable('${table.name}')" class="p-4 ${isAvailable ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'} rounded-xl font-bold border border-gray-200">
                ${table.name}
            </button>`;
      });
    }

    function selectTable(name) {
      document.getElementById('tableNo').value = name;
      document.getElementById('tableModal').classList.add('hidden');
      document.getElementById('header-title').innerText = "โต๊ะ: " + name;

      // ดึงข้อมูลบุฟเฟต์และยอดรวม
      google.script.run.withSuccessHandler(function(tables) {
          let table = tables.find(t => t.name === name);
          if (table && table.packageName) {
              google.script.run.withSuccessHandler(cats => {
                  allowedCategories = cats;
                  renderProducts('ทั้งหมด');
              }).getBuffetCategoriesByPackageGS(table.packageName);
          }
      }).getTablesData();

      google.script.run.withSuccessHandler(res => {
          cart = (typeof res.items === 'string') ? JSON.parse(res.items) : (res.items || []);
          updateUI();
      }).getTableTotalGS(name);
    }

    function sendOrder() {
        let table = document.getElementById('tableNo').value;
        if(!table) return alert("เลือกโต๊ะก่อน!");
        
        google.script.run.withSuccessHandler(() => {
            alert("ส่งเข้าครัวแล้ว!");
            cart = []; updateUI();
        }).createKitchenOrderGS({ orderId: "STAFF-"+Date.now(), tableNo: table, orderType: "ทานที่ร้าน", items: cart });
    }
  </script>
</body>
</html>
