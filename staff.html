<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS: Table & Cart Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- ================= ฝั่งซ้าย: แผนผังโต๊ะ (จากภาพที่ 1) ================= -->
    <div class="w-[70%] h-full p-6 flex flex-col">
        <!-- Header ฝั่งโต๊ะ -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-700">แผนผังโต๊ะ</h1>
            <button class="bg-white border px-4 py-2 rounded shadow text-sm">รีเฟรช ↻</button>
        </div>

        <!-- Grid โต๊ะ -->
        <div class="grid grid-cols-5 gap-4 overflow-y-auto pb-10">
            <!-- โต๊ะ Active (มีออเดอร์) -->
            <div class="bg-white border-2 border-green-500 rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition">
                <span class="font-bold text-gray-800">โต๊ะนอก 1</span>
                <span class="text-gray-500 text-sm mt-1 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
                    2
                </span>
                <span class="text-green-600 font-semibold mt-2">฿1,478.00</span>
            </div>

            <!-- โต๊ะว่าง -->
            <div class="bg-white border-2 border-transparent rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition">
                <span class="font-bold text-gray-600">โต๊ะนอก 2</span>
            </div>
            
            <!-- โต๊ะว่าง -->
            <div class="bg-white border-2 border-transparent rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition">
                <span class="font-bold text-gray-600">โต๊ะ 3</span>
            </div>

            <!-- โต๊ะกำลังเลือก (Selected) -->
            <div class="bg-white border-2 border-pink-500 rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer relative">
                <span class="font-bold text-gray-800">คุณส้ม</span>
                <span class="text-gray-500 text-sm mt-1 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    1
                </span>
                <span class="text-red-500 font-semibold mt-2">฿310.00</span>
            </div>

            <!-- เพิ่มโต๊ะอื่นๆ ตามต้องการ... -->
        </div>
    </div>

    <!-- ================= ฝั่งขวา: ตะกร้าสินค้า (จากภาพที่ 2) ================= -->
    <div class="w-[30%] h-full bg-white border-l shadow-2xl flex flex-col">
        
        <!-- Header ตะกร้า -->
        <div class="flex items-center justify-between p-4 border-b">
            <div class="flex items-center space-x-2 text-pink-600 font-bold text-lg">
                <span>🛒 ตะกร้าสินค้า</span>
            </div>
            <div class="flex space-x-2 text-sm">
                <button class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-medium">📝 ประวัติ</button>
                <button class="bg-red-500 text-white px-3 py-1 rounded-full font-medium">⏱️ ปิดกะ</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="p-4 space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <button class="bg-purple-100 text-purple-700 py-2 rounded font-medium text-sm">⏸️ พักบิล</button>
                <button class="bg-orange-100 text-orange-700 py-2 rounded font-medium text-sm">📋 เรียกบิล</button>
                <button class="bg-gray-100 text-gray-700 py-2 rounded font-medium text-sm">🗑️ ล้างบิล</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button class="border border-pink-300 text-pink-600 bg-pink-50 py-2 rounded font-medium text-sm flex justify-center items-center">
                    <span class="mr-1">⊕</span> บวกรายการพิเศษ
                </button>
                <button class="bg-purple-100 text-purple-700 py-2 rounded font-medium text-sm">📣 เรียกคิว</button>
            </div>
        </div>

        <!-- บริการ & สถานะโต๊ะ -->
        <div class="px-4 pb-2">
            <div class="bg-gray-50 border rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-2">รูปแบบการบริการ</p>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button class="border-2 border-pink-400 text-pink-600 rounded-full py-1 text-sm font-bold bg-white">🍽️ โต๊ะ</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white">🛍️ กลับบ้าน</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white">🛵 ส่งของ</button>
                </div>
                
                <!-- การเชื่อมโยง: เมื่อคลิกโต๊ะฝั่งซ้าย ชื่อโต๊ะจะมาโผล่ตรงนี้ -->
                <div class="flex justify-between items-center bg-pink-50 rounded-lg p-2 border border-pink-100">
                    <span class="text-pink-800 font-bold">🪑 โต๊ะ: คุณส้ม</span>
                    <button class="bg-pink-500 text-white px-3 py-1 rounded text-sm font-medium">เปลี่ยนโต๊ะ</button>
                </div>
            </div>
        </div>

        <!-- พื้นที่แสดงรายการอาหาร (ว่างเปล่า หรือดึง Component เดิมมาใส่) -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center justify-center text-gray-400">
            <!-- นำโค้ดรายการอาหารเดิมของคุณมาใส่ตรงนี้ -->
            <p>ยังไม่มีรายการอาหาร</p>
        </div>

        <!-- Footer ชำระเงิน -->
        <div class="p-4 border-t mt-auto bg-white">
            <div class="flex justify-between items-end mb-4">
                <span class="text-xl font-bold text-pink-600">รวม</span>
                <span class="text-3xl font-bold text-pink-600">฿310.00</span>
            </div>
            <button class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition">
                ชำระเงิน
            </button>
        </div>
        
    </div>

</body>
</html>
