<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff App | FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fccfed; }
        .modern-card { background: white; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-24">

    <!-- Header: แสดงโต๊ะที่พนักงานดูแล -->
    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <h1 class="font-bold text-pink-600 text-xl">Staff Order</h1>
            <div id="selectedTableDisplay" class="bg-pink-100 px-4 py-1 rounded-full font-bold text-pink-700">เลือกโต๊ะ...</div>
        </div>
    </header>

    <!-- Category Filter (ดึงมาจากตรรกะเดิม) -->
    <div class="flex overflow-x-auto p-4 gap-2">
        <button class="bg-pink-600 text-white px-4 py-2 rounded-xl font-bold">ทั้งหมด</button>
        <!-- ปุ่มหมวดหมู่จะถูกเติมด้วย JavaScript -->
    </div>

    <!-- Product Grid -->
    <main id="productGrid" class="grid grid-cols-2 gap-4 p-4">
        <!-- การ์ดสินค้าจะถูกวาดที่นี่โดยใช้โครงสร้างจาก POS หลัก -->
    </main>

    <!-- Bottom Action Bar -->
    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex gap-2">
        <button class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">ล้างออเดอร์</button>
        <button onclick="sendToKitchen()" class="flex-1 bg-pink-600 text-white py-3 rounded-xl font-bold shadow-lg">ส่งเข้าครัว 🍳</button>
    </footer>

</body>
</html>
