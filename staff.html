<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 pb-20">
  <div class="p-4 bg-pink-600 text-white font-bold text-lg sticky top-0 z-50">สั่งอาหาร (Staff App)</div>
  
  <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
    <!-- สินค้าจะถูกโหลดมาแสดงที่นี่ -->
    <div class="text-center py-10 col-span-2">กำลังโหลดเมนู...</div>
  </div>

  <div class="fixed bottom-0 w-full p-4 bg-white border-t border-gray-200 shadow-2xl flex gap-2">
    <input type="text" id="tableNo" placeholder="เลขโต๊ะ" class="w-1/3 p-3 border-2 border-pink-200 rounded-xl font-bold focus:border-pink-500 outline-none">
    <button onclick="sendOrder()" class="flex-1 bg-pink-600 text-white font-bold p-3 rounded-xl hover:bg-pink-700 transition">ส่งเข้าครัว</button>
  </div>

  <script>
    // 1. ใส่ API_URL ของคุณ (ตัวเดิมที่ใช้ใน Index.html)
const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

// 2. ตัว Proxy เชื่อมต่อ (ต้องใส่เพื่อให้หน้าเว็บรู้จักคำสั่ง google.script.run)
const google = {
    script: {
        get run() {
            let successCb = null;
            let failureCb = null;
            
            const proxy = new Proxy({}, {
                get: function(target, prop) {
                    if (prop === 'withSuccessHandler') {
                        return function(cb) { successCb = cb; return proxy; };
                    }
                    if (prop === 'withFailureHandler') {
                        return function(cb) { failureCb = cb; return proxy; };
                    }
                    return function(...args) {
                        fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify({ action: prop, args: args }),
                            redirect: "follow"
                        })
                        .then(res => res.json())
                        .then(data => {
                            if(data.status === "Success" && successCb) {
                                successCb(data.result);
                            } else if (data.status !== "Success" && failureCb) {
                                failureCb(data.message);
                            }
                        })
                        .catch(err => {
                            if(failureCb) failureCb(err);
                            else console.error("Fetch Error:", err);
                        });
                    };
                }
            });
            return proxy;
        }
    }
};

    let cart = [];
    // โหลดสินค้าจากฐานข้อมูลเดิมของคุณ
    google.script.run.withSuccessHandler(renderProducts).getProducts();

    function renderProducts(data) {
      let list = document.getElementById('product-list');
      list.innerHTML = '';
      // data[i][1] คือชื่อสินค้า, data[i][3] คือราคา
      data.forEach(item => {
        if(item[1]) {
          list.innerHTML += `<div class="bg-white p-3 rounded-xl shadow border border-gray-100 cursor-pointer active:bg-pink-50" onclick="addToCart('${item[1]}', ${item[3]})">
            <div class="font-bold text-sm text-gray-800 truncate">${item[1]}</div>
            <div class="text-pink-600 text-xs font-bold">฿${item[3]}</div>
          </div>`;
        }
      });
    }

    function addToCart(name, price) {
      cart.push({name: name, qty: 1, price: price, total: price});
      alert(name + " เพิ่มในตะกร้าแล้ว");
    }

    function sendOrder() {
      let table = document.getElementById('tableNo').value;
      if(!table) return alert("กรุณาระบุเลขโต๊ะ!");
      if(cart.length === 0) return alert("ตะกร้าว่างเปล่า!");

      let orderData = {
        orderId: "STAFF-" + new Date().getTime(),
        tableNo: table,
        orderType: "ทานที่ร้าน",
        items: cart
      };

      // ใช้ฟังก์ชัน createKitchenOrderGS ที่มีอยู่แล้วในระบบเดิมของคุณ!
      google.script.run.withSuccessHandler(() => {
        alert("ส่งออร์เดอร์เข้าครัวสำเร็จ!");
        cart = [];
        document.getElementById('tableNo').value = '';
      }).createKitchenOrderGS(orderData);
    }
  </script>
</body>
</html>
