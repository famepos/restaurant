<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS: Table & Cart Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- ================= ฝั่งซ้าย: แผนผังโต๊ะ ================= -->
    <div class="w-[70%] h-full p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-700">แผนผังโต๊ะ</h1>
            <button class="bg-white border px-4 py-2 rounded shadow text-sm hover:bg-gray-50">รีเฟรช ↻</button>
        </div>

        <!-- Grid โต๊ะ (ถูกสร้างด้วย JavaScript ด้านล่าง) -->
        <div id="tableGrid" class="grid grid-cols-5 gap-4 overflow-y-auto pb-10">
            <!-- โต๊ะจะถูกโหลดมาใส่ตรงนี้ -->
        </div>
    </div>

    <!-- ================= ฝั่งขวา: ตะกร้าสินค้า ================= -->
    <div class="w-[30%] h-full bg-white border-l shadow-2xl flex flex-col relative">
        <div class="flex items-center justify-between p-4 border-b">
            <div class="flex items-center space-x-2 text-pink-600 font-bold text-lg">
                <span>🛒 ตะกร้าสินค้า</span>
            </div>
        </div>

        <div class="p-4 space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <button class="bg-purple-100 hover:bg-purple-200 text-purple-700 py-2 rounded font-medium text-sm transition">⏸️ พักบิล</button>
                <button class="bg-orange-100 hover:bg-orange-200 text-orange-700 py-2 rounded font-medium text-sm transition">📋 เรียกบิล</button>
                <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded font-medium text-sm transition">🗑️ ล้างบิล</button>
            </div>
        </div>

        <div class="px-4 pb-2">
            <div class="bg-gray-50 border rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-2">รูปแบบการบริการ</p>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button class="border-2 border-pink-400 text-pink-600 rounded-full py-1 text-sm font-bold bg-white">🍽️ โต๊ะ</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white opacity-50 cursor-not-allowed">🛍️ กลับบ้าน</button>
                </div>
                
                <div class="flex justify-between items-center bg-pink-50 rounded-lg p-2 border border-pink-100">
                    <!-- แสดงชื่อโต๊ะที่ถูกเลือก -->
                    <span id="cartTableName" class="text-pink-800 font-bold">🪑 กรุณาเลือกโต๊ะ</span>
                    <button class="bg-pink-500 hover:bg-pink-600 text-white px-3 py-1 rounded text-sm font-medium transition">เปลี่ยนโต๊ะ</button>
                </div>
            </div>
        </div>

        <!-- พื้นที่แสดงรายการอาหาร -->
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 flex flex-col items-center justify-center text-gray-400">
            <p>ยังไม่มีรายการอาหาร</p>
        </div>

        <!-- Footer ชำระเงิน -->
        <div class="p-4 border-t mt-auto bg-white">
            <div class="flex justify-between items-end mb-4">
                <span class="text-xl font-bold text-pink-600">รวม</span>
                <span id="cartTotalDisplay" class="text-3xl font-bold text-pink-600">฿0.00</span>
            </div>
            <button onclick="payBill()" class="w-full bg-pink-500 hover:bg-pink-600 active:scale-95 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition">
                ชำระเงิน
            </button>
        </div>
    </div>

    <!-- ================= โค้ดควบคุมการทำงาน (เชื่อมฐานข้อมูลจริง) ================= -->
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";
    
    let currentSelectedTableId = null;
    let autoRefreshTimer = null;

    // 1. ดึงข้อมูลโต๊ะทั้งหมดจาก Google Sheets
    function loadTablesRealtime() {
        if (typeof google === 'undefined') {
            console.warn("ไม่ได้รันบน Google Apps Script - โหลดข้อมูลไม่ได้");
            return;
        }

        google.script.run.withSuccessHandler(function(tablesData) {
            renderTablesUI(tablesData);
            
            // หากมีโต๊ะที่เลือกอยู่ ให้อัปเดตข้อมูลตะกร้าด้วย
            if (currentSelectedTableId) {
                let selected = tablesData.find(t => t.id === currentSelectedTableId || t.name === currentSelectedTableId);
                if (selected) {
                    renderCartUI(selected);
                } else {
                    currentSelectedTableId = null; // ถ้าระบบหาโต๊ะไม่เจอแล้ว ให้ล้างค่า
                }
            }
        }).getTablesData(); // 👈 เรียกฟังก์ชันในไฟล์ .gs
    }

    // 2. วาดหน้าจอแผนผังโต๊ะ
    function renderTablesUI(tablesData) {
        const grid = document.getElementById('tableGrid');
        grid.innerHTML = ''; 

        tablesData.forEach(t => {
            const tId = t.id || t.name; // ใช้ ID หรือชื่อโต๊ะเป็น Key
            const isSelected = currentSelectedTableId === tId;
            const isAvailable = (t.status === 'ว่าง' || t.status === '🟢 ว่าง');
            const displayName = t.customerName ? t.customerName : t.name;

            let cardHTML = '';

            if (isAvailable) {
                cardHTML = `
                <div onclick="selectTable('${tId}')" 
                     class="bg-white border-2 ${isSelected ? 'border-pink-500' : 'border-transparent'} rounded-xl p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition min-h-[7rem]">
                    <span class="font-bold text-gray-500">${t.name}</span>
                </div>`;
            } else {
                let borderClass = isSelected ? 'border-pink-500' : 'border-green-400';
                let priceClass  = isSelected ? 'text-pink-600'    : 'text-green-600';
                let totalAmount = t.totalAmount ? parseFloat(t.totalAmount) : 0;
                
                cardHTML = `
                <div onclick="selectTable('${tId}')" 
                     class="bg-white border-2 ${borderClass} rounded-xl p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition min-h-[7rem]">
                    <span class="font-bold text-gray-800 truncate w-full text-center">${displayName}</span>
                    <span class="text-gray-400 text-xs mt-1 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
                        ${t.pax || 1}
                    </span>
                    <span class="${priceClass} font-bold mt-2 text-sm">฿${totalAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                </div>`;
            }
            grid.innerHTML += cardHTML;
        });
    }

    // 3. กดเลือกโต๊ะ
    function selectTable(tableId) {
        currentSelectedTableId = tableId;
        
        // ขึ้นสถานะกำลังโหลด
        document.getElementById('cartTableName').innerHTML = `🪑 โต๊ะ: <span class="text-gray-400 animate-pulse">กำลังโหลด...</span>`;
        document.getElementById('cartItems').innerHTML = `<div class="h-full flex items-center justify-center text-pink-500 animate-pulse font-bold">กำลังดึงข้อมูล...</div>`;
        
        loadTablesRealtime(); // ดึงข้อมูลใหม่ทันทีที่กด
    }

    // 4. วาดตะกร้าสินค้า
    function renderCartUI(selectedTable) {
        let totalAmount = selectedTable.totalAmount ? parseFloat(selectedTable.totalAmount) : 0;
        document.getElementById('cartTableName').innerHTML = `🪑 โต๊ะ: <span class="text-pink-600">${selectedTable.customerName ? selectedTable.customerName : selectedTable.name}</span>`;
        document.getElementById('cartTotalDisplay').innerText = `฿${totalAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

        const cartItemsDiv = document.getElementById('cartItems');
        if (!selectedTable.items || selectedTable.items.length === 0) {
            cartItemsDiv.innerHTML = `<div class="h-full flex items-center justify-center">ยังไม่มีรายการอาหาร</div>`;
        } else {
            let itemsHTML = '<div class="w-full space-y-3">';
            selectedTable.items.forEach(item => {
                let itemTotal = parseFloat(item.price) * parseInt(item.qty);
                let itemImage = item.image || "https://placehold.co/100x100/fee2e2/dc2626?text=Food"; // ถ้าระบบไม่มีรูปให้ใช้รูปจำลอง
                
                itemsHTML += `
                <div class="flex items-center justify-between bg-white border border-gray-100 p-2.5 rounded-2xl shadow-[0_2px_8px_-3px_rgba(0,0,0,0.1)] transition-all hover:border-pink-200">
                    <div class="flex items-center gap-3 w-5/12 overflow-hidden">
                        <img src="${itemImage}" alt="${item.name}" class="w-12 h-12 rounded-xl object-cover border border-red-100 shrink-0">
                        <span class="font-bold text-gray-800 text-sm truncate" title="${item.name}">${item.name}</span>
                    </div>
                    <div class="flex items-center justify-center gap-2 w-3/12">
                        <button onclick="changeQty('${item.name}', -1)" class="w-6 h-6 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center font-bold hover:bg-gray-200 transition pb-1 active:scale-90">-</button>
                        <span class="font-bold text-pink-600 w-4 text-center text-sm">${item.qty}</span>
                        <button onclick="changeQty('${item.name}', 1)" class="w-6 h-6 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold hover:bg-pink-200 transition pb-1 active:scale-90">+</button>
                    </div>
                    <div class="flex items-center justify-end gap-2 w-4/12 pr-1">
                        <span class="font-bold text-pink-600 text-sm whitespace-nowrap">฿${itemTotal.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        <button onclick="deleteItem('${item.name}')" class="text-red-400 hover:text-red-600 font-bold ml-1 text-lg leading-none transition active:scale-90">×</button>
                    </div>
                </div>`;
            });
            itemsHTML += '</div>';
            cartItemsDiv.innerHTML = itemsHTML;
        }
    }

    // ==========================================
    // ⚙️ ฟังก์ชัน อัปเดตข้อมูล (บวก/ลบ/ลบรายการ) ส่งไปหา .gs
    // ==========================================
    
    function changeQty(itemName, changeAmt) {
        if(!currentSelectedTableId) return;
        
        // ปิดปุ่มชั่วคราวกันกดรัว
        document.getElementById('cartItems').style.opacity = '0.5';
        
        google.script.run.withSuccessHandler(function(response) {
            document.getElementById('cartItems').style.opacity = '1';
            loadTablesRealtime(); // รีเฟรชข้อมูลใหม่
        }).updateItemQtyGS(currentSelectedTableId, itemName, changeAmt); // 👈 ส่งไปเซฟลง Sheets
    }

    function deleteItem(itemName) {
        if(!currentSelectedTableId) return;
        if(confirm(`ต้องการลบ ${itemName} ออกจากโต๊ะหรือไม่?`)) {
            document.getElementById('cartItems').style.opacity = '0.5';
            google.script.run.withSuccessHandler(function(response) {
                document.getElementById('cartItems').style.opacity = '1';
                loadTablesRealtime(); 
            }).deleteItemGS(currentSelectedTableId, itemName); // 👈 ส่งไปลบใน Sheets
        }
    }

    function payBill() {
        if(!currentSelectedTableId) return alert("กรุณาเลือกโต๊ะก่อนชำระเงิน!");
        // เรียกฟังก์ชันชำระเงินเดิมของคุณได้เลย
        if(typeof window.renderPaymentButtons === 'function') {
            // โค้ดเปิด Popup ชำระเงินของคุณ
        } else {
            alert("เตรียมเปิดหน้าต่างชำระเงินของโต๊ะ: " + currentSelectedTableId);
        }
    }

    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    document.addEventListener("DOMContentLoaded", () => {
        loadTablesRealtime();
        
        // 🔄 ระบบ Real-time Polling: สั่งให้อัปเดตข้อมูลอัตโนมัติทุกๆ 4 วินาที
        autoRefreshTimer = setInterval(loadTablesRealtime, 4000); 
    });

</script>
</body>
</html>
