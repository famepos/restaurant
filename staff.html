<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Staff Mode | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

      <link rel="icon" type="image/png" href="https://i.postimg.cc/Bbc4wFC9/cc34d0ff-c8c1-4920-bcf7-701793b9dac3.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Bbc4wFC9/cc34d0ff-c8c1-4920-bcf7-701793b9dac3.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KDS FamePOS">
  <meta name="mobile-web-app-capable" content="yes"> 

  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f9fafb; margin: 0; padding: 0; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden max-w-md mx-auto bg-white shadow-xl relative">

  <div id="loginOverlay" class="fixed inset-0 bg-gradient-to-br from-pink-50 via-white to-pink-100 flex flex-col items-center justify-center z-[9999] p-4">
  <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-pink-100 flex flex-col items-center text-center">
    <img src="https://i.postimg.cc/7h052Ffb/daa42c0e-2ccf-455e-9d46-491a67539e44.png" class="w-24 h-24 object-contain mb-4 drop-shadow-md">
    <h2 class="text-3xl font-bold text-gray-800">FamePOS</h2>
    <p class="text-gray-500 text-sm mt-1 mb-8">ระบบจัดการร้านค้า ยินดีให้บริการ</p>
    
    <div class="space-y-5 w-full text-left">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">ชื่อพนักงาน หรือ เบอร์โทรศัพท์</label>
        <input type="text" id="loginUsername" class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition font-medium" placeholder="กรอกชื่อพนักงาน">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">รหัสผ่าน (PIN)</label>
        <input type="password" id="loginPassword" class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 text-center tracking-widest text-2xl font-bold transition" placeholder="••••">
      </div>
      <button onclick="processLogin()" id="btnLoginSubmit" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold p-4 rounded-2xl transition duration-200 shadow-md flex items-center justify-center space-x-2 text-lg mt-2">
        <span>🚀 เข้าสู่ระบบร้านค้า</span>
      </button>
    </div>
  </div>
  <span class="text-gray-400 text-xs mt-6">Powered by FamePOS</span>
</div>


  <!-- ================= HEADER ================= -->
<header class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-md z-10 shrink-0">
    <div>
      <h1 class="font-bold text-xl leading-none">📱 พนักงานรับออเดอร์</h1>
      <p id="currentTableDisplay" class="text-pink-200 text-sm font-semibold mt-1">กรุณาเลือกโต๊ะ</p>
    </div>
    <!-- นำปุ่มมาใส่ใน div เพื่อจัดให้อยู่คู่กัน -->
    <div class="flex gap-2"> 
      <button onclick="showScreen('tableScreen')" class="bg-pink-800/50 p-2 rounded-xl text-sm font-bold active:scale-95 transition">
        เปลี่ยนโต๊ะ
      </button>
      <button onclick="logout()" class="bg-red-500 p-2 rounded-xl text-sm font-bold active:scale-95 transition shadow-sm border border-red-400">
        ออกจากระบบ
      </button>
    </div>
  </header>
  <!-- ================= SCREEN 1: เลือกโต๊ะ ================= -->
  <div id="tableScreen" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 relative">
    <div class="flex justify-between items-center">
      <h2 class="font-bold text-gray-700 text-lg">🪑 เลือกโต๊ะที่ต้องการดูแล</h2>
      <span id="syncStatus" class="text-xs text-green-500 font-bold opacity-0 transition-opacity duration-300">● อัปเดตแล้ว</span>
    </div>
    <div id="tableGrid" class="grid grid-cols-2 gap-3">
      <div class="text-center text-gray-400 py-10 col-span-2 animate-pulse">กำลังโหลดข้อมูลโต๊ะ...</div>
    </div>
  </div>

  <!-- ================= SCREEN 2: สั่งอาหาร ================= -->
  <div id="menuScreen" class="hidden flex-1 flex flex-col overflow-hidden">
    <!-- แถบแสดงแพ็กเกจ -->
    <div class="bg-pink-50 px-4 py-3 shadow-sm border-b border-pink-100 z-10 flex justify-between items-center">
      <div class="text-xs font-bold text-gray-500">🏷️ แพ็กเกจโต๊ะนี้:</div>
      <div id="packageDisplay" class="font-black text-pink-700 text-sm bg-white px-3 py-1 rounded-full border border-pink-200 shadow-sm">
        กำลังตรวจสอบ...
      </div>
    </div>

    <!-- เมนูอาหาร -->
    <div class="flex-1 overflow-y-auto no-scrollbar p-4 bg-gray-50 pb-32">
      <div id="menuList" class="space-y-5">
        <div class="text-center text-gray-400 py-10 animate-pulse">กำลังโหลดเมนู...</div>
      </div>
    </div>

    <!-- แถบตะกร้าด้านล่าง -->
    <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] p-4 flex flex-col gap-3 rounded-t-3xl z-20">
      <div class="flex justify-between items-center px-2">
        <span class="font-bold text-gray-600">รวม <span id="cartCount" class="text-pink-600">0</span> รายการ</span>
        <span class="font-black text-2xl text-pink-600" id="cartTotal">฿0.00</span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="submitOrder()" id="btnSubmitOrder" class="py-3.5 bg-pink-500 text-white font-bold rounded-xl shadow-md active:scale-95 transition flex items-center justify-center gap-2">
          <span>🍳</span> ส่งเข้าครัว
        </button>
        <button onclick="requestBill()" id="btnRequestBill" class="py-3.5 bg-orange-100 text-orange-600 border border-orange-200 font-bold rounded-xl shadow-sm active:scale-95 transition flex items-center justify-center gap-2">
          <span>🛎️</span> เรียกเก็บเงิน
        </button>
      </div>
    </div>
  </div>

  <!-- ================= CUSTOM MODALS (หน้าต่างแจ้งเตือนทำเอง) ================= -->
  
  <!-- 1. แจ้งเตือนทั่วไป (Alert) -->
  <div id="customAlertModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-3xl p-6 max-w-xs w-full shadow-2xl text-center border-t-4 border-pink-500 transform scale-100 transition-transform">
      <div id="customAlertIcon" class="text-5xl mb-3">⚠️</div>
      <h3 id="customAlertTitle" class="text-xl font-black text-gray-800 mb-2">แจ้งเตือน</h3>
      <p id="customAlertMessage" class="text-sm text-gray-500 mb-6 whitespace-pre-line">ข้อความ</p>
      <button onclick="closeCustomAlert()" class="w-full bg-pink-500 text-white font-bold py-3.5 rounded-xl active:scale-95 transition shadow-md">
        ตกลงเข้าใจแล้ว
      </button>
    </div>
  </div>

  <!-- 2. กล่องยืนยัน (Confirm) -->
  <div id="customConfirmModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-3xl p-6 max-w-xs w-full shadow-2xl text-center border-t-4 border-orange-400">
      <div id="customConfirmIcon" class="text-5xl mb-3">❓</div>
      <h3 id="customConfirmTitle" class="text-xl font-black text-gray-800 mb-2">ยืนยัน</h3>
      <p id="customConfirmMessage" class="text-sm text-gray-500 mb-6 whitespace-pre-line">ข้อความ</p>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="closeCustomConfirm()" class="w-full bg-gray-100 text-gray-600 font-bold py-3.5 rounded-xl active:scale-95 transition">ยกเลิก</button>
        <button id="customConfirmBtn" class="w-full bg-orange-500 text-white font-bold py-3.5 rounded-xl active:scale-95 transition shadow-md">ตกลง</button>
      </div>
    </div>
  </div>



  <!-- ================= JAVASCRIPT ================= -->
  <script>
    // 🔗 1. API URL ของระบบหลังบ้านคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";

    // 🪄 2. MAGIC PROXY
    const google = {
      script: {
        get run() {
          let successCb = null;
          let failureCb = null;
          const proxy = new Proxy({}, {
            get: function(target, prop) {
              if (prop === 'withSuccessHandler') return function(cb) { successCb = cb; return proxy; };
              if (prop === 'withFailureHandler') return function(cb) { failureCb = cb; return proxy; };
              return function(...args) {
                fetch(API_URL, {
                  method: "POST",
                  headers: { "Content-Type": "text/plain;charset=utf-8" },
                  body: JSON.stringify({ action: prop, args: args })
                })
                .then(res => res.json())
                .then(data => {
                  if(data.status === "Success" && successCb) successCb(data.result);
                  else if (data.status !== "Success" && failureCb) failureCb(data.message);
                })
                .catch(err => { if(failureCb) failureCb(err); else console.error("Fetch Error:", err); });
              };
            }
          });
          return proxy;
        }
      }
    };

    // ================= ระบบ CUSTOM UI =================
    function showAlert(title, message, icon = '⚠️') {
      document.getElementById('customAlertTitle').innerText = title;
      document.getElementById('customAlertMessage').innerText = message;
      document.getElementById('customAlertIcon').innerText = icon;
      document.getElementById('customAlertModal').classList.remove('hidden');
    }

    function closeCustomAlert() {
      document.getElementById('customAlertModal').classList.add('hidden');
    }

    function showConfirm(title, message, icon, onConfirmCallback) {
      document.getElementById('customConfirmTitle').innerText = title;
      document.getElementById('customConfirmMessage').innerText = message;
      document.getElementById('customConfirmIcon').innerText = icon;
      document.getElementById('customConfirmModal').classList.remove('hidden');

      const confirmBtn = document.getElementById('customConfirmBtn');
      const newBtn = confirmBtn.cloneNode(true); // ล้าง Event เก่า
      confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);

      newBtn.addEventListener('click', () => {
        closeCustomConfirm();
        onConfirmCallback();
      });
    }

    function closeCustomConfirm() {
      document.getElementById('customConfirmModal').classList.add('hidden');
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.innerText = message;
      toast.className = "fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-xl z-[200] transition-opacity duration-300";
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 1500);
    }

    // ================= ตัวแปรระบบ =================
    let PACKAGE_RULES = {
      "a_la_carte": { name: "จานเดี่ยว (A La Carte)", freeCategories: [] }
    };

    let tablesData = []; 
    let currentTable = "";
    let menuData = [];
    let cart = [];
    let currentPackage = "a_la_carte"; 
    let isFirstLoad = true; 

    function showScreen(screenId) {
      document.getElementById('tableScreen').classList.add('hidden');
      document.getElementById('menuScreen').classList.add('hidden');
      document.getElementById(screenId).classList.remove('hidden');
    }

    // 🚀 โหลดแพ็กเกจ
    function loadPackages() {
      google.script.run
        .withSuccessHandler(function(packages) {
          if(packages && packages.length > 0) {
            packages.forEach(p => {
              PACKAGE_RULES[p.name] = { 
                name: p.name, 
                freeCategories: p.freeCategories 
              };
            });
          }
        })
        .withFailureHandler(err => console.error("Error loading packages:", err))
        .getPackagesData();
    }

    // 🚀 โหลดข้อมูลโต๊ะ
    function loadTables() {
      google.script.run
        .withSuccessHandler(function(tables) {
          isFirstLoad = false;
          tablesData = tables; 
          let html = '';
          
          if(tables && tables.length > 0) {
            tables.forEach(t => {
              let isFree = (t.status === "ว่าง" || t.status === "🟢 ว่าง");
              let statusColor = isFree ? "bg-white text-gray-700 border-gray-200 opacity-70" : "bg-pink-50 text-pink-700 border-pink-300";
              html += `<button onclick="selectTable('${t.name}')" class="p-4 rounded-2xl border-2 ${statusColor} shadow-sm font-bold text-lg active:scale-95 transition flex flex-col items-center justify-center gap-1">
                        <span class="text-2xl">🪑</span>
                        ${t.name}
                        <span class="text-xs font-normal mt-1">${t.status}</span>
                      </button>`;
            });
          } else {
            html = '<div class="col-span-2 text-center text-gray-500">ไม่พบข้อมูลโต๊ะ</div>';
          }
          
          document.getElementById('tableGrid').innerHTML = html;

          let syncIcon = document.getElementById('syncStatus');
          if(syncIcon) {
             syncIcon.style.opacity = '1';
             setTimeout(() => syncIcon.style.opacity = '0', 1000);
          }

          // ระบบดีดพนักงานออก (เรียกใช้ Custom Modal แทน alert)
          if (currentTable && !document.getElementById('menuScreen').classList.contains('hidden')) {
             let tb = tablesData.find(t => t.name === currentTable);
             if (tb && (tb.status === "ว่าง" || tb.status === "🟢 ว่าง")) {
                 showAlert('โต๊ะถูกปิดแล้ว', `โต๊ะ ${currentTable} ถูกปิดไปแล้วโดยแคชเชียร์\nระบบจะพาคุณกลับไปหน้าเลือกโต๊ะ`, '🚪');
                 showScreen('tableScreen');
                 currentTable = "";
                 cart = [];
                 document.getElementById('currentTableDisplay').innerText = "กรุณาเลือกโต๊ะ";
             }
          }
        })
        .withFailureHandler(err => console.error("Error loading tables:", err))
        .getTablesData();
    }

    function loadMenu() {
      google.script.run
        .withSuccessHandler(function(products) {
          menuData = products;
        })
        .withFailureHandler(err => console.error("Error loading menu:", err))
        .getProductsForMenu(); 
    }

    function matchPackage(orderMode, backendPackageName) {
      if (orderMode === "A La Carte" || !backendPackageName || backendPackageName.trim() === "") {
        return "a_la_carte";
      }
      let pName = backendPackageName.trim();
      if (PACKAGE_RULES[pName]) return pName;
      return "a_la_carte"; 
    }

    function selectTable(tableName) {
      let tableInfo = tablesData.find(t => t.name === tableName);
      if (!tableInfo) return;

      if (tableInfo.status === "ว่าง" || tableInfo.status === "🟢 ว่าง") {
        // ใช้ Custom Modal แทน alert
        showAlert('โต๊ะนี้ยังไม่เปิด', 'กรุณาให้แคชเชียร์เปิดโต๊ะและเลือกแพ็กเกจก่อนสั่งอาหาร\n(ระบบจะตั้งเป็น A La Carte ชั่วคราว)', '⚠️');
      }

      currentTable = tableName;
      document.getElementById('currentTableDisplay').innerText = "ดูแลโต๊ะ: " + tableName;
      cart = []; 
      
      let mode = tableInfo.orderMode || ""; 
      let pName = tableInfo.packageName || "";

      currentPackage = matchPackage(mode, pName);
      document.getElementById('packageDisplay').innerText = PACKAGE_RULES[currentPackage] ? PACKAGE_RULES[currentPackage].name : "จานเดี่ยว (A La Carte)";

      updateCartUI();
      renderMenu();
      showScreen('menuScreen');
    }

    function renderMenu() {
      if(!menuData || menuData.length === 0) return;

      const rule = PACKAGE_RULES[currentPackage] || PACKAGE_RULES["a_la_carte"];
      const freeCats = rule.freeCategories || [];

      const groupedMenu = {};
      menuData.forEach(item => {
        let cat = item.category && item.category !== "" ? item.category : "อื่นๆ";
        if(!groupedMenu[cat]) groupedMenu[cat] = [];
        groupedMenu[cat].push(item);
      });

      let html = '';
      for(let cat in groupedMenu) {
        let isFree = freeCats.includes("ALL") || freeCats.includes(cat);
        
        let badgeHtml = isFree 
          ? `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-bold shadow-sm">🟢 ฟรี (รวมในบุฟเฟต์)</span>` 
          : `<span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded-full font-bold shadow-sm">🔴 คิดเงินเพิ่ม</span>`;

        html += `
          <div class="mb-4">
            <div class="flex justify-between items-center mb-2 px-1 border-b border-gray-200 pb-2">
              <h3 class="font-black text-gray-800 text-lg">${cat}</h3>
              ${badgeHtml}
            </div>
            <div class="space-y-3">
        `;

        groupedMenu[cat].forEach(item => {
          let originalPrice = parseFloat(item.price) || 0;
          let img = item.image ? `<img src="${item.image}" class="w-16 h-16 rounded-xl object-cover">` : `<div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center text-2xl">🍽️</div>`;
          let priceDisplay = isFree 
            ? `<span class="text-gray-400 line-through text-xs mr-1">฿${originalPrice.toFixed(2)}</span> <span class="text-green-600">฿0.00</span>` 
            : `<span class="text-pink-600">฿${originalPrice.toFixed(2)}</span>`;

          html += `
            <div class="flex items-center gap-3 bg-white p-3 rounded-2xl border ${isFree ? 'border-green-100' : 'border-gray-100'} shadow-sm relative overflow-hidden">
              ${isFree ? `<div class="absolute top-0 left-0 w-1 h-full bg-green-400"></div>` : ''}
              ${img}
              <div class="flex-1">
                <div class="font-bold text-gray-800 text-sm leading-tight mb-1">${item.name}</div>
                <div class="font-black text-sm">${priceDisplay}</div>
              </div>
              <button onclick="addToCart('${item.name}', ${originalPrice}, '${cat}')" class="w-10 h-10 ${isFree ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-600'} rounded-full font-black text-xl active:scale-90 transition flex items-center justify-center shadow-sm">
                +
              </button>
            </div>
          `;
        });
        html += `</div></div>`;
      }
      document.getElementById('menuList').innerHTML = html;
    }

    function addToCart(name, originalPrice, category) {
      let existing = cart.find(i => i.name === name);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ name: name, originalPrice: originalPrice, category: category, qty: 1 });
      }
      updateCartUI();
      showToast(`เพิ่ม ${name} แล้ว`);
    }

    function updateCartUI() {
      let totalQty = 0;
      let totalPrice = 0;
      
      const rule = PACKAGE_RULES[currentPackage] || PACKAGE_RULES["a_la_carte"];
      const freeCats = rule.freeCategories || [];

      cart.forEach(i => {
        let isFree = freeCats.includes("ALL") || freeCats.includes(i.category);
        let effectivePrice = isFree ? 0 : i.originalPrice;
        
        i.price = effectivePrice; 
        totalQty += i.qty;
        totalPrice += (effectivePrice * i.qty);
      });
      
      document.getElementById('cartCount').innerText = totalQty;
      document.getElementById('cartTotal').innerText = "฿" + totalPrice.toFixed(2);
    }

    function submitOrder() {
      if (cart.length === 0) return showAlert('ตะกร้าว่างเปล่า!', 'กรุณาเลือกอาหารก่อนกดส่งออเดอร์', '🛒');
      if (!currentTable) return showAlert('ข้อผิดพลาด', 'กรุณาเลือกโต๊ะก่อนส่งออเดอร์', '❌');

      let btn = document.getElementById('btnSubmitOrder');
      btn.innerHTML = '⏳ กำลังส่ง...'; btn.disabled = true;

      let orderItems = cart.map(i => {
        return { name: i.name, price: i.price, qty: i.qty }; 
      });

      let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      let pkgName = PACKAGE_RULES[currentPackage] ? PACKAGE_RULES[currentPackage].name : "จานเดี่ยว (A La Carte)";
      
      let orderData = {
        table: currentTable,
        items: orderItems,
        total: totalPrice,
        isOpeningOnly: false,
        package: pkgName
      };

      google.script.run
        .withSuccessHandler(function(res) {
          btn.innerHTML = '<span>🍳</span> ส่งเข้าครัว'; btn.disabled = false;
          if(res.status === "Success") {
            showAlert('สำเร็จ!', 'ส่งออเดอร์เข้าครัวเรียบร้อยแล้ว', '✅');
            cart = []; 
            updateCartUI();
          } else {
            showAlert('เกิดข้อผิดพลาด', res.message, '❌');
          }
        })
        .withFailureHandler(function(err) {
          btn.innerHTML = '<span>🍳</span> ส่งเข้าครัว'; btn.disabled = false;
          showAlert('เซิร์ฟเวอร์ขัดข้อง', err.toString(), '❌');
        })
        .submitCustomerOrder(orderData);
    }

    function requestBill() {
      if (!currentTable) return showAlert('ข้อผิดพลาด', 'กรุณาเลือกโต๊ะก่อนทำรายการ', '❌');
      
      // เรียกใช้ Custom Confirm แทน confirm()
      showConfirm('ยืนยันเรียกเก็บเงิน?', `โต๊ะ: ${currentTable}\nระบบจะส่งการแจ้งเตือนไปยังหน้าจอแคชเชียร์ทันที`, '🛎️', () => {
        let btn = document.getElementById('btnRequestBill');
        btn.innerHTML = '⏳ กำลังเรียก...'; btn.disabled = true;
        
        google.script.run
          .withSuccessHandler(function(res) {
            btn.innerHTML = '<span>🛎️</span> เรียกเก็บเงิน'; btn.disabled = false;
            if (res === "Success") {
              showAlert('สำเร็จ', 'แจ้งเตือนไปยังแคชเชียร์เรียบร้อยแล้ว', '✅');
            } else {
              showAlert('เกิดข้อผิดพลาด', res, '❌');
            }
          })
          .withFailureHandler(function(err) {
            btn.innerHTML = '<span>🛎️</span> เรียกเก็บเงิน'; btn.disabled = false;
            showAlert('เซิร์ฟเวอร์ขัดข้อง', err.toString(), '❌');
          })
          .requestBillGS(currentTable);
      });
    }

// ================= ระบบล็อคอิน (AUTH) =================
  // ================= ระบบล็อคอิน (AUTH) =================

// 1. ฟังก์ชันตรวจสอบสถานะล็อคอิน
function checkLoginState() {
  let isLoggedIn = localStorage.getItem('isFamePOSLoggedIn');
  let overlay = document.getElementById('loginOverlay');
  
  if (!isLoggedIn) {
    // ถ้ายังไม่ล็อคอิน ให้ "แสดง" หน้าต่างล็อคอิน
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
  } else {
    // ถ้าล็อคอินแล้ว ให้ "ซ่อน" หน้าต่างล็อคอิน
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
  }
}

// 2. ฟังก์ชันกดล็อคอิน
function processLogin() {
  let user = document.getElementById('loginUsername').value.trim();
  let pass = document.getElementById('loginPassword').value.trim(); 
  
  if (!user || !pass) { 
    alert("กรุณากรอกชื่อผู้ใช้และรหัสผ่านให้ครบถ้วน");
    return; 
  }
  
  let btn = document.getElementById('btnLoginSubmit'); 
  btn.innerHTML = `<span>⏳ กำลังตรวจสอบ...</span>`; 
  btn.disabled = true; 
  
  google.script.run
    .withSuccessHandler(function(res) {
      btn.innerHTML = `<span>🚀 เข้าสู่ระบบร้านค้า</span>`; 
      btn.disabled = false; 
      
      if (res && res.status === "Success") { 
        // บันทึกสถานะว่าล็อคอินสำเร็จ
        localStorage.setItem('isFamePOSLoggedIn', 'true');
        localStorage.setItem('famepos_user', JSON.stringify(res)); 
        
        // ซ่อนหน้าต่างล็อคอิน
        let overlay = document.getElementById('loginOverlay');
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        
        // เคลียร์ช่องรหัสผ่านเผื่อไว้
        document.getElementById('loginPassword').value = '';
        
      } else {
        let errorMsg = (res && res.message) ? res.message : "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"; 
        alert(errorMsg); 
      }
    })
    .withFailureHandler(function(err) {
      btn.innerHTML = `<span>🚀 เข้าสู่ระบบร้านค้า</span>`; 
      btn.disabled = false; 
      alert("ระบบขัดข้อง: " + err.message); 
    })
    .ชื่อฟังก์ชันในGoogleSheetของคุณ(user, pass); // ⚠️ อย่าลืมแก้ชื่อฟังก์ชันฝั่ง GAS นะครับ
}

// 3. ฟังก์ชันออกจากระบบ
function logout() {
  showConfirm('ยืนยันออกจากระบบ', 'คุณต้องการออกจากระบบพนักงานใช่หรือไม่?', '🚪', () => {
    // ล้างข้อมูลทั้งหมด
    localStorage.removeItem('isFamePOSLoggedIn');
    localStorage.removeItem('famepos_user'); 
    
    // รีเฟรชหน้าเว็บ 1 รอบเพื่อให้เด้งกลับไปหน้าล็อคอินของตัวเอง
    window.location.reload(); 
  });
}  

// ================= เริ่มต้นทำงาน =================
    window.onload = function() {
      checkLoginState(); // <--- เช็กสถานะการล็อคอิน

      loadPackages(); 
      loadTables();
      loadMenu();

      setInterval(loadTables, 4000);
    };
  </script>
