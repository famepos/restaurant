<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Staff Mode | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f9fafb; margin: 0; padding: 0; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden max-w-md mx-auto bg-white shadow-xl relative">

  <!-- ================= HEADER ================= -->
  <header class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-md z-10 shrink-0">
    <div>
      <h1 class="font-bold text-xl leading-none">📱 พนักงานรับออเดอร์</h1>
      <p id="currentTableDisplay" class="text-pink-200 text-sm font-semibold mt-1">กรุณาเลือกโต๊ะ</p>
    </div>
    <button onclick="showScreen('tableScreen')" class="bg-pink-800/50 p-2 rounded-xl text-sm font-bold active:scale-95 transition">
      เปลี่ยนโต๊ะ
    </button>
  </header>

  <!-- ================= SCREEN 1: เลือกโต๊ะ ================= -->
  <div id="tableScreen" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
    <h2 class="font-bold text-gray-700 text-lg">🪑 เลือกโต๊ะที่ต้องการดูแล</h2>
    <div id="tableGrid" class="grid grid-cols-2 gap-3">
      <div class="text-center text-gray-400 py-10 col-span-2 animate-pulse">กำลังโหลดข้อมูลโต๊ะ...</div>
    </div>
  </div>

  <!-- ================= SCREEN 2: สั่งอาหาร & จัดการบิล ================= -->
  <div id="menuScreen" class="hidden flex-1 flex flex-col overflow-hidden">
    
    <!-- เมนูอาหาร -->
    <div class="flex-1 overflow-y-auto no-scrollbar p-4 bg-gray-50 pb-32">
      <h2 class="font-bold text-gray-700 text-lg mb-3">🍔 รายการอาหาร</h2>
      <div id="menuList" class="space-y-3">
        <div class="text-center text-gray-400 py-10 animate-pulse">กำลังโหลดเมนู...</div>
      </div>
    </div>

    <!-- แถบเครื่องมือด้านล่างสุด (Sticky Bottom) -->
    <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] p-4 flex flex-col gap-3 rounded-t-3xl">
      
      <!-- สรุปตะกร้า -->
      <div class="flex justify-between items-center px-2">
        <span class="font-bold text-gray-600">รวม <span id="cartCount" class="text-pink-600">0</span> รายการ</span>
        <span class="font-black text-2xl text-pink-600" id="cartTotal">฿0.00</span>
      </div>

      <!-- ปุ่ม Action -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="submitOrder()" id="btnSubmitOrder" class="py-3.5 bg-pink-500 text-white font-bold rounded-xl shadow-md active:scale-95 transition flex items-center justify-center gap-2">
          <span>🍳</span> ส่งเข้าครัว
        </button>
        <button onclick="requestBill()" id="btnRequestBill" class="py-3.5 bg-orange-100 text-orange-600 border border-orange-200 font-bold rounded-xl shadow-sm active:scale-95 transition flex items-center justify-center gap-2">
          <span>🛎️</span> เรียกเก็บเงิน
        </button>
      </div>
    </div>
  </div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";


    let currentTable = "";
    let menuData = [];
    let cart = [];

    // เมื่อเปิดหน้าเว็บมา ให้สลับไปหน้าจอเลือกโต๊ะก่อน
    function showScreen(screenId) {
      document.getElementById('tableScreen').classList.add('hidden');
      document.getElementById('menuScreen').classList.add('hidden');
      document.getElementById(screenId).classList.remove('hidden');
    }

    // 1. โหลดข้อมูลโต๊ะจากระบบหลังบ้าน
    function loadTables() {
      google.script.run
        .withSuccessHandler(function(tables) {
          let html = '';
          if(tables && tables.length > 0) {
            tables.forEach(t => {
              let statusColor = (t.status === "ว่าง" || t.status === "🟢 ว่าง") ? "bg-white text-gray-700 border-gray-200" : "bg-pink-50 text-pink-700 border-pink-300";
              html += `<button onclick="selectTable('${t.name}')" class="p-4 rounded-2xl border-2 ${statusColor} shadow-sm font-bold text-lg active:scale-95 transition flex flex-col items-center justify-center gap-1">
                        <span class="text-2xl">🪑</span>
                        ${t.name}
                      </button>`;
            });
          } else {
            html = '<div class="col-span-2 text-center text-gray-500">ไม่พบข้อมูลโต๊ะ</div>';
          }
          document.getElementById('tableGrid').innerHTML = html;
        })
        .withFailureHandler(err => console.error("Error loading tables:", err))
        .getTablesData();
    }

    // 2. โหลดเมนูอาหารจากระบบหลังบ้าน
    function loadMenu() {
      google.script.run
        .withSuccessHandler(function(products) {
          menuData = products;
          renderMenu();
        })
        .withFailureHandler(err => console.error("Error loading menu:", err))
        .getProductsForMenu(); // ดึงมาจากฟังก์ชันที่มีอยู่แล้วในระบบคุณ
    }

    // เลือกโต๊ะและไปหน้าสั่งอาหาร
    function selectTable(tableName) {
      currentTable = tableName;
      document.getElementById('currentTableDisplay').innerText = "ดูแลโต๊ะ: " + tableName;
      cart = []; // เคลียร์ตะกร้าทุกครั้งที่เปลี่ยนโต๊ะ
      updateCartUI();
      showScreen('menuScreen');
    }

    // วาดรายการอาหาร
    function renderMenu() {
      let html = '';
      menuData.forEach((item, index) => {
        let price = parseFloat(item.price) || 0;
        let img = item.image ? `<img src="${item.image}" class="w-16 h-16 rounded-xl object-cover">` : `<div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center text-2xl">🍽️</div>`;
        
        html += `
          <div class="flex items-center gap-3 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
            ${img}
            <div class="flex-1">
              <div class="font-bold text-gray-800 text-sm">${item.name}</div>
              <div class="text-pink-600 font-bold text-sm">฿${price.toFixed(2)}</div>
            </div>
            <button onclick="addToCart('${item.name}', ${price})" class="w-10 h-10 bg-pink-100 text-pink-600 rounded-full font-black text-xl active:scale-90 transition flex items-center justify-center">
              +
            </button>
          </div>
        `;
      });
      document.getElementById('menuList').innerHTML = html;
    }

    // เพิ่มลงตะกร้า
    function addToCart(name, price) {
      let existing = cart.find(i => i.name === name);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ name: name, price: price, qty: 1 });
      }
      updateCartUI();
      
      // แจ้งเตือนเล็กๆ
      Swal.fire({
        toast: true, position: 'top-end', showConfirmButton: false,
        timer: 1000, icon: 'success', title: 'เพิ่มลงตะกร้าแล้ว'
      });
    }

    // อัปเดตยอดรวม
    function updateCartUI() {
      let totalQty = 0;
      let totalPrice = 0;
      cart.forEach(i => {
        totalQty += i.qty;
        totalPrice += (i.price * i.qty);
      });
      
      document.getElementById('cartCount').innerText = totalQty;
      document.getElementById('cartTotal').innerText = "฿" + totalPrice.toFixed(2);
    }

    // 3. ฟังก์ชันส่งออเดอร์เข้าครัว
    function submitOrder() {
      if (cart.length === 0) return Swal.fire('ตะกร้าว่างเปล่า!', 'กรุณาเลือกอาหารก่อน', 'warning');
      if (!currentTable) return Swal.fire('ข้อผิดพลาด', 'กรุณาเลือกโต๊ะก่อนส่งออเดอร์', 'error');

      let btn = document.getElementById('btnSubmitOrder');
      btn.innerHTML = '⏳ กำลังส่ง...'; btn.disabled = true;

      let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      
      let orderData = {
        table: currentTable,
        items: cart,
        total: totalPrice,
        isOpeningOnly: false
      };

      google.script.run
        .withSuccessHandler(function(res) {
          btn.innerHTML = '<span>🍳</span> ส่งเข้าครัว'; btn.disabled = false;
          if(res.status === "Success") {
            Swal.fire('สำเร็จ!', 'ส่งออเดอร์เข้าครัวเรียบร้อย', 'success');
            cart = []; // สั่งเสร็จล้างตะกร้า
            updateCartUI();
          } else {
            Swal.fire('ข้อผิดพลาด', res.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          btn.innerHTML = '<span>🍳</span> ส่งเข้าครัว'; btn.disabled = false;
          Swal.fire('เซิร์ฟเวอร์ขัดข้อง', err.toString(), 'error');
        })
        .submitCustomerOrder(orderData);
    }

    // 4. ฟังก์ชันเรียกเก็บเงิน (แจ้งไปที่แคชเชียร์)
    function requestBill() {
      if (!currentTable) return Swal.fire('ข้อผิดพลาด', 'กรุณาเลือกโต๊ะก่อนเรียกเก็บเงิน', 'error');

      Swal.fire({
        title: 'ยืนยันเรียกเก็บเงิน?',
        text: "ระบบจะแจ้งเตือนไปยังหน้าจอแคชเชียร์ทันที",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#ec4899',
        cancelButtonColor: '#9ca3af',
        confirmButtonText: 'ตกลง, เรียกเลย',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => {
        if (result.isConfirmed) {
          let btn = document.getElementById('btnRequestBill');
          btn.innerHTML = '⏳ กำลังเรียก...'; btn.disabled = true;

          google.script.run
            .withSuccessHandler(function(res) {
              btn.innerHTML = '<span>🛎️</span> เรียกเก็บเงิน'; btn.disabled = false;
              if (res === "Success") {
                Swal.fire('แจ้งเตือนแล้ว!', 'ระบบได้ส่งสัญญาณไปที่หน้าจอแคชเชียร์แล้วครับ', 'success');
              } else {
                Swal.fire('ผิดพลาด', res, 'error');
              }
            })
            .withFailureHandler(function(err) {
              btn.innerHTML = '<span>🛎️</span> เรียกเก็บเงิน'; btn.disabled = false;
              Swal.fire('เซิร์ฟเวอร์ขัดข้อง', err.toString(), 'error');
            })
            .requestBillGS(currentTable);
        }
      });
    }

    // โหลดข้อมูลเริ่มต้นเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      loadTables();
      loadMenu();
    };
  </script>
</body>
</html>
