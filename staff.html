<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 pb-32">
  <!-- Header: ชื่อโต๊ะและยอดรวม -->
  <div class="p-4 bg-white border-b sticky top-0 z-50 shadow-sm flex justify-between items-center">
    <h2 id="header-title" class="font-bold text-xl text-pink-600">ยังไม่เลือกโต๊ะ</h2>
    <div id="totalDisplay" class="font-black text-xl text-gray-800">฿0.00</div>
  </div>
  
  <!-- แสดงรายการในตะกร้า -->
  <div id="cart-list" class="p-3 space-y-2"></div>

  <!-- รายการเมนู -->
  <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
    <div class="text-center py-10 col-span-2 text-gray-500">กำลังโหลดเมนู...</div>
  </div>

  <!-- Bottom Bar: เลือกโต๊ะ & ส่ง -->
  <div class="fixed bottom-0 w-full p-4 bg-white border-t border-gray-200 shadow-2xl flex gap-2 z-50">
    <input type="text" id="tableNo" readonly onclick="openTableModal()" 
           placeholder="เลือกโต๊ะ" class="w-1/3 p-3 border-2 border-pink-200 rounded-xl font-bold text-center cursor-pointer">
    <button onclick="sendOrder()" class="flex-1 bg-pink-600 text-white font-bold p-3 rounded-xl hover:bg-pink-700 transition">ส่งเข้าครัว</button>
  </div>

  <!-- Modal ต่างๆ -->
  <!-- (Modal โต๊ะ และ Modal เพิ่มสินค้า วางไว้ที่นี่ตามโค้ดเดิมของคุณ) -->
  
  <script>
    // --- โค้ด Proxy เดิมของคุณ ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";
    const google = { script: { get run() { /* โค้ด Proxy เดิมของคุณ */ } } };

    let cart = [];
    let currentTable = "";

    google.script.run.withSuccessHandler(renderProducts).getProducts();

    function renderProducts(data) {
      let list = document.getElementById('product-list');
      list.innerHTML = '';
      data.forEach(item => {
        if(item[1]) {
          list.innerHTML += `<div class="bg-white p-3 rounded-xl shadow border border-gray-100 cursor-pointer active:bg-pink-50" onclick="addToCart('${item[1]}', ${item[3]})">
            <div class="font-bold text-sm text-gray-800 truncate">${item[1]}</div>
            <div class="text-pink-600 text-xs font-bold">฿${item[3]}</div>
          </div>`;
        }
      });
    }

    function addToCart(name, price) {
      cart.push({name: name, qty: 1, price: price, total: price});
      renderCart();
    }

    // 🟢 ฟังก์ชันแสดงตะกร้า (ตัวสำคัญที่ขาดไป)
    function renderCart() {
      let cartList = document.getElementById('cart-list');
      cartList.innerHTML = '<h3 class="font-bold text-gray-500 mb-2">รายการที่สั่ง:</h3>';
      let total = 0;
      cart.forEach((item, index) => {
        total += item.total;
        cartList.innerHTML += `
          <div class="flex justify-between bg-white p-2 rounded-lg text-sm">
            <span>${item.name} x${item.qty}</span>
            <span class="font-bold text-pink-600">฿${item.total}</span>
          </div>`;
      });
      document.getElementById('totalDisplay').innerText = "฿" + total.toFixed(2);
    }

    function selectTable(name) {
      currentTable = name;
      document.getElementById('tableNo').value = name;
      document.getElementById('tableModal').classList.add('hidden');
      document.getElementById('header-title').innerText = "โต๊ะ: " + name;

      // ดึงข้อมูลเก่าของโต๊ะ
      google.script.run.withSuccessHandler(function(res) {
        // จัดการ JSON Data ให้เป็น Array
        let items = typeof res.items === 'string' ? JSON.parse(res.items) : (res.items || []);
        cart = items;
        renderCart();
      }).getTableTotalGS(name);
    }
    
    // ... ใส่ฟังก์ชัน openTableModal, renderTableGrid, sendOrder และอื่นๆ ของคุณต่อท้ายได้เลย ...
  </script>
</body>
</html>
