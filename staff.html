<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS: Table & Cart Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- ================= ฝั่งซ้าย: แผนผังโต๊ะ (จากภาพที่ 1) ================= -->
    <div class="w-[70%] h-full p-6 flex flex-col">
        <!-- Header ฝั่งโต๊ะ -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-700">แผนผังโต๊ะ</h1>
            <button class="bg-white border px-4 py-2 rounded shadow text-sm">รีเฟรช ↻</button>
        </div>

        <!-- Grid โต๊ะ -->
        <div class="grid grid-cols-5 gap-4 overflow-y-auto pb-10">
            <!-- โต๊ะ Active (มีออเดอร์) -->
            <div class="bg-white border-2 border-green-500 rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition">
                <span class="font-bold text-gray-800">โต๊ะนอก 1</span>
                <span class="text-gray-500 text-sm mt-1 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
                    2
                </span>
                <span class="text-green-600 font-semibold mt-2">฿1,478.00</span>
            </div>

            <!-- โต๊ะว่าง -->
            <div class="bg-white border-2 border-transparent rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition">
                <span class="font-bold text-gray-600">โต๊ะนอก 2</span>
            </div>
            
            <!-- โต๊ะว่าง -->
            <div class="bg-white border-2 border-transparent rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition">
                <span class="font-bold text-gray-600">โต๊ะ 3</span>
            </div>

            <!-- โต๊ะกำลังเลือก (Selected) -->
            <div class="bg-white border-2 border-pink-500 rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer relative">
                <span class="font-bold text-gray-800">คุณส้ม</span>
                <span class="text-gray-500 text-sm mt-1 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    1
                </span>
                <span class="text-red-500 font-semibold mt-2">฿310.00</span>
            </div>

            <!-- เพิ่มโต๊ะอื่นๆ ตามต้องการ... -->
        </div>
    </div>

    <!-- ================= ฝั่งขวา: ตะกร้าสินค้า (จากภาพที่ 2) ================= -->
    <div class="w-[30%] h-full bg-white border-l shadow-2xl flex flex-col">
        
        <!-- Header ตะกร้า -->
        <div class="flex items-center justify-between p-4 border-b">
            <div class="flex items-center space-x-2 text-pink-600 font-bold text-lg">
                <span>🛒 ตะกร้าสินค้า</span>
            </div>
            <div class="flex space-x-2 text-sm">
                <button class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-medium">📝 ประวัติ</button>
                <button class="bg-red-500 text-white px-3 py-1 rounded-full font-medium">⏱️ ปิดกะ</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="p-4 space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <button class="bg-purple-100 text-purple-700 py-2 rounded font-medium text-sm">⏸️ พักบิล</button>
                <button class="bg-orange-100 text-orange-700 py-2 rounded font-medium text-sm">📋 เรียกบิล</button>
                <button class="bg-gray-100 text-gray-700 py-2 rounded font-medium text-sm">🗑️ ล้างบิล</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button class="border border-pink-300 text-pink-600 bg-pink-50 py-2 rounded font-medium text-sm flex justify-center items-center">
                    <span class="mr-1">⊕</span> บวกรายการพิเศษ
                </button>
                <button class="bg-purple-100 text-purple-700 py-2 rounded font-medium text-sm">📣 เรียกคิว</button>
            </div>
        </div>

        <!-- บริการ & สถานะโต๊ะ -->
        <div class="px-4 pb-2">
            <div class="bg-gray-50 border rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-2">รูปแบบการบริการ</p>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button class="border-2 border-pink-400 text-pink-600 rounded-full py-1 text-sm font-bold bg-white">🍽️ โต๊ะ</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white">🛍️ กลับบ้าน</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white">🛵 ส่งของ</button>
                </div>
                
                <!-- การเชื่อมโยง: เมื่อคลิกโต๊ะฝั่งซ้าย ชื่อโต๊ะจะมาโผล่ตรงนี้ -->
                <div class="flex justify-between items-center bg-pink-50 rounded-lg p-2 border border-pink-100">
                    <span class="text-pink-800 font-bold">🪑 โต๊ะ: คุณส้ม</span>
                    <button class="bg-pink-500 text-white px-3 py-1 rounded text-sm font-medium">เปลี่ยนโต๊ะ</button>
                </div>
            </div>
        </div>

        <!-- พื้นที่แสดงรายการอาหาร (ว่างเปล่า หรือดึง Component เดิมมาใส่) -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center justify-center text-gray-400">
            <!-- นำโค้ดรายการอาหารเดิมของคุณมาใส่ตรงนี้ -->
            <p>ยังไม่มีรายการอาหาร</p>
        </div>

        <!-- Footer ชำระเงิน -->
        <div class="p-4 border-t mt-auto bg-white">
            <div class="flex justify-between items-end mb-4">
                <span class="text-xl font-bold text-pink-600">รวม</span>
                <span class="text-3xl font-bold text-pink-600">฿310.00</span>
            </div>
            <button class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition">
                ชำระเงิน
            </button>
        </div>
        
    </div>
    <!-- ============================================================== -->
<!-- 🛠️ โค้ดแปลงร่างเป็น STAFF APP (รวมหน้าผังโต๊ะ + ตะกร้าสินค้า) 🛠️ -->
<!-- ============================================================== -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. ซ่อนเมนูด้านซ้ายที่ไม่เกี่ยวข้องกับพนักงาน Staff ออก
    let hiddenNavs = ['nav-products', 'nav-inventory', 'nav-expiry', 'nav-dashboard', 'nav-expense', 'nav-settings', 'nav-shift', 'nav-cds'];
    hiddenNavs.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.style.display = 'none';
    });

    // 2. เปลี่ยนชื่อเมนูหลักเป็น "จัดการโต๊ะ"
    let navSales = document.getElementById('nav-sales');
    if(navSales) navSales.innerHTML = '<span class="text-xl">🪑</span> <span class="hidden lg:block font-bold">จัดการโต๊ะ (Staff)</span>';

    // 3. 🎯 แปลงโฉมพื้นที่ฝั่งซ้าย (ดึงตารางโต๊ะมาใส่แทนที่ค้นหาสินค้า)
    let leftPanel = document.querySelector('#salesView .flex-1.p-4') || document.querySelector('#salesView > div.flex-1');
    if(leftPanel) {
        // ล้างพื้นที่ฝั่งซ้ายเดิมทิ้ง
        leftPanel.innerHTML = `
            <div class="flex justify-between items-center mb-6 bg-white p-5 rounded-3xl shadow-sm border border-pink-100 shrink-0">
                <div>
                    <h1 class="text-3xl font-black text-pink-800 flex items-center gap-2">
                        <span class="text-4xl">🪑</span> จัดการโต๊ะ (Staff Order)
                    </h1>
                    <p class="text-gray-500 text-sm mt-1 font-medium">กดเลือกโต๊ะเพื่อเปิดบิล จัดการออเดอร์ หรือเรียกเก็บเงิน</p>
                </div>
                <button onclick="loadStaffTables()" class="px-6 py-3 bg-pink-50 text-pink-700 border-2 border-pink-200 font-bold rounded-2xl hover:bg-pink-100 shadow-sm active:scale-95 transition flex items-center gap-2">
                    🔄 อัปเดตผังโต๊ะ
                </button>
            </div>
            
            <!-- พื้นที่แสดงผังโต๊ะ -->
            <div id="staffTableGrid" class="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 content-start pb-10 pr-2">
                <div class="col-span-full text-center py-12 text-gray-400 font-bold text-lg animate-pulse">⏳ กำลังโหลดข้อมูลโต๊ะ...</div>
            </div>
        `;
    }

    // 4. 🎯 ปรับแต่งพื้นที่ตะกร้าฝั่งขวา (ซ่อนปุ่มกลับบ้าน/ส่งของ)
    let btnTakeAway = document.getElementById('btnOrderTakeAway');
    let btnDelivery = document.getElementById('btnOrderDelivery');
    if(btnTakeAway) btnTakeAway.style.display = 'none';
    if(btnDelivery) btnDelivery.style.display = 'none';

    // 5. โหลดข้อมูลผังโต๊ะทันที และสั่งให้โหลดใหม่ทุก 10 วินาที
    setTimeout(loadStaffTables, 500);
    setInterval(loadStaffTables, 10000);

    // ==========================================
    // ⚙️ อัปเดต Logic การทำงานของ Staff App
    // ==========================================

    // ❌ ปิดการส่งออเดอร์เข้าจอครัว (KDS) แบบ 100%
    window.isKitchenDisplayEnabled = function() { return false; };

    // 💳 กำหนดปุ่มชำระเงินให้เหลือแค่ โอนเงิน และ เงินสด
    window.renderPaymentButtons = function() {
        var container = document.getElementById('paymentMethodContainer');
        if(!container) return;
        container.innerHTML = `
            <button onclick="setPaymentType('โอนเงิน')" id="btnโอนเงิน" class="flex-1 min-w-[80px] p-4 rounded-xl border-2 border-pink-500 text-pink-600 font-bold bg-pink-50 transition text-lg shadow-sm">📱 โอนเงิน (ปิดบิล)</button>
            <button onclick="setPaymentType('เงินสด')" id="btnเงินสด" class="flex-1 min-w-[80px] p-4 rounded-xl border-2 border-gray-200 text-gray-500 font-bold bg-white transition hover:bg-gray-50 text-lg shadow-sm">💵 เงินสด (แจ้งแคชเชียร์)</button>
        `;
        setPaymentType('โอนเงิน'); 
    };

    // ⚙️ Logic เมื่อพนักงานกดปุ่ม "เงินสด" ให้เปลี่ยนปุ่มยืนยัน
    window.setPaymentType = function(type) {
        selectedPayment = type;
        ['โอนเงิน', 'เงินสด'].forEach(id => {
            let btn = document.getElementById('btn' + id);
            if(btn) {
                btn.className = (id === type) 
                    ? "flex-1 min-w-[80px] p-4 rounded-xl border-2 border-pink-500 text-pink-600 font-black bg-pink-50 transition shadow-sm text-lg"
                    : "flex-1 min-w-[80px] p-4 rounded-xl border-2 border-gray-200 text-gray-500 font-bold bg-white transition hover:bg-gray-50 text-lg";
            }
        });

        let cashSec = document.getElementById('cashSection');
        let numpad = document.getElementById('numpadSection');
        let btnConfirm = document.getElementById('btnConfirm');

        if(numpad) {
            numpad.querySelectorAll('button:not(#btnConfirm)').forEach(b => { b.style.opacity = "1"; b.style.pointerEvents = "auto"; });
        }

        if (type === 'เงินสด') {
            currentCash = "0"; 
            if(cashSec) cashSec.classList.add('hidden'); // ซ่อนช่องทอนเงิน
            if(typeof qrTimerInterval !== 'undefined') clearInterval(qrTimerInterval);
            let qModal = document.getElementById('qrModal'); if(qModal) qModal.classList.add('hidden');

            // เปลี่ยนปุ่มยืนยัน
            if(btnConfirm) {
                btnConfirm.innerHTML = "🛎️ แจ้งแคชเชียร์เก็บเงินสด";
                btnConfirm.className = "col-span-3 mt-2 p-5 bg-orange-500 text-white rounded-2xl font-black text-xl hover:bg-orange-600 transition shadow-lg active:scale-95";
                btnConfirm.onclick = requestCashierBill; 
            }
            if(numpad) { numpad.style.opacity = "0.3"; numpad.style.pointerEvents = "none"; }
        } 
        else if (type === 'โอนเงิน') {
            currentCash = "0";
            if(cashSec) cashSec.classList.add('hidden'); 
            if(typeof openQRModal === 'function') openQRModal();
            if(numpad) { numpad.style.opacity = "0.3"; numpad.style.pointerEvents = "none"; }

            // คืนค่าปุ่มยืนยัน
            if(btnConfirm) {
                btnConfirm.innerHTML = "ยืนยันการโอนเงิน (Enter)";
                btnConfirm.className = "col-span-3 mt-2 p-5 bg-pink-500 text-white rounded-2xl font-black text-xl hover:bg-pink-600 transition shadow-lg active:scale-95";
                btnConfirm.onclick = confirmPayment; 
            }
        }
        if(typeof calculateChange === 'function') calculateChange();
    };

    // 🛎️ ส่งสถานะ "รอชำระเงินสด" ไปให้แคชเชียร์
    window.requestCashierBill = function() {
        let tableNo = document.getElementById('inputTableNo').value.trim();
        if (!tableNo) return showToast("ไม่พบหมายเลขโต๊ะ", "error");

        let btnConfirm = document.getElementById('btnConfirm');
        if(btnConfirm) { btnConfirm.innerHTML = "⏳ กำลังแจ้งแคชเชียร์..."; btnConfirm.disabled = true; }

        google.script.run.withSuccessHandler(function() {
            showToast("ส่งสถานะให้แคชเชียร์แล้ว!", "success");
            document.getElementById('paymentModal').classList.add('hidden');
            
            // ล้างหน้าจอ
            cart = []; if(typeof updateCartUI === 'function') updateCartUI();
            document.getElementById('inputTableNo').value = '';
            document.getElementById('displaySelectedTable').innerText = '-';
            document.getElementById('tableSelectedDisplayContainer').classList.add('hidden');
            
            if(btnConfirm) { btnConfirm.disabled = false; }
            loadStaffTables(); // รีเฟรชผังโต๊ะ
        }).updateTableStatusGS(tableNo, "🟡 รอชำระเงินสด");
    };
});

// ==========================================
// ⚙️ ฟังก์ชันดึงและวาดตารางโต๊ะ (เชื่อมต่อกับตะกร้าฝั่งขวา)
// ==========================================
window.loadStaffTables = function() {
    if(typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function(tables) {
            let html = '';
            tables.forEach(t => {
                // คำนวณสีพื้นหลังตามสถานะ
                let bgColor = (t.status === 'ว่าง' || t.status === '🟢 ว่าง') ? 'bg-white border-emerald-400 hover:border-emerald-500' : 
                              (t.status === 'ไม่ว่าง' || t.status === '🔴 ไม่ว่าง' || t.status.includes('ไม่ว่าง')) ? 'bg-red-50 border-red-400 hover:border-red-500' : 
                              t.status === '🟡 เรียกเก็บเงิน' ? 'bg-amber-50 border-amber-400 animate-pulse' :
                              t.status === '🟡 รอชำระเงินสด' ? 'bg-orange-50 border-orange-400' : 'bg-gray-100 border-gray-400';
                
                let textColor = (t.status === 'ว่าง' || t.status === '🟢 ว่าง') ? 'text-emerald-600' : 
                                (t.status === 'ไม่ว่าง' || t.status === '🔴 ไม่ว่าง' || t.status.includes('ไม่ว่าง')) ? 'text-red-600' : 
                                t.status === '🟡 เรียกเก็บเงิน' ? 'text-amber-600' :
                                t.status === '🟡 รอชำระเงินสด' ? 'text-orange-600' : 'text-gray-600';

                let displayStatus = (t.status === 'ว่าง' || t.status === '🟢 ว่าง') ? '🟢 ว่าง' : t.status;
                
                html += `
                <div onclick="handleStaffTableClick('${t.name}', '${t.status}')" class="modern-card p-5 flex flex-col items-center justify-center cursor-pointer hover:-translate-y-1 hover:shadow-lg transition-all border-l-8 ${bgColor} rounded-2xl h-32 relative">
                    <h3 class="font-black text-xl text-gray-800 mb-2 truncate w-full text-center">${t.name}</h3>
                    <span class="font-bold text-xs px-3 py-1 rounded-lg bg-white/90 shadow-sm ${textColor}">${displayStatus}</span>
                </div>`;
            });
            let grid = document.getElementById('staffTableGrid');
            if(grid) grid.innerHTML = html;
        }).getTablesData();
    }
};

window.handleStaffTableClick = function(tableName, status) {
    // 1. ตั้งค่าฝั่งตะกร้าสินค้า
    document.getElementById('inputTableNo').value = tableName;
    document.getElementById('displaySelectedTable').innerText = tableName;
    let tBox = document.getElementById('tableSelectedDisplayContainer');
    if(tBox) { tBox.classList.remove('hidden'); tBox.classList.add('flex'); }
    if(typeof setOrderType === 'function') setOrderType('DineIn', document.getElementById('btnOrderDineIn'), true);

    // 2. ถ่ายโอนข้อมูล/เปิดการทำงาน
    if (status === 'ว่าง' || status === '🟢 ว่าง') {
        cart = []; if(typeof updateCartUI === 'function') updateCartUI();
        let modeModal = document.getElementById('openTableModeModal');
        if(modeModal) {
            document.getElementById('openTableNameDisplay').innerText = tableName;
            modeModal.classList.remove('hidden');
        }
    } else {
        if(typeof showToast === 'function') showToast("กำลังดึงบิลโต๊ะ " + tableName, "info", true);
        if(typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(function(res) {
                if (res && res.items && res.items.length > 0) {
                    cart = res.items;
                    if(typeof updateCartUI === 'function') updateCartUI();
                    showToast("ดึงข้อมูลสำเร็จ!", "success", true);
                } else {
                    cart = [];
                    if(typeof updateCartUI === 'function') updateCartUI();
                    showToast("โต๊ะนี้ยังไม่มีการสั่งอาหาร", "warning");
                }
            }).getTableTotalGS(tableName);
        }
    }
};
</script>

</body>
</html>
