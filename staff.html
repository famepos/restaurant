<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS: Table & Cart Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- ================= ฝั่งซ้าย: แผนผังโต๊ะ ================= -->
    <div class="w-[70%] h-full p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-700">แผนผังโต๊ะ</h1>
            <button class="bg-white border px-4 py-2 rounded shadow text-sm hover:bg-gray-50">รีเฟรช ↻</button>
        </div>

        <!-- Grid โต๊ะ (ถูกสร้างด้วย JavaScript ด้านล่าง) -->
        <div id="tableGrid" class="grid grid-cols-5 gap-4 overflow-y-auto pb-10">
            <!-- โต๊ะจะถูกโหลดมาใส่ตรงนี้ -->
        </div>
    </div>

    <!-- ================= ฝั่งขวา: ตะกร้าสินค้า ================= -->
    <div class="w-[30%] h-full bg-white border-l shadow-2xl flex flex-col relative">
        <div class="flex items-center justify-between p-4 border-b">
            <div class="flex items-center space-x-2 text-pink-600 font-bold text-lg">
                <span>🛒 ตะกร้าสินค้า</span>
            </div>
        </div>

        <div class="p-4 space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <button class="bg-purple-100 hover:bg-purple-200 text-purple-700 py-2 rounded font-medium text-sm transition">⏸️ พักบิล</button>
                <button class="bg-orange-100 hover:bg-orange-200 text-orange-700 py-2 rounded font-medium text-sm transition">📋 เรียกบิล</button>
                <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded font-medium text-sm transition">🗑️ ล้างบิล</button>
            </div>
        </div>

        <div class="px-4 pb-2">
            <div class="bg-gray-50 border rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-2">รูปแบบการบริการ</p>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button class="border-2 border-pink-400 text-pink-600 rounded-full py-1 text-sm font-bold bg-white">🍽️ โต๊ะ</button>
                    <button class="border border-gray-200 text-gray-600 rounded-full py-1 text-sm bg-white opacity-50 cursor-not-allowed">🛍️ กลับบ้าน</button>
                </div>
                
                <div class="flex justify-between items-center bg-pink-50 rounded-lg p-2 border border-pink-100">
                    <!-- แสดงชื่อโต๊ะที่ถูกเลือก -->
                    <span id="cartTableName" class="text-pink-800 font-bold">🪑 กรุณาเลือกโต๊ะ</span>
                    <button class="bg-pink-500 hover:bg-pink-600 text-white px-3 py-1 rounded text-sm font-medium transition">เปลี่ยนโต๊ะ</button>
                </div>
            </div>
        </div>

        <!-- พื้นที่แสดงรายการอาหาร -->
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 flex flex-col items-center justify-center text-gray-400">
            <p>ยังไม่มีรายการอาหาร</p>
        </div>

        <!-- Footer ชำระเงิน -->
        <div class="p-4 border-t mt-auto bg-white">
            <div class="flex justify-between items-end mb-4">
                <span class="text-xl font-bold text-pink-600">รวม</span>
                <span id="cartTotalDisplay" class="text-3xl font-bold text-pink-600">฿0.00</span>
            </div>
            <button onclick="payBill()" class="w-full bg-pink-500 hover:bg-pink-600 active:scale-95 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition">
                ชำระเงิน
            </button>
        </div>
    </div>

    <!-- ================= โค้ดควบคุมการทำงาน (JavaScript) ================= -->
    <script>
        // 1. ฐานข้อมูลจำลอง (Mock Data) แทนการดึงจาก Google Sheets
        const mockTablesData = [
            { id: "T1", name: "โต๊ะนอก 1", status: "ไม่ว่าง", pax: 2, totalAmount: 1478.00, customerName: "", items: ["กะเพราหมูสับ x 2", "ต้มยำกุ้ง x 1", "น้ำเปล่า x 2"] },
            { id: "T2", name: "โต๊ะนอก 2", status: "ว่าง", pax: 0, totalAmount: 0, customerName: "", items: [] },
            { id: "T3", name: "โต๊ะ 3", status: "ว่าง", pax: 0, totalAmount: 0, customerName: "", items: [] },
            { id: "T4", name: "โต๊ะ 16", status: "ไม่ว่าง", pax: 1, totalAmount: 310.00, customerName: "คุณส้ม", items: ["ข้าวผัดรวม x 1", "ลาเต้ร้อน x 1"] },
            { id: "T5", name: "โต๊ะ 12", status: "ว่าง", pax: 0, totalAmount: 0, customerName: "", items: [] }
        ];

        let currentSelectedTableId = null;

        // 2. ฟังก์ชันวาดโต๊ะ
        function renderTables() {
            const grid = document.getElementById('tableGrid');
            grid.innerHTML = ''; // ล้างของเก่า

            mockTablesData.forEach(t => {
                const isSelected = currentSelectedTableId === t.id;
                const isAvailable = (t.status === 'ว่าง');
                const displayName = t.customerName ? t.customerName : t.name;

                let cardHTML = '';

                if (isAvailable) {
                    // โต๊ะว่าง
                    cardHTML = `
                    <div onclick="selectTable('${t.id}')" 
                         class="bg-white border-2 ${isSelected ? 'border-pink-500' : 'border-transparent'} rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition min-h-[6rem]">
                        <span class="font-bold text-gray-600">${t.name}</span>
                    </div>`;
                } else {
                    // โต๊ะไม่ว่าง
                    let borderClass = isSelected ? 'border-pink-500' : 'border-green-500';
                    let priceClass  = isSelected ? 'text-pink-600'    : 'text-green-600';
                    
                    cardHTML = `
                    <div onclick="selectTable('${t.id}')" 
                         class="bg-white border-2 ${borderClass} rounded-lg p-4 shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition min-h-[6rem]">
                        <span class="font-bold text-gray-800">${displayName}</span>
                        <span class="text-gray-500 text-sm mt-1 flex items-center">👥 ${t.pax}</span>
                        <span class="${priceClass} font-semibold mt-2">฿${t.totalAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                    </div>`;
                }

                grid.innerHTML += cardHTML;
            });
        }

        // 3. ฟังก์ชันเมื่อกดเลือกโต๊ะ
        function selectTable(tableId) {
            currentSelectedTableId = tableId;
            renderTables(); // อัปเดตสีกรอบโต๊ะใหม่
            
            // ดึงข้อมูลโต๊ะที่เลือก
            const selectedTable = mockTablesData.find(t => t.id === tableId);
            
            // อัปเดตตะกร้าฝั่งขวา
            document.getElementById('cartTableName').innerText = `🪑 โต๊ะ: ${selectedTable.customerName ? selectedTable.customerName : selectedTable.name}`;
            document.getElementById('cartTotalDisplay').innerText = `฿${selectedTable.totalAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

            // นำรายการอาหารมาใส่ตะกร้า
            const cartItemsDiv = document.getElementById('cartItems');
            if (selectedTable.items.length === 0) {
                cartItemsDiv.innerHTML = `<p class="flex items-center justify-center h-full text-gray-400">ยังไม่มีรายการอาหาร</p>`;
            } else {
                let itemsHTML = '<div class="w-full space-y-3">';
                selectedTable.items.forEach(item => {
                    itemsHTML += `<div class="p-3 bg-pink-50 text-pink-800 rounded-lg text-sm border border-pink-100 shadow-sm">${item}</div>`;
                });
                itemsHTML += '</div>';
                cartItemsDiv.innerHTML = itemsHTML;
            }
        }

        // 4. ฟังก์ชันจำลองตอนกดชำระเงิน
        function payBill() {
            if(!currentSelectedTableId) {
                alert("กรุณาเลือกโต๊ะก่อนชำระเงิน!");
                return;
            }
            alert("กำลังทำรายการชำระเงิน...");
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        document.addEventListener("DOMContentLoaded", renderTables);

    </script>
</body>
</html>
