<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff App | FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fccfed; }
    </style>
</head>
<body class="pb-24">

    <!-- 1. HEADER (คงที่) -->
    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <h1 class="font-bold text-pink-600 text-xl">Staff Order</h1>
        <div id="selectedTableDisplay" class="bg-pink-100 px-4 py-1 rounded-full font-bold text-pink-700">เลือกโต๊ะ...</div>
    </header>

    <!-- 2. VIEW: หน้าเลือกโต๊ะ (แสดงตอนเริ่มต้น) -->
    <div id="tableSelectorView" class="p-4 grid grid-cols-3 gap-3">
        <!-- โต๊ะจะถูกโหลดมาแสดงที่นี่ -->
    </div>

    <!-- 3. VIEW: หน้าสั่งอาหาร (ซ่อนไว้ก่อน) -->
    <div id="orderView" class="hidden">
        <!-- Category Filter -->
        <div class="flex overflow-x-auto p-4 gap-2">
            <button class="bg-pink-600 text-white px-4 py-2 rounded-xl font-bold">ทั้งหมด</button>
        </div>

        <!-- Product Grid -->
        <main id="productGrid" class="grid grid-cols-2 gap-4 p-4">
            <!-- การ์ดสินค้า -->
        </main>
    </div>

    <!-- 4. FOOTER (จะแสดงเฉพาะในหน้าสั่งอาหาร) -->
    <footer id="orderFooter" class="hidden fixed bottom-0 w-full bg-white border-t p-4 flex gap-2">
        <button class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">ล้างออเดอร์</button>
        <button onclick="sendToKitchen()" class="flex-1 bg-pink-600 text-white py-3 rounded-xl font-bold shadow-lg">ส่งเข้าครัว 🍳</button>
        <!-- ย้ายปุ่มเช็คบิลมาวางไว้ข้างๆ เพื่อความสะดวก -->
        <button onclick="clearTable()" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold shadow-lg">✅ เช็คบิล</button>
    </footer>

    <!-- MODALS -->
    <div id="openTableModal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 id="modalTableName" class="text-xl font-bold mb-4 text-pink-700">เปิดโต๊ะ: -</h3>
            <input type="number" id="headCountInput" placeholder="จำนวนลูกค้า (ท่าน)" class="w-full p-4 border rounded-xl mb-4">
            <button onclick="confirmOpenTable()" class="w-full bg-pink-600 text-white py-3 rounded-xl font-bold">ยืนยันเปิดโต๊ะ</button>
        </div>
    </div>

<script>
// 1. ตัวแปร API (ใส่ลิงก์ของคุณให้ถูกต้อง)
const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";

// 2. MAGIC PROXY: ตัวเชื่อมให้คำสั่ง google.script.run ใช้งานได้บน Browser
const google = {
    script: {
        get run() {
            let successCb = null;
            let failureCb = null;
            
            const proxy = new Proxy({}, {
                get: function(target, prop) {
                    if (prop === 'withSuccessHandler') {
                        return function(cb) { successCb = cb; return proxy; };
                    }
                    if (prop === 'withFailureHandler') {
                        return function(cb) { failureCb = cb; return proxy; };
                    }
                    return function(...args) {
                        fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify({ action: prop, args: args }),
                            redirect: "follow"
                        })
                        .then(res => res.json())
                        .then(data => {
                            if(data.status === "Success" && successCb) {
                                successCb(data.result);
                            } else if (data.status !== "Success" && failureCb) {
                                failureCb(data.message);
                            }
                        })
                        .catch(err => {
                            if(failureCb) failureCb(err);
                            else console.error("Fetch Error:", err);
                        });
                    };
                }
            });
            return proxy;
        }
    }
};

// เริ่มโหลดทันทีที่หน้าจอทำงาน
document.addEventListener("DOMContentLoaded", function() {
    // เอาคำสั่งซ่อน productGrid ออก เพราะเราซ่อนกล่องแม่มันไปแล้ว
    loadTableSelector(); // โหลดหน้าโต๊ะทันที
    loadProducts();      // โหลดสินค้ามารอไว้เลย
});

// ตัวแปรสำหรับเก็บรายการในตะกร้าและสินค้า
let cart = []; 
let currentTable = "โต๊ะ 01"; 
let allSalesProducts = [];

// ==========================================
// 1. ระบบจัดการโต๊ะ
// ==========================================

// ดึงข้อมูลโต๊ะจาก Google Sheets
function loadTableSelector() {
    google.script.run.withSuccessHandler(function(tables) {
        let container = document.getElementById('tableSelectorView');
        let html = '';
        
        tables.forEach(table => {
            let color = (table.status === 'ว่าง' || table.status === '🟢 ว่าง') ? 'bg-green-100 border-green-300 text-green-700' : 'bg-red-100 border-red-300 text-red-700';
            
            html += `
            <div onclick="selectTable('${table.name}', '${table.status}')" class="p-4 rounded-xl border-2 ${color} text-center font-bold shadow-sm cursor-pointer active:scale-95 transition">
                <div class="text-sm">${table.name}</div>
                <div class="text-[10px]">${table.status}</div>
            </div>`;
        });
        container.innerHTML = html;
    }).getTablesData();
}

// ฟังก์ชันเมื่อพนักงานกดเลือกโต๊ะ
function selectTable(name, status) {
    selectedTable = name;
    if (status === 'ว่าง' || status === '🟢 ว่าง') {
        document.getElementById('modalTableName').innerText = "เปิดโต๊ะ: " + name;
        document.getElementById('openTableModal').classList.remove('hidden');
    } else {
        enterOrderView(name);
    }
}

// ฟังก์ชันยืนยันเปิดโต๊ะ
function confirmOpenTable() {
    let count = document.getElementById('headCountInput').value;
    // ป้องกันการกรอกค่าว่าง
    if(!count) count = 1; 

    google.script.run.withSuccessHandler(() => {
        document.getElementById('openTableModal').classList.add('hidden');
        enterOrderView(selectedTable);
    }).openTableGS(selectedTable, 'A_la_carte', count, '', '');
}

// ==========================================
// 2. ระบบสั่งอาหาร
// ==========================================

// เข้าหน้าสั่งอาหาร
function enterOrderView(name) {
    currentTable = name;
    
    // 1. ซ่อนหน้าเลือกโต๊ะ
    document.getElementById('tableSelectorView').classList.add('hidden');
    
    // 2. โชว์หน้าสั่งอาหาร (orderView)
    document.getElementById('orderView').classList.remove('hidden'); 
    
    // 🟢 3. บังคับโชว์กริดสินค้า (แก้บั๊กตรงนี้ครับ!)
    document.getElementById('productGrid').classList.remove('hidden');
    
    // 4. โชว์ Footer
    document.getElementById('orderFooter').classList.remove('hidden');
    
    // 5. เปลี่ยนชื่อโต๊ะบน Header
    document.getElementById('selectedTableDisplay').innerText = "โต๊ะ: " + name;
}
// ฟังก์ชันโหลดข้อมูลสินค้า
function loadProducts() {
    google.script.run.withSuccessHandler(function(data) {
        console.log("ดึงข้อมูลสินค้ามาแล้ว: ", data);
        if (data && data.length > 0) {
            allSalesProducts = data;
            renderProductGrid(allSalesProducts);
        }
    }).getProducts();
}

// ฟังก์ชันวาดการ์ดสินค้า
function renderProductGrid(data) {
    let grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    
    data.forEach(function(row) {
        let name = row[1] || "ไม่มีชื่อ";
        let price = parseFloat(row[3]) || 0;
        let imageUrl = row[8] || "https://via.placeholder.com/150"; 
        
        let card = document.createElement('div');
        card.className = "modern-card p-3 shadow-sm border border-gray-100 flex flex-col bg-white";
        card.innerHTML = `
            <img src="${imageUrl}" class="w-full h-24 object-cover rounded-xl mb-2" onerror="this.src='https://via.placeholder.com/150'">
            <h3 class="font-bold text-sm text-gray-800 line-clamp-1">${name}</h3>
            <p class="text-pink-600 font-bold mt-auto">฿${price.toFixed(2)}</p>
            <button onclick="addToCart('${name}', ${price})" class="mt-2 w-full bg-pink-500 text-white font-bold py-2 rounded-xl text-sm active:scale-95 transition">เพิ่มลงตะกร้า</button>
        `;
        grid.appendChild(card);
    });
}

// ==========================================
// 3. ระบบตะกร้า และ ส่งเข้าครัว
// ==========================================

function addToCart(name, price) {
    let existing = cart.find(item => item.name === name);
    if(existing) {
        existing.qty++;
    } else {
        cart.push({ name: name, price: price, qty: 1 });
    }
    // เปลี่ยนข้อความบนปุ่มชั่วคราวให้พนักงานรู้ว่าเพิ่มแล้ว
    let btn = document.querySelector(`button[onclick="addToCart('${name}', ${price})"]`);
    if(btn) {
        let oldText = btn.innerText;
        btn.innerText = "✅ เพิ่มแล้ว";
        btn.classList.replace("bg-pink-500", "bg-green-500");
        setTimeout(() => {
            btn.innerText = oldText;
            btn.classList.replace("bg-green-500", "bg-pink-500");
        }, 1000);
    }
    console.log("ตะกร้าปัจจุบัน:", cart);
}

function sendToKitchen() {
    if (cart.length === 0) {
        alert("ตะกร้าว่างเปล่า! กรุณาเลือกสินค้าก่อนครับ");
        return;
    }

    let orderData = {
        orderId: "STF-" + Date.now(), 
        tableNo: currentTable,
        orderType: "ทานที่ร้าน",
        items: cart.map(item => ({
            name: item.name,
            qty: item.qty
        }))
    };

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ 
            action: "createKitchenOrderGS", 
            args: [orderData] 
        }),
        redirect: "follow"
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "Success") {
            alert("ส่งออเดอร์เข้าครัวเรียบร้อย! 🍳");
            cart = []; // ล้างตะกร้า
        } else {
            alert("เกิดข้อผิดพลาด: " + data.message);
        }
    })
    .catch(err => {
        alert("การเชื่อมต่อล้มเหลว");
    });
}

// ==========================================
// 4. ระบบเคลียร์โต๊ะ
// ==========================================

function clearTable() {
    if (!currentTable) return;

    // ใช้ confirm พื้นฐานของ Browser เพื่อป้องกันบั๊ก
    let isConfirm = confirm(`ยืนยันการเคลียร์โต๊ะ ${currentTable} เพื่อให้ลูกค้าท่านใหม่เข้ามาใช้งาน?`);
    
    if (isConfirm) {
        google.script.run
            .withSuccessHandler(function() {
                alert(`เคลียร์โต๊ะ ${currentTable} ว่างแล้วครับ`);
                
                // 1. ล้างตะกร้า
                cart = [];
                currentTable = "";
                
                // 2. ซ่อนหน้าเมนูและ Footer
                document.getElementById('orderView').classList.add('hidden');
                document.getElementById('orderFooter').classList.add('hidden');
                
                // 3. เปลี่ยนหัวกลับเป็นยังไม่เลือกโต๊ะ
                document.getElementById('selectedTableDisplay').innerText = "เลือกโต๊ะ...";
                
                // 4. โชว์หน้าโต๊ะกลับมา
                document.getElementById('tableSelectorView').classList.remove('hidden');
                
                // 5. โหลดสถานะโต๊ะใหม่
                loadTableSelector(); 
            })
            .updateTableStatusGS(currentTable, "ว่าง"); 
    }
}
</script>
</body>
</html>
