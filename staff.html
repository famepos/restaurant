<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .bg-famepos { background-color: #fdf2f8; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <!-- Header -->
    <div class="p-4 bg-white border-b shadow-sm flex justify-between items-center sticky top-0 z-40">
        <h2 id="header-title" class="font-bold text-lg text-pink-700">เลือกโต๊ะ</h2>
        <div id="totalDisplay" class="font-black text-xl text-gray-800">฿0.00</div>
    </div>

    <!-- ปุ่มเลือกโต๊ะ -->
    <div class="p-4">
        <button onclick="openTableModal()" class="w-full py-4 bg-white border-2 border-pink-500 text-pink-600 rounded-2xl font-bold shadow-md">🪑 เลือกหมายเลขโต๊ะ</button>
    </div>

    <!-- Modal เลือกโต๊ะ (เหมือนภาพ 1) -->
    <div id="tableModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <h3 class="text-xl font-black text-pink-700 mb-6 text-center">🪑 เลือกหมายเลขโต๊ะ</h3>
            <div id="tableGrid" class="space-y-6"></div>
            <button onclick="document.getElementById('tableModal').classList.add('hidden')" class="w-full mt-6 py-3 bg-gray-200 rounded-xl font-bold">ปิด</button>
        </div>
    </div>

    <!-- Modal เปิดโต๊ะ (เหมือนภาพ 2 และ 3) -->
    <div id="openTableModeModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl relative">
            <button onclick="document.getElementById('openTableModeModal').classList.add('hidden')" class="absolute top-4 right-5 text-gray-400 text-3xl font-bold">&times;</button>
            <div class="text-center mb-6">
                <h2 class="text-xl font-black text-pink-700">🪑 เปิดโต๊ะอาหาร: <span id="openTableNameDisplay">-</span></h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">ระบุโหมด จำนวนลูกค้า</p>
            </div>

            <div class="space-y-4">
                <!-- สลับโหมด -->
                <div class="flex p-1 bg-gray-100 rounded-2xl">
                    <button type="button" id="btnModeBuffet" onclick="setTableMode('Buffet')" class="flex-1 py-3 bg-white text-pink-700 rounded-xl font-bold text-xs shadow-sm">🥩 ระบบบุฟเฟต์</button>
                    <button type="button" id="btnModeAlacarte" onclick="setTableMode('A_la_carte')" class="flex-1 py-3 text-gray-500 rounded-xl font-bold text-xs">🍽️ สั่งแยก</button>
                </div>

                <!-- แพ็กเกจ (แสดงเฉพาะบุฟเฟต์) -->
                <div id="buffetPackageContainer">
                    <select id="selectBuffetPackage" class="w-full p-3.5 border-2 border-pink-100 rounded-xl font-bold text-pink-700 text-sm"></select>
                </div>

                <!-- จำนวนคน -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between border-b pb-2"><span class="font-bold text-sm">👨 ผู้ใหญ่</span><div class="flex items-center gap-2"><button onclick="adjustHead('adult', -1)" class="w-8 h-8 bg-gray-100 rounded-lg">-</button><input type="number" id="inputAdultCount" value="1" class="w-10 text-center font-bold outline-none"><button onclick="adjustHead('adult', 1)" class="w-8 h-8 bg-gray-100 rounded-lg">+</button></div></div>
                    <div class="flex items-center justify-between border-b pb-2"><span class="font-bold text-sm">👦 เด็ก</span><div class="flex items-center gap-2"><button onclick="adjustHead('kid', -1)" class="w-8 h-8 bg-gray-100 rounded-lg">-</button><input type="number" id="inputKidCount" value="0" class="w-10 text-center font-bold outline-none"><button onclick="adjustHead('kid', 1)" class="w-8 h-8 bg-gray-100 rounded-lg">+</button></div></div>
                    <div class="flex items-center justify-between"><span class="font-bold text-sm">🧓 ผู้สูงวัย</span><div class="flex items-center gap-2"><button onclick="adjustHead('senior', -1)" class="w-8 h-8 bg-gray-100 rounded-lg">-</button><input type="number" id="inputSeniorCount" value="0" class="w-10 text-center font-bold outline-none"><button onclick="adjustHead('senior', 1)" class="w-8 h-8 bg-gray-100 rounded-lg">+</button></div></div>
                </div>

                <button onclick="confirmOpenTable()" class="w-full py-4 bg-[#e91e63] text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transform transition">🚀 ยืนยันเปิดโต๊ะ</button>
            </div>
        </div>
    </div>

<script>
    // 1. ประกาศตัวแปร google ก่อนเป็นอันดับแรก เพื่อให้เรียกใช้ได้ทั่วถึง (Global Scope)
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";
    const RunManager = { 
        successCb: null, 
        withSuccessHandler: function(cb) { this.successCb = cb; return this; }, 
        runMethod: function(m, a) { 
            fetch(API_URL, {method:"POST", body:JSON.stringify({action:m, args:a})})
            .then(r=>r.json()).then(d=>{ if(this.successCb && d.status==="Success") this.successCb(d.result); }); 
        } 
    };
    const google = { script: { run: new Proxy(RunManager, { get: (t, p) => p in t ? t[p] : (...args) => t.runMethod(p, args) }) } };

    // 2. ตัวแปรอื่นๆ
    let cart = [], allProducts = [], currentTable = "", currentPackage = {name:"", price:0};

    // 3. เริ่มทำงาน
    google.script.run.withSuccessHandler(data => { allProducts = data; }).getProducts();

    // 4. ฟังก์ชันต่างๆ (เรียกใช้ google ได้แล้ว)
    function openTableModal() {
        document.getElementById('tableModal').classList.remove('hidden');
        google.script.run.withSuccessHandler(renderTableGrid).getTablesData();
    }

    function renderTableGrid(tables) {
        let grid = document.getElementById('tableGrid'); grid.innerHTML = '';
        tables.forEach(t => {
            let isAvail = (t.status === "ว่าง" || t.status === "🟢 ว่าง");
            grid.innerHTML += `<button onclick="${isAvail ? `openTableModeModal('${t.name}')` : `selectTable('${t.name}')`}" 
                class="p-4 ${isAvail ? 'bg-green-50' : 'bg-orange-50'} rounded-xl font-bold w-full border text-sm">
                ${t.name} ${isAvail ? '' : `👤${t.headCount || 0}`}</button>`;
        });
    }

    function openTableModeModal(name) {
        document.getElementById('openTableModeModal').classList.remove('hidden');
        document.getElementById('openTableNameDisplay').innerText = name;
        google.script.run.withSuccessHandler(pkgs => {
            let select = document.getElementById('selectBuffetPackage');
            select.innerHTML = '';
            pkgs.forEach(p => select.innerHTML += `<option value="${p.name}">${p.name}</option>`);
        }).getBuffetPackagesGS();
    }

    function setTableMode(mode) {
        document.getElementById('selectedTableMode').value = mode;
        let buffetBtn = document.getElementById('btnModeBuffet');
        let alaBtn = document.getElementById('btnModeAlacarte');
        let pkg = document.getElementById('buffetPackageContainer');
        if(mode === 'Buffet') {
            buffetBtn.className = "flex-1 py-3 bg-white text-pink-700 rounded-xl font-bold text-xs shadow-sm";
            alaBtn.className = "flex-1 py-3 text-gray-500 rounded-xl font-bold text-xs";
            pkg.classList.remove('hidden');
        } else {
            buffetBtn.className = "flex-1 py-3 text-gray-500 rounded-xl font-bold text-xs";
            alaBtn.className = "flex-1 py-3 bg-white text-pink-700 rounded-xl font-bold text-xs shadow-sm";
            pkg.classList.add('hidden');
        }
    }

    function adjustHeadCount(type, val) {
        let el = document.getElementById(type === 'adult' ? 'inputAdultCount' : (type === 'kid' ? 'inputKidCount' : 'inputSeniorCount'));
        let n = parseInt(el.value) + val;
        if(n >= 0) el.value = n;
    }

    function confirmOpenTable() {
        let name = document.getElementById('openTableNameDisplay').innerText;
        let head = parseInt(document.getElementById('inputAdultCount').value) + parseInt(document.getElementById('inputKidCount').value);
        let pkg = document.getElementById('selectBuffetPackage').value;
        google.script.run.withSuccessHandler(() => {
            document.getElementById('openTableModeModal').classList.add('hidden');
            document.getElementById('tableModal').classList.add('hidden');
            selectTable(name);
        }).openTableGS(name, 'Buffet', head, pkg, '90');
    }

    function selectTable(name) {
        currentTable = name;
        document.getElementById('tableNo').value = name;
        document.getElementById('tableModal').classList.add('hidden');
        document.getElementById('header-title').innerText = "โต๊ะ: " + name;
        google.script.run.withSuccessHandler(res => {
            cart = (typeof res.items === 'string') ? JSON.parse(res.items) : (res.items || []);
            document.getElementById('totalDisplay').innerText = "฿" + parseFloat(res.total || 0).toFixed(0);
        }).getTableTotalGS(name);
    }

    function sendOrder() {
        if(!currentTable) return alert("เลือกโต๊ะ!");
        google.script.run.withSuccessHandler(() => { alert("ส่งเข้าครัวแล้ว!"); cart=[]; updateUI(); }).createKitchenOrderGS({ orderId: "STAFF-"+Date.now(), tableNo: currentTable, orderType: "ทานที่ร้าน", items: cart });
    }
    
    function updateUI() { document.getElementById('totalDisplay').innerText = "฿" + cart.reduce((s, i) => s + i.total, 0).toFixed(0); }
</script>
</body>
</html>
