<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 pb-28">

  <!-- Header -->
  <div class="p-4 bg-white border-b sticky top-0 z-40 shadow-sm flex justify-between items-center">
    <h2 id="header-title" class="font-bold text-lg text-pink-600 truncate">ยังไม่เลือกโต๊ะ</h2>
    <div id="totalDisplay" class="font-black text-xl text-gray-800">฿0.00</div>
  </div>

  <div id="product-list" class="grid grid-cols-2 gap-3 p-3"></div>

  <!-- ปุ่มเพิ่มสินค้า -->
  <button onclick="openProductForm()" class="fixed bottom-24 right-4 bg-blue-600 text-white p-4 rounded-full shadow-lg z-30">+</button>

  <!-- Bottom Bar: เลือกโต๊ะ & ส่ง -->
  <div class="fixed bottom-0 w-full p-4 bg-white border-t shadow-2xl flex gap-2 z-40">
    <input type="text" id="tableNo" readonly onclick="openTableModal()" placeholder="เลือกโต๊ะ" class="w-1/3 p-3 border-2 border-pink-200 rounded-xl font-bold text-center cursor-pointer">
    <button onclick="sendOrder()" class="flex-1 bg-pink-600 text-white font-bold p-3 rounded-xl hover:bg-pink-700 transition">ส่งเข้าครัว</button>
  </div>

  <!-- Modal เลือกโต๊ะ -->
  <div id="tableModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
      <h3 class="text-xl font-bold mb-4 text-pink-700">🪑 เลือกโต๊ะ</h3>
      <div id="tableGrid" class="grid grid-cols-3 gap-3"></div>
      <button onclick="document.getElementById('tableModal').classList.add('hidden')" class="w-full mt-4 py-3 bg-gray-200 rounded-xl font-bold">ปิด</button>
    </div>
  </div>

  <!-- 🌟 Modal เปิดโต๊ะ (เหมือนหน้า POS เป๊ะ) -->
  <div id="openTableModeModal" class="hidden fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-md p-6 shadow-2xl">
        <h2 class="text-xl font-black text-pink-700 text-center mb-4">🪑 เปิดโต๊ะ: <span id="openTableNameDisplay"></span></h2>
        
        <!-- โหมด -->
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="setTableMode('Buffet')" id="btnBuffet" class="py-2 border-2 border-pink-500 bg-pink-50 text-pink-700 rounded-xl font-bold">🥩 ระบบบุฟเฟต์</button>
            <button onclick="setTableMode('A_la_carte')" id="btnAla" class="py-2 border-2 border-gray-100 text-gray-500 rounded-xl font-bold">🍽️ สั่งแยก</button>
        </div>

        <select id="selectBuffetPackage" class="w-full p-3 border rounded-xl mb-4 font-bold"></select>

        <!-- จำนวนคน -->
        <div class="space-y-2 mb-4">
            <div class="flex items-center justify-between bg-gray-50 p-2 rounded-xl">
                <span>👨 ผู้ใหญ่</span>
                <div class="flex items-center gap-2"><button onclick="adjustHead('adult', -1)" class="w-8 h-8 bg-white rounded-lg">-</button><input type="number" id="inputAdultCount" value="1" class="w-10 text-center bg-transparent"><button onclick="adjustHead('adult', 1)" class="w-8 h-8 bg-white rounded-lg">+</button></div>
            </div>
            <div class="flex items-center justify-between bg-gray-50 p-2 rounded-xl">
                <span>👦 เด็ก</span>
                <div class="flex items-center gap-2"><button onclick="adjustHead('kid', -1)" class="w-8 h-8 bg-white rounded-lg">-</button><input type="number" id="inputKidCount" value="0" class="w-10 text-center bg-transparent"><button onclick="adjustHead('kid', 1)" class="w-8 h-8 bg-white rounded-lg">+</button></div>
            </div>
        </div>

        <button onclick="confirmOpenTable()" class="w-full py-4 bg-pink-600 text-white font-bold rounded-2xl">ยืนยันเปิดโต๊ะ</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";
    const RunManager = { successCb: null, withSuccessHandler: function(cb) { this.successCb = cb; return this; }, runMethod: function(m, a) { fetch(API_URL, {method:"POST", body:JSON.stringify({action:m, args:a})}).then(r=>r.json()).then(d=>{if(this.successCb && d.status==="Success") this.successCb(d.result);}); } };
    const google = { script: { run: new Proxy(RunManager, { get: (t, p) => p in t ? t[p] : (...args) => t.runMethod(p, args) }) } };

    let cart = [], allProducts = [], currentTable = "";

    google.script.run.withSuccessHandler(data => { allProducts = data; renderProducts(allProducts); }).getProducts();

    function renderProducts(data) {
        let list = document.getElementById('product-list'); list.innerHTML = '';
        data.forEach(item => {
            if(item[1]) list.innerHTML += `<div class="bg-white p-3 rounded-2xl shadow border cursor-pointer" onclick="addToCart('${item[1]}', ${item[3]})"><img src="${item[8]}" class="w-full h-20 object-cover rounded-lg mb-2"><div class="font-bold text-sm truncate">${item[1]}</div><div class="text-pink-600 font-bold text-xs">฿${item[3]}</div></div>`;
        });
    }

    function addToCart(name, price) { cart.push({name: name, qty: 1, price: price, total: price}); updateUI(); }
    function updateUI() { document.getElementById('totalDisplay').innerText = "฿" + cart.reduce((s, i) => s + i.total, 0).toFixed(2); }

    function openTableModal() {
        document.getElementById('tableModal').classList.remove('hidden');
        google.script.run.withSuccessHandler(renderTableGrid).getTablesData();
    }

    function renderTableGrid(tables) {
        let grid = document.getElementById('tableGrid'); grid.innerHTML = '';
        tables.forEach(t => {
            let isAvail = (t.status === "ว่าง" || t.status === "🟢 ว่าง");
            grid.innerHTML += `<button onclick="${isAvail ? `openTableModeModal('${t.name}')` : `selectTable('${t.name}')`}" 
                class="p-4 ${isAvail ? 'bg-green-100' : 'bg-orange-100'} rounded-xl font-bold">${t.name}</button>`;
        });
    }

    function openTableModeModal(name) {
        document.getElementById('openTableModeModal').classList.remove('hidden');
        document.getElementById('openTableNameDisplay').innerText = name;
        google.script.run.withSuccessHandler(pkgs => {
            let select = document.getElementById('selectBuffetPackage');
            pkgs.forEach(p => select.innerHTML += `<option value="${p.name}">${p.name}</option>`);
        }).getBuffetPackagesGS();
    }

    function adjustHead(type, val) {
        let el = document.getElementById(type === 'adult' ? 'inputAdultCount' : 'inputKidCount');
        let n = parseInt(el.value) + val;
        if(n >= 0) el.value = n;
    }

    function confirmOpenTable() {
        let name = document.getElementById('openTableNameDisplay').innerText;
        let head = document.getElementById('inputAdultCount').value;
        let pkg = document.getElementById('selectBuffetPackage').value;
        google.script.run.withSuccessHandler(() => {
            document.getElementById('openTableModeModal').classList.add('hidden');
            document.getElementById('tableModal').classList.add('hidden');
            selectTable(name);
        }).openTableGS(name, 'Buffet', head, pkg, '90');
    }

    function selectTable(name) {
        currentTable = name;
        document.getElementById('tableNo').value = name;
        document.getElementById('tableModal').classList.add('hidden');
        document.getElementById('header-title').innerText = "โต๊ะ: " + name;
        google.script.run.withSuccessHandler(res => {
            cart = (typeof res.items === 'string') ? JSON.parse(res.items) : (res.items || []);
            updateUI();
        }).getTableTotalGS(name);
    }

    function sendOrder() {
        if(!currentTable) return alert("เลือกโต๊ะ!");
        google.script.run.withSuccessHandler(() => { alert("ส่งเข้าครัวแล้ว!"); cart=[]; updateUI(); }).createKitchenOrderGS({ orderId: "STAFF-"+Date.now(), tableNo: currentTable, orderType: "ทานที่ร้าน", items: cart });
    }
  </script>
</body>
</html>
