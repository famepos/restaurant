<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamePOS Customer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">


<link rel="icon" type="image/png" href="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" sizes="192x192">

<link rel="apple-touch-icon" href="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Custome FamePOS">

<meta name="mobile-web-app-capable" content="yes">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #fff5f5; margin: 0; overflow: hidden; }
    ::-webkit-scrollbar { display: none; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-screen w-screen flex flex-col relative">

  <!-- 🌟 แผ่นป้ายโฆษณาเต็มจอ (Screensaver) บังหน้าจอเมื่อไม่มีรายการสินค้า -->
  <div id="fullScreenAdOverlay" class="fixed inset-0 z-[100] bg-white flex flex-col transition-opacity duration-300">
      <div id="adCarousel" class="w-full h-full relative"></div>
  </div>

  <!-- แถบด้านบน -->

<header class="bg-white border-b border-pink-600 p-4 flex justify-between items-center shrink-0 shadow-sm z-10">
    <div class="flex items-center gap-3">
  <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" alt="CSD Logo" class="w-12 h-12 object-contain drop-shadow-sm">
      <h1 class="text-3xl font-bold tracking-wide text-pink-800" id="displayStoreName">FamePOS</h1>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <div id="dateTimeDisplay" class="text-xl font-black text-pink-600 tracking-wider">00:00:00</div>
      </div>
    </div> </header>

  <main class="flex-1 flex gap-6 p-6 overflow-hidden">
    <!-- กล่องรายการสินค้าฝั่งซ้าย -->
    <section class="flex-1 bg-white rounded-[2rem] shadow-xl border border-pink-100 flex flex-col overflow-hidden">
      <div class="bg-pink-50 p-4 border-b border-pink-100">
        <h2 class="text-2xl font-bold text-pink-800">รายการสินค้า (Order Items)</h2>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-3" id="customerCartItems">
        <!-- รายการสินค้าจะถูกเพิ่มตรงนี้ผ่าน JS -->
      </div>
    </section>

    <!-- กล่องสรุปยอดฝั่งขวา -->
    <section class="w-1/3 min-w-[400px] flex flex-col gap-6">
      
      <div class="bg-white rounded-[2rem] shadow-xl border border-pink-100 p-6 flex flex-col gap-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 border-b pb-2">สรุปยอดชำระ</h2>
        <div class="flex justify-between items-center text-xl text-gray-600">
            <span>ยอดรวม:</span>
            <span id="displaySubTotal" class="font-bold">฿0.00</span>
        </div>
        <div class="flex justify-between items-center text-xl text-pink-600 font-bold bg-pink-50 p-4 rounded-2xl border border-pink-100">
            <span>ยอดสุทธิ:</span>
            <span id="displayGrandTotal" class="text-4xl">฿0.00</span>
        </div>

        <div id="halfHalfContainer" class="hidden flex-col gap-2 mt-2 p-4 rounded-2xl bg-pink-50 border border-pink-200 shadow-inner">
            <div class="text-center font-bold text-pink-800 mb-1">โครงการคนละครึ่ง (รัฐ 60% / ลูกค้า 40%)</div>
            <div class="flex justify-between items-center text-lg text-gray-600">
                <span>รัฐออกให้ (60%):</span>
                <span id="displayGovPay" class="font-bold text-pink-500">฿0.00</span>
            </div>
            <div class="flex justify-between items-center text-xl text-emerald-700 font-bold border-t border-pink-200 pt-3 mt-1">
                <span>ลูกค้าจ่ายจริง (40%):</span>
                <span id="displayCustomerPay" class="text-3xl">฿0.00</span>
            </div>
        </div>

        <div class="flex justify-between items-center text-lg text-emerald-600 bg-emerald-50 p-4 rounded-2xl border border-emerald-100 hidden" id="changeContainer">
            <span class="font-bold">เงินทอน:</span>
            <span id="displayChange" class="text-3xl font-bold">฿0.00</span>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] shadow-xl border border-pink-100 p-6 flex-1 flex flex-col items-center justify-center text-center relative overflow-hidden">
         <div id="adState" class="fade-in absolute inset-0 flex flex-col items-center justify-center p-6 bg-gradient-to-br from-pink-50 to-white text-center">
            <span class="text-6xl mb-4">✨</span>
            <h3 class="text-2xl font-bold text-pink-700 mb-2">ตรวจสอบรายการอาหาร</h3>
            <p class="text-gray-500 font-medium">ด้านซ้ายมือ/p>
         </div>

         <div id="qrState" class="hidden fade-in absolute inset-0 flex flex-col items-center justify-center bg-white z-10 p-4 md:p-6">
            <h3 class="text-xl xl:text-2xl font-bold text-pink-800 mb-2 xl:mb-4 shrink-0">📱 สแกน QR เพื่อชำระเงิน</h3>
            <div class="flex-1 w-full min-h-0 flex items-center justify-center mb-2 xl:mb-4">
                <img id="qrDisplayImage" src="" class="w-full h-full max-w-[220px] object-contain border-4 border-pink-100 p-2 rounded-2xl shadow-sm">
            </div>
            <p class="text-gray-500 font-medium animate-pulse text-sm xl:text-base shrink-0">กรุณาสแกนผ่านแอปธนาคาร</p>
         </div>
      </div>

    </section>
  </main>

<script>
    // ⚠️ สำคัญมาก! เปลี่ยนลิงก์ API_URL ด้านล่างนี้ ให้เป็นลิงก์ Web App (Google Apps Script) อันใหม่ล่าสุดของคุณด้วยนะครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

    // 🚀 ระบบ Magic Proxy
    const google = {
        script: {
            get run() {
                let successCb = null;
                let failureCb = null;
                const proxy = new Proxy({}, {
                    get: function(target, prop) {
                        if (prop === 'withSuccessHandler') { return function(cb) { successCb = cb; return proxy; }; }
                        if (prop === 'withFailureHandler') { return function(cb) { failureCb = cb; return proxy; }; }
                        return function(...args) {
                            fetch(API_URL, {
                                method: "POST",
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify({ action: prop, args: args }),
                                redirect: "follow"
                            })
                            .then(res => res.json())
                            .then(data => {
                                if(data.status === "Success" && successCb) successCb(data.result);
                                else if (data.status !== "Success" && failureCb) failureCb(data.message);
                            }).catch(err => {
                                if(failureCb) failureCb(err);
                                else console.error("Fetch Error:", err);
                            });
                        };
                    }
                });
                return proxy;
            }
        }
    };

    // ⏱️ นาฬิกา
    setInterval(() => {
        const now = new Date();
        let timeEl = document.getElementById('dateTimeDisplay');
        if(timeEl) timeEl.innerText = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'short' }) + ' ' + now.toLocaleTimeString('th-TH');
    }, 1000);

    // ☁️ ระบบดึงข้อมูลรถเข็นจาก Cloud
    let lastUpdateStr = "";
    let isFetching = false;

    function checkCloudData() {
        if (isFetching) return;
        isFetching = true;

        google.script.run
            .withSuccessHandler(function(currentStr) {
                isFetching = false;
                if (currentStr && currentStr !== lastUpdateStr) {
                    lastUpdateStr = currentStr;
                    updateCustomerUI(JSON.parse(currentStr));
                }
            })
            .withFailureHandler(function(err) {
                isFetching = false;
                console.error("Cloud Sync Error:", err);
            })
            .getCDSStateGS();
    }
    
    setInterval(checkCloudData, 1500);
    window.addEventListener('load', checkCloudData);

    // 🎨 ฟังก์ชันวาดหน้าจอเมื่อมีสินค้าในตะกร้า
    function updateCustomerUI(data) {
        if (!data) return;
        
        // 🛑 ระบบควบคุม Screensaver โฆษณา
        const adOverlay = document.getElementById('fullScreenAdOverlay');
        if (adOverlay) {
            // ถ้าตะกร้าว่าง = เปิดโฆษณาบังจอไว้แบบเต็มตา
            if (!data.cart || data.cart.length === 0) {
                adOverlay.classList.remove('hidden');
                adOverlay.style.opacity = "1";
                adOverlay.style.pointerEvents = "auto";
            } else {
                // ถ้าเริ่มกดสินค้าลงตะกร้า = ซ่อนโฆษณา โชว์รายการราคา
                adOverlay.style.opacity = "0";
                adOverlay.style.pointerEvents = "none";
                setTimeout(() => adOverlay.classList.add('hidden'), 300);
            }
        }

        if (data.logoUrl) { let logoEl = document.getElementById('displayLogo'); if (logoEl) logoEl.src = data.logoUrl; }
        if (data.storeName) { let storeNameEl = document.getElementById('displayStoreName'); if (storeNameEl) storeNameEl.innerText = data.storeName; }

        const cartContainer = document.getElementById('customerCartItems');
        if (!data.cart || data.cart.length === 0 || data.status === 'idle') {
            cartContainer.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-pink-200 fade-in">
                    <span class="text-8xl mb-4">🛒</span>
<p class="text-2xl font-bold text-gray-400">ยินดีต้อนรับลูกค้าทุกท่าน เชิญสั่งอาหารได้เลย</p>
</div>`;
        } else {
            let html = '';
            data.cart.forEach(item => {
                let baseName = item.name || "สินค้า";
                let optionsHtml = '';
                let optionIndex = baseName.search(/ \[| \+/); 
                
                if (optionIndex !== -1) {
                    baseName = item.name.substring(0, optionIndex).trim();
                    let match = item.name.match(/\[(.*?)\]/);
                    if (match && match[1]) {
                        let opts = match[1].split(',');
                        optionsHtml = `<div class="flex flex-wrap gap-1.5 mt-1.5">` + 
                            opts.map(opt => `<span class="bg-pink-50 text-pink-600 px-2.5 py-1 rounded-lg text-[13px] font-bold border border-pink-200 shadow-sm">${opt.trim()}</span>`).join('') + 
                        `</div>`;
                    }
                }

                let imgTag = item.image 
                    ? `<img src="${item.image}" class="w-16 h-16 rounded-2xl object-cover border border-pink-100 shadow-sm shrink-0">` 
                    : `<div class="w-16 h-16 rounded-2xl bg-pink-50 text-pink-400 flex items-center justify-center text-2xl border border-pink-100 shadow-sm shrink-0">📦</div>`;

                html += `
                <div class="flex justify-between items-center bg-white p-4 rounded-[1.25rem] border border-gray-100 shadow-sm fade-in mb-3 gap-4">
                    ${imgTag}
                    <div class="flex-1 min-w-0 py-1">
                        <div class="font-bold text-gray-800 text-xl truncate leading-none">${baseName}</div>
                        ${optionsHtml}
                    </div>
                    <div class="font-bold text-gray-400 text-xl w-12 text-center shrink-0">x${item.qty}</div>
                    <div class="font-bold text-pink-600 text-2xl w-28 text-right shrink-0">฿${(item.price * item.qty).toFixed(2)}</div>
                </div>`;
            });
            cartContainer.innerHTML = html;
            cartContainer.scrollTop = cartContainer.scrollHeight;
        }

        let subTotalEl = document.getElementById('displaySubTotal');
        if(subTotalEl) subTotalEl.innerText = data.totalPrice || "฿0.00";
        
        let grandTotalEl = document.getElementById('displayGrandTotal');
        if(grandTotalEl) grandTotalEl.innerText = data.grandTotal || "฿0.00";

        const halfHalfBox = document.getElementById('halfHalfContainer');
        if (data.paymentMethod === 'คนละครึ่ง' && data.cart && data.cart.length > 0) {
            let totalVal = parseFloat((data.grandTotal || "0").toString().replace(/[^0-9.-]+/g,"")) || 0;
            let customerPay = totalVal * 0.40;
            let govPay = totalVal * 0.60;
            
            document.getElementById('displayGovPay').innerText = "฿" + govPay.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('displayCustomerPay').innerText = "฿" + customerPay.toLocaleString('th-TH', {minimumFractionDigits: 2});
            
            if (halfHalfBox) {
                halfHalfBox.classList.remove('hidden');
                halfHalfBox.classList.add('flex');
            }
        } else {
            if (halfHalfBox) {
                halfHalfBox.classList.add('hidden');
                halfHalfBox.classList.remove('flex');
            }
        }

        const changeBox = document.getElementById('changeContainer');
        if (data.change && parseFloat(data.change) > 0) {
            document.getElementById('displayChange').innerText = "฿" + data.change;
            if(changeBox) changeBox.classList.remove('hidden');
        } else {
            if(changeBox) changeBox.classList.add('hidden');
        }

        const adState = document.getElementById('adState');
        const qrState = document.getElementById('qrState');
        if (data.status === 'qr_payment' && data.qrImage) {
            document.getElementById('qrDisplayImage').src = data.qrImage;
            if(adState) adState.classList.add('hidden');
            if(qrState) qrState.classList.remove('hidden');
        } else {
            if(qrState) qrState.classList.add('hidden');
            if(adState) adState.classList.remove('hidden');
        }
    }

    // 🌟 ระบบสไลด์โชว์โฆษณา (Carousel) แบบเรียลไทม์
    let adSlides = [];
    let currentAdIndex = 0;
    let adTimer = null;

    function fetchAdSettings() {
        google.script.run.withSuccessHandler(function(res) {
            if (res) {
                if (JSON.stringify(res) !== JSON.stringify(adSlides)) {
                    adSlides = res;
                    
                    if (adSlides.length > 0) {
                        startAdCarousel();
                    } else {
                        clearTimeout(adTimer);
                        let container = document.getElementById('adCarousel');
                        if (container) {
                            container.innerHTML = `
                                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 bg-gradient-to-br from-pink-50 to-white text-center">
                                    <span class="text-6xl mb-4">✨</span>
                                    <h3 class="text-2xl font-bold text-pink-700 mb-2">โปรโมชั่นพิเศษ</h3>
                                    <p class="text-gray-500 font-medium">รอการอัปเดตโฆษณาเร็วๆ นี้</p>
                                </div>
                            `;
                        }
                    }
                }
            }
        }).getAdSettingsGS();
    }

    function startAdCarousel() {
        if (adSlides.length === 0) return;
        currentAdIndex = 0;
        showAdSlide(currentAdIndex);
    }

    function showAdSlide(index) {
        if (adSlides.length === 0) return;
        currentAdIndex = index % adSlides.length;
        let slide = adSlides[currentAdIndex];
        
        let container = document.getElementById('adCarousel');
        if (container) {
            container.innerHTML = `
                <div class="absolute inset-0 flex flex-col w-full h-full animate-fade-in bg-white">
                    <div class="flex-1 w-full bg-pink-50 flex items-center justify-center overflow-hidden relative">
                       <img src="${slide.existingUrl}" class="w-full h-full object-cover absolute shadow-sm">
                    </div>
                    ${slide.text ? `
                    <div class="p-6 bg-gradient-to-br from-pink-50 to-white flex items-center justify-center border-t border-pink-100 shrink-0 min-h-[120px] shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10">
                        <h3 class="text-2xl xl:text-3xl font-bold text-pink-800 text-center leading-relaxed">${slide.text}</h3>
                    </div>` : ''}
                </div>
            `;
        }
        
        clearTimeout(adTimer);
        let duration = slide.duration ? parseInt(slide.duration) * 1000 : 5000;
        adTimer = setTimeout(() => {
            showAdSlide(currentAdIndex + 1);
        }, duration);
    }

    window.addEventListener('load', fetchAdSettings);
    setInterval(fetchAdSettings, 5000); 

</script>
</body>
</html>
