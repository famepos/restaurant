<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Customer Display | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
   
  <link rel="icon" type="image/png" href="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Custome FamePOS">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    body { font-family: 'Kanit', sans-serif; overflow: hidden; margin: 0; background-color: #f3f4f6; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 1s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="h-screen w-screen flex flex-row">

  <!-- ================= ฝั่งซ้าย: สรุปรายการสั่งซื้อ (สไตล์ Ocha POS) ================= -->
  <div class="w-1/2 lg:w-5/12 h-full bg-white flex flex-col shadow-[10px_0_20px_rgba(0,0,0,0.05)] z-20">
    <div class="p-6 border-b border-gray-100 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-4">
        <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-14 h-14 object-contain bg-pink-50 rounded-2xl p-1.5 shadow-sm">
        <div>
          <h1 class="text-2xl font-bold text-gray-800 leading-tight">รายการสั่งซื้อ</h1>
          <p class="text-sm text-gray-500 font-medium">Order Summary</p>
        </div>
      </div>
      <div id="cdsStatusBadge" class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm">รอรับออเดอร์</div>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar bg-gray-50/50" id="cdsCartItems">
      <!-- กรณีว่างเปล่า -->
      <div class="h-full flex flex-col items-center justify-center text-gray-300">
        <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span class="text-xl font-medium">ยังไม่มีรายการสินค้า</span>
      </div>
    </div>

    <div class="bg-white p-6 shrink-0 border-t border-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
      <div class="flex justify-between text-gray-500 mb-2 font-medium text-lg">
        <span>ยอดรวม (Subtotal)</span>
        <span id="cdsSubTotal">฿0.00</span>
      </div>
      <div class="flex justify-between text-pink-500 mb-4 font-medium text-lg">
        <span>ส่วนลด (Discount)</span>
        <span id="cdsDiscount">-฿0.00</span>
      </div>
      <!-- ค้นหาบรรทัดที่มี cdsDiscount แล้วแทรกตรงนี้ด้านล่าง -->
      <div id="cdsTaxRow" class="hidden justify-between text-gray-500 mb-2 font-medium text-lg">
        <span>ภาษี (VAT)</span>
        <span id="cdsTax">฿0.00</span>
      </div>
      <div id="cdsServiceRow" class="hidden justify-between text-gray-500 mb-2 font-medium text-lg">
        <span>ค่าบริการ</span>
        <span id="cdsService">฿0.00</span>
      </div>
      <div class="flex justify-between items-end border-t border-dashed border-gray-200 pt-4 mt-2">
        <span class="text-xl font-bold text-gray-800">ยอดสุทธิ (Net Total)</span>
        <span id="cdsGrandTotal" class="text-5xl font-bold text-pink-600 tracking-tight">฿0.00</span>
      </div>
    </div>
  </div>

  <!-- ================= ฝั่งขวา: พื้นที่อเนกประสงค์ ================= -->
  <div class="w-1/2 lg:w-7/12 h-full relative bg-white flex flex-col">
    
    <!-- 1. โหมดโฆษณา (Screensaver) -->
    <div id="adContainer" class="absolute inset-0 flex flex-col items-center justify-center overflow-hidden transition-opacity duration-500 bg-gray-100">
      <img id="adImage" src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-full h-full object-cover">
      <div id="adText" class="absolute bottom-0 left-0 w-full text-center text-white text-3xl font-bold p-8 bg-gradient-to-t from-black/80 to-transparent"></div>
    </div>

    <!-- 2. โหมดชำระเงิน (Payment Display - Ocha Style) -->
    <div id="paymentContainer" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500 z-10">
      <div id="paymentContent" class="pop-in flex flex-col items-center w-full max-w-lg">
        <!-- เนื้อหาการชำระเงินจะถูกแทรกที่นี่ด้วย JS -->
      </div>
    </div>

    <!-- 3. โหมดชำระเงินสำเร็จ (Success) -->
    <div id="successContainer" class="hidden absolute inset-0 bg-pink-500 flex flex-col items-center justify-center p-8 text-center text-white transition-opacity duration-500 z-20">
      <div class="pop-in flex flex-col items-center">
        <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-8 shadow-lg">
          <svg class="w-20 h-20 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-6xl font-black mb-4 tracking-tight">ชำระเงินสำเร็จ</h2>
        <p class="text-3xl font-medium opacity-90 mt-2">ขอบคุณที่ใช้บริการ โอกาสหน้าเชิญใหม่ค่ะ</p>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";
    
    let adsList = [];
    let currentAdIndex = 0;
    let adTimer = null;
    let lastStateStr = "";

    async function fetchFromGAS(actionName, argsArray = []) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: actionName, args: argsArray }),
          redirect: "follow"
        });
        const data = await response.json();
        if(data.status === "Success") return data.result;
        return null;
      } catch (err) { return null; }
    }

    async function loadAds() {
      const ads = await fetchFromGAS('getAdSettingsGS');
      if(ads && ads.length > 0) { adsList = ads; showNextAd(); }
    }

    function showNextAd() {
      if(adsList.length === 0) return;
      let ad = adsList[currentAdIndex];
      let imgEl = document.getElementById('adImage');
      let txtEl = document.getElementById('adText');
      
      imgEl.classList.remove('fade-in'); void imgEl.offsetWidth; 
      imgEl.src = ad.existingUrl; imgEl.classList.add('fade-in');
      txtEl.innerText = ad.text || "";
      
      let durationMs = (ad.duration || 5) * 1000;
      currentAdIndex = (currentAdIndex + 1) % adsList.length;
      clearTimeout(adTimer); adTimer = setTimeout(showNextAd, durationMs);
    }

async function fetchCDSState() {
     const stateStr = await fetchFromGAS('getCDSStateGS');
     if(stateStr && stateStr !== lastStateStr) {
       lastStateStr = stateStr;
       try { 
           // เปลี่ยนกลับเป็นชื่อฟังก์ชันเดิมของคุณคือ updateUI
           updateUI(JSON.parse(stateStr)); 
       } catch(e) {
           console.error("Error parsing CDS data:", e);
       }
     }
   }

// 🎨 ฟังก์ชันวาดหน้าจอเมื่อมีสินค้าในตะกร้า (ฉบับแก้ไข: ไม่กระพริบ, เริ่มต้นที่ 0.00, แสดง VAT/Service)
function updateUI(data) {
    if (!data) return;

    // 🔄 ปิดระบบกระพริบ: ลบคลาส animate-pulse ออกจากสถานะ
    let statusBadge = document.getElementById('cdsStatusBadge');
    if(statusBadge) {
        if(data.status === 'idle' || !data.cart || data.cart.length === 0) {
            statusBadge.innerText = "รอรับออเดอร์";
            statusBadge.className = "bg-gray-100 text-gray-500 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm";
        } else {
            statusBadge.innerText = "กำลังสั่งซื้อ...";
            statusBadge.className = "bg-pink-100 text-pink-600 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm"; // ลบ animate-pulse ออก
        }
    }

    // 🛑 ระบบควบคุม Screensaver (คงเดิม)
    const adOverlay = document.getElementById('fullScreenAdOverlay');
    if (adOverlay) {
        const configMinutes = data.screensaverTimeout ? parseInt(data.screensaverTimeout) : 5;
        const timeoutMs = configMinutes * 60 * 1000;
        const idleDuration = Date.now() - (window.lastActivityTime || Date.now());

        if (data.status === 'idle' && idleDuration >= timeoutMs) {
            adOverlay.classList.remove('hidden');
            adOverlay.style.opacity = "1";
            adOverlay.style.pointerEvents = "auto";
        } else {
            adOverlay.style.opacity = "0";
            adOverlay.style.pointerEvents = "none";
            if (!adOverlay.classList.contains('hidden')) {
                setTimeout(() => { if (adOverlay.style.opacity === "0") adOverlay.classList.add('hidden'); }, 300);
            }
        }
    }

    if (data.logoUrl) { let logoEl = document.getElementById('displayLogo'); if (logoEl) logoEl.src = data.logoUrl; }
    if (data.storeName) { let storeNameEl = document.getElementById('displayStoreName'); if (storeNameEl) storeNameEl.innerText = data.storeName; }

    // 1. จัดการตะกร้าสินค้า
    const cartContainer = document.getElementById('cdsCartItems');
    if (cartContainer) {
        if (!data.cart || data.cart.length === 0 || data.status === 'idle') {
            cartContainer.innerHTML = `
              <div class="h-full flex flex-col items-center justify-center text-gray-300">
                <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-xl font-medium">ยังไม่มีรายการสินค้า</span>
              </div>`;
        } else {
            let html = '';
            data.cart.forEach(item => {
                let baseName = item.name || "สินค้า";
                let optionsHtml = '';
                let optionIndex = baseName.search(/ \[| \+/);
                
                if (optionIndex !== -1) {
                    baseName = item.name.substring(0, optionIndex).trim();
                    let match = item.name.match(/\[(.*?)\]/);
                    if (match && match[1]) {
                        let opts = match[1].split(',');
                        optionsHtml = `<div class="flex flex-wrap gap-1.5 mt-1.5">` + 
                            opts.map(opt => `<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[11px] font-medium">${opt.trim()}</span>`).join('') + 
                            `</div>`;
                    }
                }

                let imgTag = item.image ? `<img src="${item.image}" class="w-16 h-16 rounded-xl object-cover border border-gray-100 shadow-sm shrink-0">` : `<div class="w-16 h-16 rounded-xl bg-pink-50 text-pink-400 flex items-center justify-center text-2xl border border-pink-100 shadow-sm shrink-0">📦</div>`;

                let itemQty = Number(item.qty) || 1;
                let rawTotal = item.total !== undefined ? item.total : (item.price * itemQty);
                let itemTotal = Number(String(rawTotal).replace(/[^0-9.-]+/g,"")) || 0;
                let rawPrice = item.price !== undefined ? item.price : (itemTotal / itemQty);
                let itemPrice = Number(String(rawPrice).replace(/[^0-9.-]+/g,"")) || 0;

                html += `
                <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm fade-in mb-3 gap-4">
                    ${imgTag}
                    <div class="flex-1 min-w-0 py-1">
                        <h3 class="font-bold text-gray-800 text-lg leading-tight truncate">${baseName}</h3>
                        <div class="text-gray-500 font-medium text-sm mt-0.5">฿${itemPrice.toFixed(2)} x ${itemQty}</div>
                        ${optionsHtml}
                    </div>
                    <div class="text-right shrink-0">
                        <div class="font-bold text-xl text-gray-800">฿${itemTotal.toFixed(2)}</div>
                    </div>
                </div>`;
            });
            cartContainer.innerHTML = html;
            cartContainer.scrollTop = cartContainer.scrollHeight;
        }
    }

    // 2. จัดการยอดรวม (เริ่มที่ 0.00 เสมอ)
    document.getElementById('cdsSubTotal').innerText = "฿" + (Number(String(data.totalPrice || data.subTotal || 0).replace(/[^0-9.-]+/g,"")) || 0).toFixed(2);
    document.getElementById('cdsDiscount').innerText = "-฿" + (Number(String(data.discount || 0).replace(/[^0-9.-]+/g,"")) || 0).toFixed(2);
    
    // 3. แสดง VAT และค่าบริการ
    let taxEl = document.getElementById('cdsTax');
    let serviceEl = document.getElementById('cdsService');
    
    if (data.vat && Number(data.vat) > 0) {
        document.getElementById('cdsTaxRow').classList.remove('hidden');
        document.getElementById('cdsTaxRow').classList.add('flex');
        taxEl.innerText = "฿" + Number(data.vat).toFixed(2);
    } else {
        document.getElementById('cdsTaxRow').classList.add('hidden');
    }

    if (data.serviceCharge && Number(data.serviceCharge) > 0) {
        document.getElementById('cdsServiceRow').classList.remove('hidden');
        document.getElementById('cdsServiceRow').classList.add('flex');
        serviceEl.innerText = "฿" + Number(data.serviceCharge).toFixed(2);
    } else {
        document.getElementById('cdsServiceRow').classList.add('hidden');
    }
    
    document.getElementById('cdsGrandTotal').innerText = "฿" + (Number(String(data.grandTotal || 0).replace(/[^0-9.-]+/g,"")) || 0).toFixed(2);
}
    window.onload = function() {
      loadAds();
      setInterval(fetchCDSState, 1500); 
    };
  </script>
</body>
</html>
