<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Display | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; overflow: hidden; margin: 0; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* อนิเมชั่นเฟดเปลี่ยนภาพโฆษณา */
    .fade-in { animation: fadeIn 1.5s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-bounce-slow { animation: bounce 3s infinite; }
  </style>
</head>
<body class="h-screen w-screen flex bg-black">

  <!-- ================= ฝั่งซ้าย: พื้นที่โฆษณา (Ads / Slider) ================= -->
  <div id="adContainer" class="w-1/2 lg:w-[65%] h-full bg-black relative flex flex-col items-center justify-center overflow-hidden">
    <!-- ภาพเริ่มต้น (ใช้โลโก้แอปที่ให้มา) -->
    <img id="adImage" src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" />
    
    <!-- ข้อความโฆษณา (ซ้อนทับภาพ) -->
    <div id="adText" class="absolute bottom-16 left-0 w-full text-center text-white text-4xl lg:text-6xl font-bold drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] px-8 leading-tight">
    </div>
  </div>

  <!-- ================= ฝั่งขวา: สรุปรายการสั่งซื้อ (Order Summary) ================= -->
  <div id="orderContainer" class="w-1/2 lg:w-[35%] h-full bg-white flex flex-col shadow-[-15px_0_30px_rgba(0,0,0,0.1)] z-10 relative">
    
    <!-- ส่วนหัว (Header) -->
    <div class="bg-pink-600 p-5 lg:p-6 text-white flex items-center gap-4 shrink-0 shadow-md">
      <!-- โลโก้แอป -->
      <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-16 h-16 object-contain bg-white rounded-2xl p-1.5 shadow-sm">
      <div>
        <h1 class="text-3xl font-black tracking-wide">FamePOS</h1>
        <p class="text-sm font-medium opacity-90 mt-0.5">ยินดีต้อนรับ กรุณาตรวจสอบรายการ</p>
      </div>
    </div>

    <!-- ส่วนแสดงรายการสินค้า (Cart Items) -->
    <div class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-3 no-scrollbar bg-gray-50/50" id="cdsCartItems">
      <!-- ค่า Default ตอนยังไม่มีสินค้า -->
      <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-50">
        <span class="text-7xl mb-4 animate-bounce-slow">🛒</span>
        <span class="text-2xl font-bold text-pink-300">ยังไม่มีรายการสินค้า</span>
      </div>
    </div>

    <!-- ส่วนสรุปยอดเงิน (Totals) -->
    <div class="bg-white p-6 shrink-0 border-t-2 border-pink-100 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
      <div class="flex justify-between text-gray-500 mb-2 font-bold text-xl">
        <span>ยอดรวม</span>
        <span id="cdsSubTotal">฿0.00</span>
      </div>
      <div class="flex justify-between text-red-500 mb-4 font-bold text-xl">
        <span>ส่วนลด</span>
        <span id="cdsDiscount">-฿0.00</span>
      </div>
      <div class="flex justify-between items-end border-t-2 border-dashed border-pink-200 pt-4 mt-2">
        <span class="text-2xl font-bold text-pink-800">ยอดสุทธิ</span>
        <span id="cdsGrandTotal" class="text-6xl font-black text-pink-600 tracking-tight">฿0.00</span>
      </div>
    </div>

    <!-- ================= Overlay: โชว์ QR Code ชำระเงิน ================= -->
    <div id="cdsQrOverlay" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm z-20 flex flex-col items-center justify-center p-8 text-center transition-all">
      <h2 class="text-4xl font-bold text-pink-700 mb-2">สแกนเพื่อชำระเงิน</h2>
      <p class="text-gray-500 mb-8 text-xl font-medium">PromptPay / Mobile Banking</p>
      
      <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border-2 border-pink-100 mb-8">
        <img id="cdsQrImage" src="" class="w-72 h-72 lg:w-80 lg:h-80 object-contain">
      </div>
      
      <div class="text-2xl font-bold text-gray-500 mb-1">ยอดชำระสุทธิ</div>
      <div id="cdsQrAmount" class="text-6xl font-black text-pink-600">฿0.00</div>
    </div>

    <!-- ================= Overlay: ขอบคุณที่ใช้บริการ ================= -->
    <div id="cdsThankYouOverlay" class="hidden absolute inset-0 bg-gradient-to-br from-pink-500 to-pink-600 z-30 flex flex-col items-center justify-center p-8 text-center text-white transition-all">
      <span class="text-9xl mb-8 drop-shadow-lg">✅</span>
      <h2 class="text-6xl font-black mb-4 tracking-wide">ชำระเงินสำเร็จ</h2>
      <p class="text-3xl font-medium opacity-90 mt-2">ขอบคุณที่ใช้บริการ โอกาสหน้าเชิญใหม่ครับ</p>
    </div>

  </div>

  <script>
    let adsList = [];
    let currentAdIndex = 0;
    let adTimer = null;
    let lastStateStr = "";

    // 1. ดึงข้อมูลโฆษณาจากระบบหลังบ้าน (Apps Script)
    function loadAds() {
      if(typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function(ads) {
          if(ads && ads.length > 0) {
            adsList = ads;
            showNextAd();
          }
        }).getAdSettingsGS();
      }
    }

    // 2. สลับภาพโฆษณาวนไปเรื่อยๆ
    function showNextAd() {
      if(adsList.length === 0) return;
      
      let ad = adsList[currentAdIndex];
      let imgEl = document.getElementById('adImage');
      let txtEl = document.getElementById('adText');
      
      // รีเซ็ตคลาสเพื่อเล่นอนิเมชั่นใหม่
      imgEl.classList.remove('fade-in');
      void imgEl.offsetWidth; // บังคับให้บราวเซอร์วาดใหม่
      
      imgEl.src = ad.existingUrl;
      imgEl.classList.add('fade-in');
      txtEl.innerText = ad.text || "";
      
      let durationMs = (ad.duration || 5) * 1000;
      currentAdIndex = (currentAdIndex + 1) % adsList.length;
      
      clearTimeout(adTimer);
      adTimer = setTimeout(showNextAd, durationMs);
    }

    // 3. ดึงสถานะปัจจุบันของตะกร้าสินค้าจากแคชเชียร์ (ทุกๆ 1 วินาที)
    function fetchCDSState() {
      if(typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function(stateStr) {
          if(stateStr && stateStr !== lastStateStr) {
            lastStateStr = stateStr;
            try {
              let state = JSON.parse(stateStr);
              updateUI(state);
            } catch(e) { console.error("JSON Parse error:", e); }
          }
        }).getCDSStateGS();
      }
    }

    // 4. วาดอัปเดตหน้าจอ
    function updateUI(state) {
      const qrOverlay = document.getElementById('cdsQrOverlay');
      const thankYouOverlay = document.getElementById('cdsThankYouOverlay');
      const cartItems = document.getElementById('cdsCartItems');

      qrOverlay.classList.add('hidden');
      thankYouOverlay.classList.add('hidden');

      // กรณีที่ยังไม่มีการคิดเงิน / พักบิล
      if(state.status === 'idle') {
        cartItems.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-50">
            <span class="text-7xl mb-4 animate-bounce-slow">🛒</span>
            <span class="text-2xl font-bold text-pink-300">ยังไม่มีรายการสินค้า</span>
          </div>`;
        document.getElementById('cdsSubTotal').innerText = "฿0.00";
        document.getElementById('cdsDiscount').innerText = "-฿0.00";
        document.getElementById('cdsGrandTotal').innerText = "฿0.00";

      // กรณีกำลังยิงสินค้า หรือ อยู่ในหน้าสแกนจ่ายเงิน
      } else if(state.status === 'active' || state.status === 'qr_payment') {
        let html = '';
        
        if(state.cart && state.cart.length > 0) {
          state.cart.forEach(item => {
            html += `
              <div class="flex justify-between items-center bg-white p-5 rounded-2xl border border-gray-100 shadow-sm mb-3">
                <div class="flex-1 pr-4">
                  <div class="text-xl font-bold text-gray-800 line-clamp-2">${item.name}</div>
                  <div class="text-base text-pink-600 font-bold mt-1">฿${parseFloat(item.price).toFixed(2)} <span class="text-gray-400 font-medium px-2">x</span> <span class="text-black">${item.qty}</span></div>
                </div>
                <div class="text-2xl font-black text-gray-800 shrink-0">฿${parseFloat(item.total).toFixed(2)}</div>
              </div>
            `;
          });
        } else {
          html = `<div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-50"><span class="text-2xl font-bold">กำลังทำรายการ...</span></div>`;
        }

        cartItems.innerHTML = html;
        document.getElementById('cdsSubTotal').innerText = "฿" + (state.subTotal || 0).toFixed(2);
        document.getElementById('cdsDiscount').innerText = "-฿" + ((state.discount || 0) + (state.pointDiscount || 0)).toFixed(2);
        document.getElementById('cdsGrandTotal').innerText = "฿" + (state.grandTotal || 0).toFixed(2);
        
        // บังคับเลื่อน Scroll ลงล่างสุดเมื่อของเยอะ
        cartItems.scrollTop = cartItems.scrollHeight;

        // ถ้าแคชเชียร์กดปุ่ม "โอนเงิน" ให้โชว์คิวอาร์โค้ดทับหน้าจอ
        if(state.status === 'qr_payment' && state.qrUrl) {
          document.getElementById('cdsQrImage').src = state.qrUrl;
          document.getElementById('cdsQrAmount').innerText = "฿" + (state.grandTotal || 0).toFixed(2);
          qrOverlay.classList.remove('hidden');
        }

      // กรณีแคชเชียร์กดยืนยันชำระเงินเรียบร้อยแล้ว
      } else if (state.status === 'success') {
        thankYouOverlay.classList.remove('hidden');
      }
    }

    // เริ่มทำงานเมื่อเปิดหน้า
    window.onload = function() {
      loadAds();
      setInterval(fetchCDSState, 1000); // ยิงเช็คสถานะทุกๆ 1 วินาที
    };
  </script>
</body>
</html>
