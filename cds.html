<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอลูกค้า | FamePOS</title>
    <!-- เพิ่มโลโก้แอปที่แท็บของเบราว์เซอร์ -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png">
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; color: #831843; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex">

    <!-- 🛒 ฝั่งซ้าย: รายการสินค้าในตะกร้า -->
    <div class="w-1/2 h-full bg-white flex flex-col shadow-2xl z-10">
        <!-- หัวตาราง -->
        <div class="bg-pink-600 text-white p-6 shadow-md shrink-0 flex justify-between items-center">
            <h1 class="text-3xl font-bold flex items-center gap-3">
                <span class="text-4xl">🛒</span> รายการสินค้าของคุณ
            </h1>
        </div>

        <!-- รายการสินค้า (เลื่อนได้) -->
        <div id="cdsCartItems" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-4 bg-gray-50">
            <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                <span class="text-7xl mb-4">🛍️</span>
                <span class="text-2xl font-bold">ยินดีต้อนรับสู่ FamePOS</span>
            </div>
        </div>

        <!-- สรุปยอดรวม -->
        <div class="bg-white p-6 border-t-4 border-pink-100 shrink-0">
            <div class="flex justify-between items-center text-gray-500 mb-2">
                <span class="text-xl font-bold">จำนวนสินค้า</span>
                <span id="cdsTotalItems" class="text-xl font-bold">0 รายการ</span>
            </div>
            <div class="flex justify-between items-center text-pink-700">
                <span class="text-4xl font-black">ยอดรวมทั้งสิ้น</span>
                <span id="cdsGrandTotal" class="text-5xl font-black text-pink-600">฿0.00</span>
            </div>
        </div>
    </div>

    <!-- 💳 ฝั่งขวา: แสดงการชำระเงิน หรือ โฆษณา -->
    <div class="w-1/2 h-full bg-pink-50 relative flex flex-col justify-center items-center p-10 overflow-hidden">
        
        <!-- โหมดที่ 1: สแตนด์บาย (โชว์โลโก้ หรือ รูปโฆษณา) -->
        <div id="cdsIdleMode" class="absolute inset-0 flex flex-col items-center justify-center p-10 transition-opacity duration-500">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl flex flex-col items-center text-center w-full max-w-lg border-2 border-pink-100">
                <!-- 🌟 เปลี่ยนมาใช้โลโก้แอปที่คุณส่งมาตรงนี้ 🌟 -->
                <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-40 h-40 object-contain mb-6 drop-shadow-md rounded-3xl" alt="FamePOS Logo">
                
                <h2 class="text-4xl font-black text-pink-700 mb-2">FamePOS</h2>
                <p class="text-xl text-pink-500 font-bold">ระบบจัดการร้านค้าอัจฉริยะ</p>
                <div class="mt-8 px-6 py-3 bg-pink-100 text-pink-600 rounded-full font-bold animate-pulse">
                    ยินดีให้บริการครับ/ค่ะ 💖
                </div>
            </div>
        </div>

        <!-- โหมดที่ 2: ชำระเงินด้วย QR Code -->
        <div id="cdsQRMode" class="absolute inset-0 flex flex-col items-center justify-center p-10 bg-white opacity-0 pointer-events-none transition-opacity duration-500">
            <h2 class="text-4xl font-bold text-pink-700 mb-2">📱 สแกนเพื่อชำระเงิน</h2>
            <p class="text-xl text-gray-500 mb-8">รองรับทุกธนาคาร (PromptPay)</p>
            
            <div class="bg-white p-6 rounded-3xl shadow-2xl border-4 border-pink-200 mb-8 slide-up">
                <img id="cdsQRImage" src="" class="w-80 h-80 object-contain mx-auto" alt="PromptPay QR">
            </div>
            
            <div class="text-center slide-up" style="animation-delay: 0.1s;">
                <div class="text-2xl text-gray-500 font-bold mb-2">ยอดที่ต้องชำระ</div>
                <div id="cdsQRAmount" class="text-6xl font-black text-pink-600">฿0.00</div>
            </div>
        </div>

        <!-- โหมดที่ 3: ชำระเงินสด (โชว์เงินทอน) -->
        <div id="cdsCashMode" class="absolute inset-0 flex flex-col items-center justify-center p-10 bg-gradient-to-br from-pink-500 to-pink-700 opacity-0 pointer-events-none transition-opacity duration-500 text-white">
            <div class="text-8xl mb-6 slide-up">💵</div>
            <h2 class="text-5xl font-black mb-10 slide-up">รับชำระเงินสด</h2>
            
            <div class="w-full max-w-md bg-white/20 backdrop-blur-md rounded-3xl p-8 slide-up text-center border border-white/30" style="animation-delay: 0.1s;">
                <div class="text-xl font-bold opacity-90 mb-1">เงินทอนของคุณ</div>
                <div id="cdsChangeAmount" class="text-7xl font-black text-yellow-300 drop-shadow-md">฿0.00</div>
            </div>
            
            <p class="text-2xl font-bold mt-10 opacity-90 slide-up" style="animation-delay: 0.2s;">ขอบคุณที่ใช้บริการครับ/ค่ะ 🙏</p>
        </div>

    </div>

    <!-- Script สำหรับดึงข้อมูลจาก Backend -->
    <script>
        // 🔗 ระบุ API URL จาก Google Apps Script ของคุณที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

        // ฟังก์ชันดึงข้อมูลแบบ Polling
        async function fetchCDSState() {
            try {
                // ส่ง Request ไปถาม Backend (ฟังก์ชัน getCDSStateGS)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "getCDSStateGS", args: [] }),
                    redirect: "follow"
                });
                const data = await response.json();
                
                if (data.status === "Success" && data.result) {
                    const state = JSON.parse(data.result);
                    updateUI(state);
                }
            } catch (error) {
                console.error("CDS Sync Error:", error);
            }
        }

        // ฟังก์ชันอัปเดตหน้าจอ
        function updateUI(state) {
            // 1. อัปเดตตะกร้าสินค้า
            const cartContainer = document.getElementById('cdsCartItems');
            if (state.cart && state.cart.length > 0) {
                let html = '';
                let totalItems = 0;
                state.cart.forEach(item => {
                    totalItems += item.qty;
                    let totalLine = parseFloat(item.price * item.qty || item.total || 0).toFixed(2);
                    html += `
                    <div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-gray-100 slide-up">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-pink-100 text-pink-600 rounded-xl flex items-center justify-center font-bold text-xl">${item.qty}x</div>
                            <div class="text-2xl font-bold text-gray-800">${item.name}</div>
                        </div>
                        <div class="text-2xl font-bold text-pink-600">฿${totalLine}</div>
                    </div>`;
                });
                cartContainer.innerHTML = html;
                document.getElementById('cdsTotalItems').innerText = `${totalItems} รายการ`;
                document.getElementById('cdsGrandTotal').innerText = `฿${parseFloat(state.grandTotal).toFixed(2)}`;
            } else {
                cartContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                        <span class="text-7xl mb-4">🛍️</span>
                        <span class="text-2xl font-bold">ยังไม่มีสินค้าในตะกร้า</span>
                    </div>`;
                document.getElementById('cdsTotalItems').innerText = `0 รายการ`;
                document.getElementById('cdsGrandTotal').innerText = `฿0.00`;
            }

            // 2. สลับโหมดการแสดงผลฝั่งขวา
            const idleMode = document.getElementById('cdsIdleMode');
            const qrMode = document.getElementById('cdsQRMode');
            const cashMode = document.getElementById('cdsCashMode');

            // รีเซ็ตการแสดงผล
            idleMode.style.opacity = '0'; idleMode.style.pointerEvents = 'none';
            qrMode.style.opacity = '0'; qrMode.style.pointerEvents = 'none';
            cashMode.style.opacity = '0'; cashMode.style.pointerEvents = 'none';

            if (state.status === "qr_payment") {
                document.getElementById('cdsQRImage').src = state.qrUrl || "";
                document.getElementById('cdsQRAmount').innerText = `฿${parseFloat(state.grandTotal).toFixed(2)}`;
                qrMode.style.opacity = '1'; qrMode.style.pointerEvents = 'auto';
            } 
            else if (state.status === "cash_payment") {
                document.getElementById('cdsChangeAmount').innerText = `฿${parseFloat(state.changeAmount).toFixed(2)}`;
                cashMode.style.opacity = '1'; cashMode.style.pointerEvents = 'auto';
            } 
            else {
                idleMode.style.opacity = '1'; idleMode.style.pointerEvents = 'auto';
            }
        }

        // เรียกใช้งานดึงข้อมูลอัตโนมัติทุกๆ 1.5 วินาที (Polling)
        setInterval(fetchCDSState, 1500);
        fetchCDSState(); // โหลดครั้งแรกทันที
    </script>
</body>
</html>
