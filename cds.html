<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Customer Display | FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7cbdc; margin: 0; padding: 10px; height: 100vh; width: 100vw; overflow: hidden; box-sizing: border-box; }
        .main-container { display: flex; gap: 10px; height: 100%; width: 100%; }
        .white-card { background: white; border-radius: 2rem; border: 3px solid #fecdd3; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <!-- ฝั่งซ้าย: ข้อมูลบิล -->
    <section class="white-card w-1/2 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3">
                <img src="https://i.postimg.cc/7h052Ffb/daa42c0e-2ccf-455e-9d46-491a67539e44.png" class="w-10 h-10 object-contain"> FamePOS
            </h1>
            <div class="text-right">
                <div class="text-xs font-bold text-gray-400">โต๊ะ: <span id="lblTableNo">-</span></div>
                <div class="text-sm font-bold text-gray-600" id="lblDateTime">--:--:--</div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-2 text-sm font-bold text-gray-400 border-b pb-3 mb-3">
            <span class="col-span-6">รายการสินค้า</span>
            <span class="col-span-2 text-center">จำนวน</span>
            <span class="col-span-2 text-right">ราคา</span>
            <span class="col-span-2 text-right">รวม</span>
        </div>

        <div id="cartItemsContainer" class="flex-1 space-y-3 overflow-y-auto">
            <!-- รอข้อมูลจากแคชเชียร์ -->
        </div>

        <div id="summaryFooter" class="hidden border-t-2 border-dashed pt-4 mt-4 space-y-2 text-sm font-bold text-gray-600">
            <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="txtSubTotal">0.00</span></div>
            <div class="flex justify-between"><span>ภาษีมูลค่าเพิ่ม 7%</span><span id="txtTax">0.00</span></div>
            <div class="flex justify-between"><span>ค่าบริการ 10%</span><span id="txtService">0.00</span></div>
            <div class="flex justify-between text-3xl font-black text-pink-600 border-t border-dashed pt-3 mt-2">
                <span>ยอดรวมทั้งสิ้น</span>
                <span><span id="txtGrandTotal">0.00</span> บาท</span>
            </div>
        </div>
    </section>

    <!-- ฝั่งขวา: พื้นที่ว่างรอการโต้ตอบ -->
    <section id="rightPanel" class="white-card w-1/2 flex flex-col items-center justify-center text-center">
        <div id="idleState" class="fade-in">
            <span class="text-8xl mb-6 block">✨</span>
            <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
            <p class="text-gray-300 font-bold text-xl mt-2">รอรายการอาหารจากหน้าแคชเชียร์...</p>
        </div>
    </section>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

    setInterval(() => {
        document.getElementById('lblDateTime').innerText = new Date().toLocaleTimeString('th-TH');
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getCDSStateGS" }) })
        .then(res => res.json()).then(data => {
            if(data.status === "Success" && data.result) updateUI(JSON.parse(data.result));
        });
    }, 1500);

    function updateUI(state) {
        if(!state) return;
        
        const cartCont = document.getElementById('cartItemsContainer');
        const summary = document.getElementById('summaryFooter');
        const idle = document.getElementById('idleState');
        
        if(state.cart && state.cart.length > 0) {
            idle.classList.add('hidden');
            summary.classList.remove('hidden');
            
            // อัปเดตรายการสินค้า
            let html = '';
            state.cart.forEach(item => {
                html += `
                <div class="grid grid-cols-12 gap-2 text-sm font-bold text-gray-700 fade-in">
                    <span class="col-span-6 truncate">${item.name}</span>
                    <span class="col-span-2 text-center text-gray-400">${item.qty}</span>
                    <span class="col-span-2 text-right text-gray-400">${parseFloat(item.price).toFixed(2)}</span>
                    <span class="col-span-2 text-right">${parseFloat(item.total).toFixed(2)}</span>
                </div>`;
            });
            cartCont.innerHTML = html;
            
            // อัปเดตตัวเลข
            document.getElementById('lblTableNo').innerText = state.tableNo || "-";
            document.getElementById('txtSubTotal').innerText = (state.subTotal || 0).toFixed(2);
            document.getElementById('txtTax').innerText = (state.vat || 0).toFixed(2);
            document.getElementById('txtService').innerText = (state.serviceCharge || 0).toFixed(2);
            document.getElementById('txtGrandTotal').innerText = (state.grandTotal || 0).toFixed(2);
        } else {
            // กรณีไม่มีสินค้า (ว่าง)
            cartCont.innerHTML = '';
            summary.classList.add('hidden');
            idle.classList.remove('hidden');
            document.getElementById('lblTableNo').innerText = "-";
        }
    }
</script>
</body>
</html>
