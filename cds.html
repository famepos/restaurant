<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>FamePOS Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7cbdc; margin: 0; height: 100vh; overflow: hidden; }
        .main-container { display: flex; gap: 10px; height: 100vh; padding: 10px; box-sizing: border-box; }
        .white-card { background: white; border-radius: 2rem; border: 3px solid #fecdd3; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ฝั่งซ้าย -->
        <section class="white-card w-1/2 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3">
                    <img src="https://i.postimg.cc/7h052Ffb/daa42c0e-2ccf-455e-9d46-491a67539e44.png" class="w-10 h-10 object-contain"> FamePOS
                </h1>
                <div class="text-right">
                    <div id="lblTableNo" class="text-lg font-bold text-gray-600">โต๊ะ: -</div>
                    <div id="lblDateTime" class="text-sm font-bold text-gray-400">--:--:--</div>
                </div>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto space-y-3"></div>
            <div id="summaryFooter" class="border-t-2 border-dashed pt-4 mt-4 space-y-2 text-lg font-bold text-gray-700">
                <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="txtSubTotal">0.00</span></div>
                <div class="flex justify-between"><span id="labelTax">ภาษี</span><span id="txtTax">0.00</span></div>
                <div class="flex justify-between"><span id="labelService">ค่าบริการ</span><span id="txtService">0.00</span></div>
                <div class="flex justify-between text-4xl font-black text-pink-600 border-t border-dashed pt-3 mt-2">
                    <span>ยอดรวมทั้งสิ้น</span>
                    <span><span id="txtGrandTotal">0.00</span> บาท</span>
                </div>
            </div>
        </section>
        <!-- ฝั่งขวา -->
        <section class="white-card w-1/2 flex flex-col items-center justify-center text-center">
            <div id="idleState">
                <span class="text-8xl mb-6 block">✨</span>
                <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

// 🟢 เปลี่ยนจาก 1000/1500 เป็น 500 (เพื่อให้จออัปเดตไวขึ้น สั่งปุ๊บจอติดปั๊บ)
    setInterval(() => {
        document.getElementById('lblDateTime').innerText = new Date().toLocaleTimeString('th-TH');
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getCDSStateGS" }) })
        .then(res => res.json()).then(data => {
            if(data.status === "Success" && data.result) updateUI(JSON.parse(data.result));
        });
    }, 500); 

function updateUI(state) {
    if(!document.getElementById('lblTableNo') || !state) return;

    // 1. อัปเดตส่วนหัวและรายละเอียดบริการ
    let displayType = "โต๊ะ: " + (state.tableNo || "-");
    if(state.orderType === "กลับบ้าน") displayType = "🛍️ กลับบ้าน";
    else if(state.orderType === "เดลิเวอรี่") displayType = "🛵 ส่งของ";
    document.getElementById('lblTableNo').innerText = displayType;

    // 2. อัปเดตยอดเงิน (ใช้ parseFloat ป้องกัน NaN)
    document.getElementById('txtSubTotal').innerText = parseFloat(state.subTotal || 0).toFixed(2);
    document.getElementById('txtTax').innerText = parseFloat(state.vat || 0).toFixed(2);
    document.getElementById('txtService').innerText = parseFloat(state.serviceCharge || 0).toFixed(2);
    document.getElementById('txtGrandTotal').innerText = parseFloat(state.grandTotal || 0).toFixed(2);
    
    if(state.taxLabel) document.getElementById('labelTax').innerText = state.taxLabel;
    if(state.serviceLabel) document.getElementById('labelService').innerText = state.serviceLabel;

    // 3. อัปเดตรายการสินค้า
    const cartCont = document.getElementById('cartItemsContainer');
    const rightPanel = document.getElementById('rightPanel'); // สมมติว่าคือ div ฝั่งขวา

    if(state.cart && state.cart.length > 0) {
        let html = '';
        state.cart.forEach(item => {
            html += `
            <div class="grid grid-cols-12 gap-2 text-lg font-bold text-gray-800 border-b border-gray-50 py-1">
                <span class="col-span-6 truncate">${item.name}</span>
                <span class="col-span-2 text-center text-gray-500">${item.qty}</span>
                <span class="col-span-2 text-right text-gray-500">${parseFloat(item.price||0).toFixed(2)}</span>
                <span class="col-span-2 text-right">${parseFloat(item.total||0).toFixed(2)}</span>
            </div>`;
        });
        cartCont.innerHTML = html;

        // 🟢 แสดงหน้าจอชำระเงินฝั่งขวาตามโหมด
        if (state.status === 'cash_payment') {
            rightPanel.innerHTML = `<div class="text-center fade-in"><div class="text-2xl font-bold text-gray-500">รับเงิน</div><div class="text-6xl font-black text-gray-800 my-4">${parseFloat(state.cashReceived||0).toFixed(2)}</div><div class="text-4xl font-bold text-emerald-500">ทอน: ${parseFloat(state.changeAmount||0).toFixed(2)}</div></div>`;
        } else if (state.status === 'qr_payment') {
            rightPanel.innerHTML = `<div class="text-center fade-in"><div class="text-2xl font-bold text-gray-500 mb-4">สแกน QR ชำระเงิน</div><img src="https://promptpay.io/${state.promptPay}/${state.grandTotal}.png" class="w-64 h-64 mx-auto border-4 p-2 rounded-2xl shadow-lg"></div>`;
        } else {
            // โหมดปกติ (กำลังเลือกสินค้า) -> อาจจะโชว์โลโก้ร้านหรือหน้าต้อนรับ
            rightPanel.innerHTML = `<div class="text-center fade-in"><span class="text-8xl mb-6 block">✨</span><h3 class="text-3xl font-bold text-gray-400">ตรวจสอบรายการอาหาร</h3></div>`;
        }

    } else {
        // กรณีไม่มีสินค้า (ว่าง)
        cartCont.innerHTML = '';
        document.getElementById('txtSubTotal').innerText = "0.00";
        document.getElementById('txtTax').innerText = "0.00";
        document.getElementById('txtService').innerText = "0.00";
        document.getElementById('txtGrandTotal').innerText = "0.00";
        rightPanel.innerHTML = `<div class="text-center fade-in"><span class="text-8xl mb-6 block">✨</span><h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3><p class="text-gray-400 font-bold text-xl mt-2">เชิญเลือกสั่งรายการอาหารที่เคาน์เตอร์ได้เลยค่ะ</p></div>`;
    }
}
    </script>
</body>
</html>
