<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>FamePOS Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">

      <link rel="icon" type="image/png" href="https://i.postimg.cc/kg2L1267/2f597a3c-9e6d-473b-a13c-500c4835f076.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/kg2L1267/2f597a3c-9e6d-473b-a13c-500c4835f076.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KDS FamePOS">
  <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7cbdc; margin: 0; height: 100vh; overflow: hidden; }
        .main-container { display: flex; gap: 10px; height: 100vh; padding: 10px; box-sizing: border-box; }
        .white-card { background: white; border-radius: 2rem; border: 3px solid #fecdd3; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ฝั่งซ้าย -->
        <section class="white-card w-1/2 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3">
                    <img src="https://i.postimg.cc/kg2L1267/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-10 h-10 object-contain"> FamePOS
                </h1>
                <div class="text-right">
                    <div id="lblTableNo" class="text-lg font-bold text-gray-600">โต๊ะ: -</div>
                    <div id="lblDateTime" class="text-sm font-bold text-gray-400">--:--:--</div>
                </div>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto space-y-3"></div>
            <div id="summaryFooter" class="border-t-2 border-dashed pt-4 mt-4 space-y-2 text-lg font-bold text-gray-700">
                <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="txtSubTotal">0.00</span></div>
                <div class="flex justify-between"><span id="labelTax">ภาษี</span><span id="txtTax">0.00</span></div>
                <div class="flex justify-between"><span id="labelService">ค่าบริการ</span><span id="txtService">0.00</span></div>
                <div class="flex justify-between text-4xl font-black text-pink-600 border-t border-dashed pt-3 mt-2">
                    <span>ยอดรวมทั้งสิ้น</span>
                    <span><span id="txtGrandTotal">0.00</span> บาท</span>
                </div>
            </div>
        </section>
       
       <!-- ฝั่งขวา -->
<section id="rightPanel" class="white-card w-1/2 flex flex-col items-center justify-center text-center">
    <div id="idleState">
        <span class="text-8xl mb-6 block">✨</span>
        <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
        <p class="text-gray-400 font-bold text-xl mt-2">เชิญเลือกสั่งรายการอาหารที่เคาน์เตอร์ได้เลยค่ะ</p>
    </div>
</section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

// 🟢 เปลี่ยนจาก 1000/1500 เป็น 500 (เพื่อให้จออัปเดตไวขึ้น สั่งปุ๊บจอติดปั๊บ)
    setInterval(() => {
        document.getElementById('lblDateTime').innerText = new Date().toLocaleTimeString('th-TH');
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getCDSStateGS" }) })
        .then(res => res.json()).then(data => {
            if(data.status === "Success" && data.result) updateUI(JSON.parse(data.result));
        });
    }, 500); 

function updateUI(state) {
    if(!state) return;

    // --- 1. อัปเดตฝั่งซ้าย (บิล) ---
    const setText = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
    const safe = (val) => isNaN(parseFloat(val)) ? "0.00" : parseFloat(val).toFixed(2);
    
    // ตั้งค่าประเภทบริการ
    let displayType = "โต๊ะ: " + (state.tableNo || "-");
    if(state.orderType === "กลับบ้าน") displayType = "🛍️ กลับบ้าน";
    else if(state.orderType === "เดลิเวอรี่") displayType = "🛵 ส่งของ";
    if (!state.cart || state.cart.length === 0) displayType = "โต๊ะ: -";
    setText('lblTableNo', displayType);

    setText('txtSubTotal', safe(state.subTotal));
    setText('txtTax', safe(state.vat));
    setText('txtService', safe(state.serviceCharge));
    setText('txtGrandTotal', safe(state.grandTotal));
    if(state.taxLabel) setText('labelTax', state.taxLabel);
    if(state.serviceLabel) setText('labelService', state.serviceLabel);

    const cartCont = document.getElementById('cartItemsContainer');
    if(state.cart && state.cart.length > 0) {
        let html = '';
        state.cart.forEach(item => {
            html += `
            <div class="grid grid-cols-12 gap-2 text-lg font-bold text-gray-800 border-b border-gray-50 py-1">
                <span class="col-span-6 truncate">${item.name}</span>
                <span class="col-span-2 text-center text-gray-500">${item.qty}</span>
                <span class="col-span-2 text-right text-gray-500">${safe(item.price)}</span>
                <span class="col-span-2 text-right">${safe(item.total)}</span>
            </div>`;
        });
        cartCont.innerHTML = html;
    } else {
        cartCont.innerHTML = '';
    }

    // --- 2. 🌟 ระบบคำนวณเวลาถอยหลัง (ใช้ร่วมกันทุกโหมดที่มี QR Code) ---
    let timerText = state.qrTimerText || "10:00";
    if (state.timestamp) {
        let parts = timerText.split(':');
        if (parts.length === 2) {
            let initialSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            let elapsed = Math.floor((Date.now() - state.timestamp) / 1000);
            let currentSeconds = initialSeconds - elapsed;
            if (currentSeconds < 0) currentSeconds = 0;
            let m = Math.floor(currentSeconds / 60).toString().padStart(2, '0');
            let s = (currentSeconds % 60).toString().padStart(2, '0');
            timerText = m + ":" + s;
        }
    }
    // ตัวแปรเก็บเวลาถอยหลัง เพื่อเอาไปแทรกตรงไหนก็ได้ที่ต้องการให้โชว์
    let timerHtml = `
        <div class="bg-pink-50 text-pink-600 font-bold px-6 py-2.5 rounded-full text-xl mb-6 border-2 border-pink-100 shadow-sm flex items-center justify-center gap-2 w-max mx-auto">
            <span>⏳</span> เวลาคงเหลือ: <span>${timerText}</span>
        </div>
    `;

    // --- 3. วาดหน้าจอฝั่งขวา (Right Panel) ---
    const rightPanel = document.getElementById('rightPanel');
    if(!rightPanel) return;
    
    if (state.status === 'cash_payment') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col justify-center items-center">
                <div class="w-10/12 border-b-4 border-dashed border-gray-100 pb-8 mb-8">
                    <div class="text-3xl font-bold text-pink-600/70 mb-4">เงินทอน</div>
                    <div class="text-8xl font-black text-pink-500 drop-shadow-sm">฿${safe(state.changeAmount)}</div>
                </div>
                <div>
                    <div class="text-xl font-bold text-gray-400 mb-2">รับเงินสดมา</div>
                    <div class="text-5xl font-black text-gray-600">฿${safe(state.cashReceived)}</div>
                </div>
            </div>`;
    }
    else if (state.status === 'qr_payment') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col items-center justify-center mt-8">
                <h3 class="text-3xl font-bold text-pink-700 mb-2">📱 สแกน QR Code เพื่อชำระเงิน</h3>
                <p class="text-lg text-gray-400 mb-6 font-medium">กรุณาสแกนจ่ายเงินภายในเวลาที่กำหนด</p>
                
                ${timerHtml}
                
                <div class="bg-white p-4 rounded-3xl border-4 border-pink-100 mb-8 shadow-inner inline-block">
                    <img src="https://promptpay.io/${state.promptPay || '0000000000'}/${safe(state.grandTotal)}.png" class="w-72 h-72 object-contain rounded-xl">
                </div>
                
                <div class="text-xl text-gray-500 mb-1 font-bold">ยอดเงินที่ต้องสแกน</div>
                <div class="text-7xl font-black text-pink-600">฿${safe(state.grandTotal)}</div>
            </div>`;
    }
    else if (state.status === 'half_payment') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full px-6">
                <div class="text-4xl font-bold text-orange-600 mb-8">โครงการ คนละครึ่ง (ไทยช่วยไทย)</div>
                <div class="flex gap-4 w-full">
                    <div class="flex-1 bg-orange-50 border-4 border-orange-200 rounded-[2rem] p-6 shadow-sm">
                        <div class="text-xl font-bold text-orange-600 mb-2">ลูกค้าจ่าย (40%)</div>
                        <div class="text-5xl font-black text-orange-700">฿${(state.grandTotal * 0.4).toFixed(2)}</div>
                    </div>
                    <div class="flex-1 bg-purple-50 border-4 border-purple-200 rounded-[2rem] p-6 shadow-sm">
                        <div class="text-xl font-bold text-purple-300 mb-2">รัฐออกให้ (60%)</div>
                        <div class="text-5xl font-black text-purple-400">฿${(state.grandTotal * 0.6).toFixed(2)}</div>
                    </div>
                </div>
            </div>`;
    }
else if (state.status === 'delivery_payment') {
        // 🌟 ดึงชื่อแอป (ตัดอีโมจิด้านหน้า และข้อความวงเล็บด้านหลังออกให้เหลือแค่ชื่อแอป)
        let appName = "Delivery";
        if (state.deliveryAppText) {
            let parts = state.deliveryAppText.split(' ');
            if (parts.length > 1) appName = parts[1]; // ดึงคำที่ 2 (เช่น Grab, LineMan)
        }
        
        let orderId = state.deliveryOrderId ? state.deliveryOrderId : "";
        let deliveryMsg = `${appName} ${orderId}`.trim();

        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col items-center justify-center mt-4">
                <div class="w-32 h-32 bg-orange-100 rounded-full flex items-center justify-center text-orange-500 text-6xl mx-auto mb-6 shadow-inner">
                    🛵
                </div>
                <h3 class="text-4xl font-black text-orange-600 mb-4">ระบบเดลิเวอรี่</h3>
                
                <!-- 🌟 กล่องแสดงแอปและเลขออเดอร์ -->
                <div class="bg-gradient-to-r from-orange-400 to-orange-500 text-white px-8 py-3 rounded-full text-2xl font-bold mb-4 shadow-md inline-block">
                    ${deliveryMsg} รอรับอาหารได้เลยค่ะ
                </div>
                
                <p class="text-lg text-gray-500 mb-8 font-bold">ทำรายการผ่านแอปพลิเคชัน</p>
                
                <div class="bg-orange-50 py-8 px-12 rounded-[2.5rem] border-4 border-orange-200 shadow-sm inline-block">
                    <div class="text-xl text-orange-600 font-bold mb-2">ยอดเรียกเก็บ (สุทธิ)</div>
                    <div class="text-7xl font-black text-orange-600">฿${safe(state.grandTotal)}</div>
                </div>
            </div>`;
    }
    else if (state.status === 'split_mix') {
        let changeHtml = state.splitMixChange > 0 ? `
            <div class="text-xl font-bold text-emerald-500 mt-2">
                ทอนเงิน ฿${safe(state.splitMixChange)}
            </div>` : '';

        let cashHtml = state.splitMixCash > 0 ? `
            <div class="bg-gray-100 text-gray-700 font-bold px-6 py-3 rounded-2xl text-xl mb-4 inline-block border border-gray-200 shadow-sm">
                💵 รับเงินสดมาแล้ว: <span class="text-2xl">฿${safe(state.splitMixCash)}</span>
                ${changeHtml}
            </div>
        ` : '';

        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col items-center justify-center mt-2 h-full">
                <!-- 🌟 ปรับเงินสดไว้บนสุด ตามที่คุณแจ้ง -->
                <h3 class="text-2xl font-bold text-gray-700 mb-3">ยอดบิลรวม: ฿${safe(state.grandTotal)}</h3>
                ${cashHtml}

                ${state.splitMixTransfer > 0 ? `
                <div class="border-t border-dashed border-gray-300 w-full max-w-md my-4"></div>
                
                <!-- 🌟 QR Code สไตล์เดียวกับหน้าปกติ + มีเวลาถอยหลัง -->
                <h3 class="text-3xl font-bold text-pink-700 mb-2 mt-2">📱 สแกน QR Code เพื่อชำระเงิน</h3>
                <p class="text-lg text-gray-400 mb-4 font-medium">กรุณาสแกนจ่ายยอดส่วนต่างที่เหลือ</p>
                
                ${timerHtml}
                
                <div class="bg-white p-4 rounded-3xl border-4 border-pink-100 mb-4 shadow-inner inline-block">
                    <img src="${state.promptPayUrl}" class="w-64 h-64 object-contain rounded-xl">
                </div>
                
                <div class="text-xl text-gray-500 mb-1 font-bold">ยอดเงินโอนสุทธิ</div>
                <div class="text-6xl font-black text-pink-600">฿${safe(state.splitMixTransfer)}</div>
                ` : `
                <div class="border-t border-dashed border-gray-300 w-full max-w-md my-4"></div>
                <div class="w-32 h-32 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-5xl mx-auto mt-8 mb-4">✓</div>
                <h3 class="text-4xl font-black text-emerald-600">รับเงินสดครบแล้ว</h3>
                `}
            </div>`;
    }
    else if (state.status === 'split_equal') {
        let totalCash = 0;
        let totalChange = 0;
        let personsHtml = '';
        
        if (state.splitPersons && state.splitPersons.length > 0) {
            state.splitPersons.forEach(p => {
                if (p.method === 'transfer') {
                    personsHtml += `
                    <div class="bg-white p-3 rounded-2xl border border-pink-100 shadow-sm flex justify-between items-center transition-all mb-2">
                        <div class="font-bold text-gray-800 flex items-center gap-2 text-base">
                            <span class="bg-pink-100 text-pink-600 w-8 h-8 flex items-center justify-center rounded-full text-sm">👤</span>
                            คนที่ ${p.id}
                        </div>
                        <span class="px-3 py-1 bg-pink-50 text-pink-600 rounded-xl text-sm font-bold border border-pink-200">📱 โอนเงิน</span>
                    </div>`;
                } else {
                    totalCash += p.cashReceived;
                    totalChange += p.change;
                    personsHtml += `
                    <div class="bg-white p-3 rounded-2xl border border-emerald-100 shadow-sm flex flex-col gap-2 transition-all mb-2 border-l-4 border-emerald-400">
                        <div class="flex justify-between items-center border-b border-dashed border-gray-100 pb-2">
                            <div class="font-bold text-gray-800 flex items-center gap-2 text-base">
                                <span class="bg-emerald-100 text-emerald-600 w-8 h-8 flex items-center justify-center rounded-full text-sm">👤</span>
                                คนที่ ${p.id}
                            </div>
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-xl text-sm font-bold border border-emerald-200">💵 เงินสด</span>
                        </div>
                        <div class="flex justify-between items-center px-1">
                            <span class="text-gray-500 font-bold text-xs">รับมา: <span class="text-gray-800 text-sm">฿${safe(p.cashReceived)}</span></span>
                            <span class="text-emerald-600 font-black text-sm bg-emerald-50 px-2 py-1 rounded-lg">ทอน: ฿${safe(p.change)}</span>
                        </div>
                    </div>`;
                }
            });
        }

        rightPanel.innerHTML = `
        <div class="flex flex-col w-full h-full animate-fade-in p-2">
            <h2 class="text-3xl font-black text-pink-700 mb-4 text-center shrink-0">👥 หารบิล (จ่ายเท่ากัน)</h2>
            
            <div class="flex flex-row w-full gap-4 h-full min-h-0">
                <!-- ฝั่งซ้าย: โชว์ QR Code สำหรับยอดโอน (มีเวลาถอยหลัง) -->
                <div class="w-1/2 flex flex-col items-center justify-center bg-white rounded-3xl shadow-sm p-4 shrink-0 border border-gray-100">
                    <h3 class="text-2xl font-bold text-pink-700 mb-2">📱 สแกน QR Code</h3>
                    <p class="text-sm text-gray-400 mb-4 font-medium">สำหรับคนโอนจ่าย (ต่อคน)</p>
                    
                    ${state.promptPayUrl ? `
                    <!-- 🌟 แทรกเวลาถอยหลัง 🌟 -->
                    ${timerHtml}
                    
                    <div class="bg-white p-3 rounded-3xl border-4 border-pink-100 shadow-inner mb-4 inline-block">
                        <img src="${state.promptPayUrl}" class="w-56 h-56 object-contain rounded-xl">
                    </div>
                    ` : '<div class="text-gray-400 font-bold mb-4">ไม่ได้ตั้งค่าพร้อมเพย์</div>'}
                    
                    <div class="text-base text-gray-500 mb-1 font-bold">ยอดเงินที่ต้องสแกน</div>
                    <div class="text-5xl font-black text-pink-600">฿${state.splitPerPerson || "0.00"}</div>
                </div>

                <!-- ฝั่งขวา: รายชื่อคนจ่ายเงินสด/โอน -->
                <div class="w-1/2 flex flex-col gap-2 overflow-y-auto pr-2 pb-4">
                    <div class="bg-gray-100 rounded-2xl p-3 mb-2 shrink-0 text-center flex justify-around shadow-inner">
                        <div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase">จำนวนคน</div>
                            <div class="text-xl font-black text-gray-800">${state.splitPeopleCount || 0}</div>
                        </div>
                        <div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase">ยอดบิลสุทธิ</div>
                            <div class="text-xl font-black text-pink-600">฿${safe(state.grandTotal)}</div>
                        </div>
                    </div>

                    <!-- รายชื่อแต่ละคน -->
                    ${personsHtml}

                    <!-- สรุปเงินสด/เงินทอนรวม -->
                    ${totalCash > 0 ? `
                    <div class="mt-2 bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-3 shrink-0 shadow-sm">
                        <div class="flex justify-between text-xs text-emerald-700 font-bold mb-1">
                            <span>รับเงินสดรวม:</span> <span>฿${safe(totalCash)}</span>
                        </div>
                        <div class="flex justify-between text-sm text-emerald-600 font-black pt-1 border-t border-emerald-200">
                            <span>ทอนเงินรวม:</span> <span>฿${safe(totalChange)}</span>
                        </div>
                    </div>
                    ` : ''}
                </div>
            </div>
        </div>`;
    }
    else if (state.status === 'success_paid') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full">
                <div class="w-40 h-40 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-7xl mx-auto mb-6">✓</div>
                <h3 class="text-5xl font-black text-emerald-600">ชำระครบถ้วน</h3>
            </div>`;
    }
    else if (state.cart && state.cart.length > 0) {
        rightPanel.innerHTML = `
            <div class="text-center fade-in">
                <span class="text-8xl mb-6 block">✨</span>
                <h3 class="text-3xl font-bold text-gray-400">ตรวจสอบรายการอาหาร</h3>
            </div>`;
    }
    else {
        rightPanel.innerHTML = `
            <div id="idleState" class="text-center">
                <span class="text-8xl mb-6 block">✨</span>
                <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
                <p class="text-gray-400 font-bold text-xl mt-2">เชิญเลือกสั่งรายการอาหารที่เคาน์เตอร์ได้เลยค่ะ</p>
            </div>`;
    }
}
    </script>
</body>
</html>
