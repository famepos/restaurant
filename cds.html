<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link rel="icon" type="image/png" href="https://i.postimg.cc/8Cwxv2p4/6c30486b-4495-4255-bbc4-48acf5195d23.png" sizes="192x192">

<link rel="apple-touch-icon" href="https://i.postimg.cc/8Cwxv2p4/6c30486b-4495-4255-bbc4-48acf5195d23.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CDS FamePOS">

<meta name="mobile-web-app-capable" content="yes">

  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #fff5f5; margin: 0; overflow: hidden; }
    ::-webkit-scrollbar { display: none; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <header class="bg-rose-600 text-white p-4 shadow-md flex justify-between items-center shrink-0 z-10">
    <div class="flex items-center gap-3">
        <div class="bg-white text-rose-600 w-12 h-12 flex items-center justify-center rounded-xl text-2xl font-bold">F</div>
        <h1 class="text-3xl font-bold tracking-wide">FamePOS</h1>
    </div>
    <div id="dateTimeDisplay" class="text-lg font-medium opacity-90"></div>
  </header>

  <main class="flex-1 flex gap-6 p-6 overflow-hidden">
    
    <section class="flex-1 bg-white rounded-[2rem] shadow-xl border border-rose-100 flex flex-col overflow-hidden">
      <div class="bg-rose-50 p-4 border-b border-rose-100">
        <h2 class="text-2xl font-bold text-rose-800">รายการสินค้า (Order Items)</h2>
      </div>
      
      <div class="flex-1 overflow-y-auto p-4 space-y-3" id="customerCartItems">
        <div class="h-full flex flex-col items-center justify-center text-rose-200">
            <span class="text-8xl mb-4">🛒</span>
            <p class="text-2xl font-bold text-gray-400">ยินดีต้อนรับ เชิญสั่งอาหารได้เลยครับ</p>
        </div>
      </div>
    </section>

    <section class="w-1/3 min-w-[400px] flex flex-col gap-6">
      
      <div class="bg-white rounded-[2rem] shadow-xl border border-rose-100 p-6 flex flex-col gap-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 border-b pb-2">สรุปยอดชำระ</h2>
        <div class="flex justify-between items-center text-xl text-gray-600">
            <span>ยอดรวม:</span>
            <span id="displaySubTotal" class="font-bold">฿0.00</span>
        </div>
        <div class="flex justify-between items-center text-xl text-rose-600 font-bold bg-rose-50 p-4 rounded-2xl border border-rose-100">
            <span>ยอดสุทธิ:</span>
            <span id="displayGrandTotal" class="text-4xl">฿0.00</span>
        </div>
        <div class="flex justify-between items-center text-lg text-emerald-600 bg-emerald-50 p-4 rounded-2xl border border-emerald-100 hidden" id="changeContainer">
            <span class="font-bold">เงินทอน:</span>
            <span id="displayChange" class="text-3xl font-bold">฿0.00</span>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] shadow-xl border border-rose-100 p-6 flex-1 flex flex-col items-center justify-center text-center relative overflow-hidden">
         <div id="adState" class="fade-in absolute inset-0 flex flex-col items-center justify-center p-6 bg-gradient-to-br from-rose-50 to-white">
            <span class="text-6xl mb-4">✨</span>
            <h3 class="text-2xl font-bold text-rose-700 mb-2">รับสิทธิพิเศษมากมาย</h3>
            <p class="text-gray-500 font-medium">สมัครสมาชิกเพื่อสะสมแต้มและรับส่วนลด</p>
         </div>

         <div id="qrState" class="hidden fade-in absolute inset-0 flex flex-col items-center justify-center bg-white z-10 p-4">
            <h3 class="text-2xl font-bold text-blue-800 mb-2">📱 สแกน QR เพื่อชำระเงิน</h3>
            <img id="qrDisplayImage" src="" class="w-64 h-64 object-contain border-4 border-blue-100 p-2 rounded-2xl shadow-sm mb-4">
            <p class="text-gray-500 font-medium animate-pulse">กรุณาสแกนผ่านแอปธนาคาร</p>
         </div>
      </div>

    </section>
  </main>

  <script>
    // นาฬิกา
    setInterval(() => {
        const now = new Date();
        document.getElementById('dateTimeDisplay').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'short' }) + ' ' + now.toLocaleTimeString('th-TH');
    }, 1000);

    // ดักฟังการส่งข้อมูลจากหน้าจอแคชเชียร์
    window.addEventListener('storage', function(e) {
        if (e.key === 'famepos_customer_display') {
            const data = JSON.parse(e.newValue);
            updateCustomerUI(data);
        }
    });

    function updateCustomerUI(data) {
        // 1. อัปเดตตะกร้าสินค้า
        const cartContainer = document.getElementById('customerCartItems');
        if (!data.cart || data.cart.length === 0) {
            cartContainer.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-rose-200 fade-in">
                    <span class="text-8xl mb-4">🛒</span>
                    <p class="text-2xl font-bold text-gray-400">ยินดีต้อนรับ เชิญสั่งอาหารได้เลยครับ</p>
                </div>`;
        } else {
            let html = '';
            data.cart.forEach(item => {
                html += `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm fade-in">
                    <div class="flex-1 pr-4">
                        <div class="font-bold text-gray-800 text-xl">${item.name}</div>
                    </div>
                    <div class="font-bold text-gray-500 text-xl w-16 text-center">x${item.qty}</div>
                    <div class="font-bold text-rose-600 text-xl w-24 text-right">฿${(item.price * item.qty).toFixed(2)}</div>
                </div>`;
            });
            cartContainer.innerHTML = html;
            // เลื่อนลงล่างสุดอัตโนมัติ
            cartContainer.scrollTop = cartContainer.scrollHeight;
        }

        // 2. อัปเดตตัวเลข
        document.getElementById('displaySubTotal').innerText = data.totalPrice;
        document.getElementById('displayGrandTotal').innerText = data.grandTotal;

        // 3. จัดการเงินทอน
        const changeBox = document.getElementById('changeContainer');
        if (data.change && parseFloat(data.change) > 0) {
            document.getElementById('displayChange').innerText = "฿" + data.change;
            changeBox.classList.remove('hidden');
        } else {
            changeBox.classList.add('hidden');
        }

        // 4. จัดการ QR Code
        const adState = document.getElementById('adState');
        const qrState = document.getElementById('qrState');
        
        if (data.status === 'qr_payment' && data.qrImage) {
            document.getElementById('qrDisplayImage').src = data.qrImage;
            adState.classList.add('hidden');
            qrState.classList.remove('hidden');
        } else {
            qrState.classList.add('hidden');
            adState.classList.remove('hidden');
        }
    }
  </script>
</body>
</html>
