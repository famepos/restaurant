<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>สั่งอาหาร | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; color: #b32089; margin: 0; }
    .modern-card { background: white; border: 1px solid #edc5e2; border-radius: 1.5rem; transition: 0.2s; }
    .modern-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.1); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="pb-28">

  <!-- Header & Logo -->
  <div class="bg-white shadow-sm p-4 sticky top-0 z-40 flex items-center justify-between border-b border-pink-100">
    <div class="flex items-center gap-3">
      <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-12 h-12 object-contain drop-shadow-sm" alt="App Logo">
      <div>
        <h1 class="text-xl font-bold text-pink-600 leading-tight">FamePOS</h1>
        <p class="text-xs text-gray-500 font-medium">สั่งอาหารผ่านมือถือ</p>
      </div>
    </div>
    <div id="tableDisplay" class="bg-pink-100 text-pink-700 px-3 py-1 rounded-lg text-sm font-bold shadow-sm">
      โต๊ะ: <span>ระบุ...</span>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loadingState" class="flex flex-col items-center justify-center mt-20">
    <div class="text-4xl animate-spin mb-4">⏳</div>
    <div class="text-pink-600 font-bold">กำลังโหลดเมนูอาหาร...</div>
  </div>

  <!-- Menu Grid -->
  <div id="menuGrid" class="p-4 grid grid-cols-2 gap-4 hidden">
    <!-- รายการสินค้าจะถูกดึงมาสร้างที่นี่ -->
  </div>

  <!-- Floating Cart Bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-pink-100 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] flex justify-between items-center z-50 rounded-t-3xl">
    <div class="flex flex-col">
      <span class="text-xs font-bold text-gray-500">ยอดรวมทั้งหมด</span>
      <div class="text-2xl font-black text-pink-600" id="cartTotal">฿0.00</div>
    </div>
    <button onclick="openCartModal()" class="bg-pink-500 text-white px-6 py-3.5 rounded-2xl font-bold text-lg shadow-md hover:bg-pink-600 transition flex items-center gap-2">
      🛒 <span id="cartCountBadge" class="bg-white text-pink-600 px-2 py-0.5 rounded-md text-sm">0</span> ยืนยันสั่ง
    </button>
  </div>

  <!-- Cart Modal -->
  <div id="cartModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl relative max-h-[85vh] flex flex-col">
      <button onclick="closeCartModal()" class="absolute top-4 right-5 text-gray-400 hover:text-pink-500 text-3xl font-bold">&times;</button>
      <h2 class="text-xl font-bold text-pink-700 mb-4 border-b pb-3">🛒 ตะกร้าของคุณ</h2>
      
      <!-- ช่องกรอกเบอร์โต๊ะ (กรณีไม่ได้แนบมากับ QR) -->
      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-600 mb-2">ระบุหมายเลขโต๊ะของคุณ <span class="text-red-500">*</span></label>
        <input type="text" id="customerTableNo" placeholder="เช่น 01 หรือ A5" class="w-full p-3 rounded-xl border-2 border-pink-100 focus:outline-none focus:border-pink-500 text-center font-bold text-pink-700 text-lg">
      </div>

      <div id="cartItemsList" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
        <!-- ของในตะกร้า -->
      </div>
      
      <div class="mt-auto pt-4 border-t flex gap-3">
        <button onclick="closeCartModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">เลือกเพิ่ม</button>
        <button onclick="submitOrder()" id="btnSubmitOrder" class="flex-1 py-3 bg-pink-600 text-white rounded-xl font-bold shadow-md hover:bg-pink-700">🚀 ส่งเข้าห้องครัว</button>
      </div>
    </div>
  </div>

  <script>
    let products = [];
    let cart = [];

    // ดึงข้อมูลสินค้าจากระบบหลังบ้าน
    function fetchMenu() {
      google.script.run
        .withSuccessHandler(function(data) {
          products = data;
          renderMenu();
          document.getElementById('loadingState').classList.add('hidden');
          document.getElementById('menuGrid').classList.remove('hidden');
        })
        .getProductsForMenu();
    }

    // สร้างการ์ดสินค้า
    function renderMenu() {
      let grid = document.getElementById('menuGrid');
      let html = '';
      
      products.forEach(function(item, index) {
        let name = item.name;
        let price = parseFloat(item.price) || 0;
        let imgUrl = item.image || '';
        let remaining = item.remaining;
        
        let isOutOfStock = (remaining !== "" && remaining !== null && remaining <= 0);
        let imgTag = imgUrl ? `<img src="${imgUrl}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-pink-50 flex items-center justify-center text-4xl">🍲</div>`;
        
        let cardClass = "modern-card p-3 flex flex-col h-full relative ";
        let btnAction = `onclick="addToCart(${index})"`;
        
        if (isOutOfStock) {
          cardClass += "opacity-50 grayscale";
          btnAction = `onclick="alert('ขออภัย สินค้านี้หมดชั่วคราวครับ')"`;
        }

        html += `
          <div class="${cardClass}">
            <div class="h-28 w-full mb-3 rounded-xl overflow-hidden border border-gray-100 shadow-sm">${imgTag}</div>
            <h3 class="font-bold text-gray-800 text-sm leading-tight mb-2 line-clamp-2">${name}</h3>
            <div class="mt-auto flex justify-between items-end">
              <div class="text-pink-600 font-bold text-lg">฿${price}</div>
              <button ${btnAction} class="${isOutOfStock ? 'bg-gray-300' : 'bg-pink-100 text-pink-600 hover:bg-pink-500 hover:text-white'} w-8 h-8 rounded-full font-bold flex items-center justify-center transition shadow-sm pb-0.5">
                ${isOutOfStock ? 'หมด' : '+'}
              </button>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    // จัดการตะกร้าสินค้า
    function addToCart(productIndex) {
      let product = products[productIndex];
      let existingItem = cart.find(i => i.name === product.name);
      
      if (existingItem) {
        existingItem.qty++;
      } else {
        cart.push({ name: product.name, price: parseFloat(product.price), qty: 1 });
      }
      updateCartUI();
    }

    function increaseQty(index) { cart[index].qty++; updateCartUI(); }
    function decreaseQty(index) { 
      if(cart[index].qty > 1) cart[index].qty--; 
      else cart.splice(index, 1); 
      updateCartUI(); 
    }

    function updateCartUI() {
      let total = 0;
      let totalQty = 0;
      let html = '';
      
      cart.forEach((item, index) => {
        let lineTotal = item.price * item.qty;
        total += lineTotal;
        totalQty += item.qty;
        
        html += `
          <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
            <div class="flex-1 min-w-0 pr-2">
              <div class="font-bold text-gray-800 text-sm truncate">${item.name}</div>
              <div class="text-pink-600 font-bold text-xs">฿${lineTotal.toFixed(2)}</div>
            </div>
            <div class="flex items-center gap-3 bg-white p-1 rounded-lg shadow-sm border border-gray-100">
              <button onclick="decreaseQty(${index})" class="w-6 h-6 rounded bg-gray-100 text-gray-600 font-bold flex justify-center items-center">-</button>
              <span class="w-4 text-center font-bold text-sm">${item.qty}</span>
              <button onclick="increaseQty(${index})" class="w-6 h-6 rounded bg-pink-100 text-pink-600 font-bold flex justify-center items-center">+</button>
            </div>
          </div>
        `;
      });
      
      document.getElementById('cartTotal').innerText = `฿${total.toFixed(2)}`;
      document.getElementById('cartCountBadge').innerText = totalQty;
      document.getElementById('cartItemsList').innerHTML = html || '<div class="text-center text-gray-400 py-6 font-medium">ตะกร้าของคุณยังว่างเปล่า</div>';
    }

    // Modal Control
    function openCartModal() { document.getElementById('cartModal').classList.remove('hidden'); }
    function closeCartModal() { document.getElementById('cartModal').classList.add('hidden'); }

    // ส่งข้อมูลเข้าระบบหลังบ้าน
    function submitOrder() {
      let tableNo = document.getElementById('customerTableNo').value.trim();
      if (!tableNo) { alert("กรุณาระบุหมายเลขโต๊ะของคุณก่อนสั่งอาหารครับ"); return; }
      if (cart.length === 0) { alert("กรุณาเลือกอาหารก่อนยืนยันครับ"); return; }

      let btn = document.getElementById('btnSubmitOrder');
      btn.innerText = "⏳ กำลังส่งออเดอร์...";
      btn.disabled = true;

      let totalAmt = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      let orderData = { table: tableNo, items: cart, total: totalAmt };

      google.script.run
        .withSuccessHandler(function(res) {
          if(res === "Success") {
            alert("✅ ส่งออเดอร์เข้าครัวเรียบร้อยแล้ว กรุณารอสักครู่ครับ");
            cart = [];
            updateCartUI();
            closeCartModal();
          } else {
            alert("❌ เกิดข้อผิดพลาด: " + res);
          }
          btn.innerText = "🚀 ส่งเข้าห้องครัว";
          btn.disabled = false;
        })
        .submitCustomerOrder(orderData);
    }

    // เริ่มต้นทำงานทันทีที่โหลดหน้าจอ
    window.onload = fetchMenu;
  </script>
</body>
</html>
