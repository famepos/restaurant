<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>FamePOS Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7cbdc; margin: 0; height: 100vh; overflow: hidden; }
        .main-container { display: flex; gap: 10px; height: 100vh; padding: 10px; box-sizing: border-box; }
        .white-card { background: white; border-radius: 2rem; border: 3px solid #fecdd3; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ฝั่งซ้าย -->
        <section class="white-card w-1/2 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3">
                    <img src="https://i.postimg.cc/7h052Ffb/daa42c0e-2ccf-455e-9d46-491a67539e44.png" class="w-10 h-10 object-contain"> FamePOS
                </h1>
                <div class="text-right">
                    <div id="lblTableNo" class="text-lg font-bold text-gray-600">โต๊ะ: -</div>
                    <div id="lblDateTime" class="text-sm font-bold text-gray-400">--:--:--</div>
                </div>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto space-y-3"></div>
            <div id="summaryFooter" class="border-t-2 border-dashed pt-4 mt-4 space-y-2 text-lg font-bold text-gray-700">
                <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="txtSubTotal">0.00</span></div>
                <div class="flex justify-between"><span id="labelTax">ภาษี</span><span id="txtTax">0.00</span></div>
                <div class="flex justify-between"><span id="labelService">ค่าบริการ</span><span id="txtService">0.00</span></div>
                <div class="flex justify-between text-4xl font-black text-pink-600 border-t border-dashed pt-3 mt-2">
                    <span>ยอดรวมทั้งสิ้น</span>
                    <span><span id="txtGrandTotal">0.00</span> บาท</span>
                </div>
            </div>
        </section>
        <!-- ฝั่งขวา -->
       <!-- ฝั่งขวา -->
<section id="rightPanel" class="white-card w-1/2 flex flex-col items-center justify-center text-center">
    <div id="idleState">
        <span class="text-8xl mb-6 block">✨</span>
        <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
        <p class="text-gray-400 font-bold text-xl mt-2">เชิญเลือกสั่งรายการอาหารที่เคาน์เตอร์ได้เลยค่ะ</p>
    </div>
</section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

// 🟢 เปลี่ยนจาก 1000/1500 เป็น 500 (เพื่อให้จออัปเดตไวขึ้น สั่งปุ๊บจอติดปั๊บ)
    setInterval(() => {
        document.getElementById('lblDateTime').innerText = new Date().toLocaleTimeString('th-TH');
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getCDSStateGS" }) })
        .then(res => res.json()).then(data => {
            if(data.status === "Success" && data.result) updateUI(JSON.parse(data.result));
        });
    }, 500); 

function updateUI(state) {
    if(!state) return;

    // --- 1. อัปเดตฝั่งซ้าย (บิล) ---
    const setText = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
    const safe = (val) => isNaN(parseFloat(val)) ? "0.00" : parseFloat(val).toFixed(2);
    
    // ตั้งค่าประเภทบริการ
    let displayType = "โต๊ะ: " + (state.tableNo || "-");
    if(state.orderType === "กลับบ้าน") displayType = "🛍️ กลับบ้าน";
    else if(state.orderType === "เดลิเวอรี่") displayType = "🛵 ส่งของ";
    if (!state.cart || state.cart.length === 0) displayType = "โต๊ะ: -";
    setText('lblTableNo', displayType);

    setText('txtSubTotal', safe(state.subTotal));
    setText('txtTax', safe(state.vat));
    setText('txtService', safe(state.serviceCharge));
    setText('txtGrandTotal', safe(state.grandTotal));
    if(state.taxLabel) setText('labelTax', state.taxLabel);
    if(state.serviceLabel) setText('labelService', state.serviceLabel);

    const cartCont = document.getElementById('cartItemsContainer');
    if(state.cart && state.cart.length > 0) {
        let html = '';
        state.cart.forEach(item => {
            html += `
            <div class="grid grid-cols-12 gap-2 text-lg font-bold text-gray-800 border-b border-gray-50 py-1">
                <span class="col-span-6 truncate">${item.name}</span>
                <span class="col-span-2 text-center text-gray-500">${item.qty}</span>
                <span class="col-span-2 text-right text-gray-500">${safe(item.price)}</span>
                <span class="col-span-2 text-right">${safe(item.total)}</span>
            </div>`;
        });
        cartCont.innerHTML = html;
    } else {
        cartCont.innerHTML = '';
    }

    // --- 2. วาดหน้าจอฝั่งขวา (Right Panel) ตามสถานะที่แคชเชียร์ส่งมา ---
    const rightPanel = document.getElementById('rightPanel');
    if(!rightPanel) return;
    
if (state.status === 'cash_payment') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col justify-center items-center">
                <!-- 🟢 ส่วนเงินทอน (ย้ายมาไว้ข้างบน ตัวใหญ่ สีเขียว) -->
                <div class="w-10/12 border-b-4 border-dashed border-gray-100 pb-8 mb-8">
                    <div class="text-3xl font-bold text-emerald-600/70 mb-4">เงินทอน</div>
                    <div class="text-8xl font-black text-emerald-500 drop-shadow-sm">฿${safe(state.changeAmount)}</div>
                </div>
                
                <!-- 🔘 ส่วนรับเงินสด (ย้ายมาไว้ข้างล่าง เล็กลง สีเทา) -->
                <div>
                    <div class="text-xl font-bold text-gray-400 mb-2">รับเงินสดมา</div>
                    <div class="text-5xl font-black text-gray-600">฿${safe(state.cashReceived)}</div>
                </div>
            </div>`;
    }
else if (state.status === 'qr_payment') {
        // --- 🟢 ระบบคำนวณเวลาถอยหลังอัจฉริยะ (ไม่ต้องรอเน็ต) ---
        let timerText = state.qrTimerText || "10:00";
        
        // เช็คเวลาปัจจุบัน เทียบกับเวลาที่แคชเชียร์ส่งมา
        if (state.timestamp) {
            let parts = timerText.split(':');
            if (parts.length === 2) {
                let initialSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                
                // คำนวณเวลาที่ผ่านไป (วินาที)
                let elapsed = Math.floor((Date.now() - state.timestamp) / 1000);
                let currentSeconds = initialSeconds - elapsed;
                
                // ไม่ให้เวลาติดลบ
                if (currentSeconds < 0) currentSeconds = 0;
                
                // แปลงกลับเป็นรูปแบบ นาที:วินาที
                let m = Math.floor(currentSeconds / 60).toString().padStart(2, '0');
                let s = (currentSeconds % 60).toString().padStart(2, '0');
                timerText = m + ":" + s;
            }
        }

        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full flex flex-col items-center justify-center mt-8">
                <!-- หัวข้อ -->
                <h3 class="text-3xl font-bold text-pink-700 mb-2">📱 สแกน QR Code เพื่อชำระเงิน</h3>
                <p class="text-lg text-gray-400 mb-6 font-medium">กรุณาสแกนจ่ายเงินภายในเวลาที่กำหนด</p>
                
                <!-- กล่องเวลา -->
                <div class="bg-pink-50 text-pink-600 font-bold px-6 py-2.5 rounded-full text-xl mb-8 border-2 border-pink-100 shadow-sm flex items-center gap-2">
                    <span>⏳</span> เวลาคงเหลือ: <span>${timerText}</span>
                </div>
                
                <!-- กล่องใส่ QR Code -->
                <div class="bg-white p-4 rounded-3xl border-4 border-pink-100 mb-8 shadow-inner inline-block">
                    <img src="https://promptpay.io/${state.promptPay || '0000000000'}/${safe(state.grandTotal)}.png" class="w-72 h-72 object-contain rounded-xl">
                </div>
                
                <!-- ยอดเงิน -->
                <div class="text-xl text-gray-500 mb-1 font-bold">ยอดเงินที่ต้องสแกน</div>
                <div class="text-7xl font-black text-pink-600">฿${safe(state.grandTotal)}</div>
            </div>`;
    }
    else if (state.status === 'half_payment') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full px-6">
                <div class="text-4xl font-bold text-orange-600 mb-8">โครงการ คนละครึ่ง (ไทยช่วยไทย)</div>
                <div class="flex gap-4 w-full">
                    <div class="flex-1 bg-orange-50 border-4 border-orange-200 rounded-[2rem] p-6 shadow-sm">
                        <div class="text-xl font-bold text-orange-600 mb-2">ลูกค้าจ่าย (40%)</div>
                        <div class="text-5xl font-black text-orange-700">฿${(state.grandTotal * 0.4).toFixed(2)}</div>
                    </div>
                    <div class="flex-1 bg-blue-50 border-4 border-blue-200 rounded-[2rem] p-6 shadow-sm">
                        <div class="text-xl font-bold text-blue-600 mb-2">รัฐออกให้ (60%)</div>
                        <div class="text-5xl font-black text-blue-700">฿${(state.grandTotal * 0.6).toFixed(2)}</div>
                    </div>
                </div>
            </div>`;
    }
else if (state.status === 'split_mix') {
        let qrImgHtml = state.splitMixQR ? `<img src="${state.splitMixQR}" class="w-56 h-56 mx-auto border-4 border-orange-100 p-2 rounded-2xl shadow-sm mt-4">` : '';
        
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full px-4 flex flex-col items-center justify-center mt-2">
                <h3 class="text-3xl font-bold text-orange-600 mb-6">💵 แบ่งจ่าย (สด + โอน)</h3>
                
                <div class="grid grid-cols-2 gap-4 w-full mb-6 max-w-lg">
                    <div class="bg-white border-2 border-gray-200 p-4 rounded-2xl shadow-sm">
                        <div class="text-sm font-bold text-gray-500 mb-1">รับเงินสดมา</div>
                        <div class="text-4xl font-black text-gray-800">฿${safe(state.splitMixCash)}</div>
                    </div>
                    <div class="bg-orange-50 border-2 border-orange-200 p-4 rounded-2xl shadow-sm">
                        <div class="text-sm font-bold text-orange-600 mb-1">ยอดโอนส่วนที่เหลือ</div>
                        <div class="text-4xl font-black text-orange-700">฿${safe(state.splitMixTransfer)}</div>
                    </div>
                </div>
                
                <div class="bg-white border-4 border-orange-100 rounded-[2rem] p-6 relative w-full max-w-md shadow-inner">
                    <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-orange-500 text-white px-6 py-1.5 rounded-full font-bold text-sm shadow-md whitespace-nowrap">
                        สแกนชำระส่วนที่เหลือ
                    </div>
                    ${qrImgHtml}
                </div>
            </div>`;
    }
    else if (state.status === 'split_equal') {
        let qrImgHtml = state.splitEqQR ? `<img src="${state.splitEqQR}" class="w-56 h-56 mx-auto border-4 border-pink-100 p-2 rounded-2xl shadow-sm mt-4">` : '';
        
        // 🌟 ถ้ารับเงินสดมาเป็น 0 โค้ดส่วนนี้จะ "หายไป" ทันที ไม่แสดงให้รกตา
        let cashHtml = state.splitEqCash > 0 ? `
            <div class="mt-4 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold p-3 rounded-xl text-lg w-full max-w-xs mx-auto shadow-sm">
                💵 รับเงินสดมาแล้ว: ฿${safe(state.splitEqCash)}
            </div>` : '';

        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full px-4 flex flex-col items-center justify-center mt-2">
                <h3 class="text-3xl font-bold text-pink-700 mb-6">👥 หารบิล (จ่ายเท่ากัน)</h3>
                
                <div class="flex justify-center gap-4 w-full mb-6 max-w-md">
                    <div class="bg-white border-2 border-gray-100 px-6 py-4 rounded-2xl shadow-sm flex-1">
                        <span class="text-gray-500 font-bold block text-sm mb-1">จำนวนลูกค้า</span>
                        <span class="text-4xl font-black text-gray-800">${state.splitEqPeople} <span class="text-xl text-gray-500">คน</span></span>
                    </div>
                    <div class="bg-pink-50 border-2 border-pink-200 px-6 py-4 rounded-2xl shadow-sm flex-1">
                        <span class="text-pink-600 font-bold block text-sm mb-1">ยอดชำระ/คน</span>
                        <span class="text-4xl font-black text-pink-700">฿${safe(state.splitEqPerPerson)}</span>
                    </div>
                </div>

                <div class="bg-white border-4 border-pink-100 rounded-[2rem] p-6 relative w-full max-w-md shadow-inner">
                    <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-pink-600 text-white px-6 py-1.5 rounded-full font-bold text-sm shadow-md whitespace-nowrap">
                        คิวสแกนจ่ายคนที่ ${state.splitEqCurPerson} / ${state.splitEqPeople}
                    </div>
                    
                    ${qrImgHtml}
                    ${cashHtml}
                </div>
            </div>`;
    }
    else if (state.status === 'success_paid') {
        rightPanel.innerHTML = `
            <div class="text-center fade-in w-full">
                <div class="w-40 h-40 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-7xl mx-auto mb-6">✓</div>
                <h3 class="text-5xl font-black text-emerald-600">ชำระครบถ้วน</h3>
            </div>`;
    }
    else if (state.cart && state.cart.length > 0) {
        rightPanel.innerHTML = `
            <div class="text-center fade-in">
                <span class="text-8xl mb-6 block">✨</span>
                <h3 class="text-3xl font-bold text-gray-400">ตรวจสอบรายการอาหาร</h3>
            </div>`;
    }
    else {
        rightPanel.innerHTML = `
            <div id="idleState" class="text-center">
                <span class="text-8xl mb-6 block">✨</span>
                <h3 class="text-4xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
                <p class="text-gray-400 font-bold text-xl mt-2">เชิญเลือกสั่งรายการอาหารที่เคาน์เตอร์ได้เลยค่ะ</p>
            </div>`;
    }
}
    </script>
</body>
</html>
