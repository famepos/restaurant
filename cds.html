<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Customer Display | FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; overflow: hidden; margin: 0; background-color: #f3f4f6; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* อนิเมชั่นสลับภาพโฆษณาแบบนุ่มนวล */
    .fade-in { animation: fadeIn 1s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* อนิเมชั่นเด้งป๊อปอัป QR */
    .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn { 
        from { transform: scale(0.8); opacity: 0; } 
        to { transform: scale(1); opacity: 1; } 
    }
  </style>
</head>
<body class="h-screen w-screen flex flex-row">

  <!-- ================= ฝั่งซ้าย: สรุปรายการสั่งซื้อ (สไตล์ Ocha POS - สะอาดตา โปร่ง) ================= -->
  <div class="w-1/2 lg:w-5/12 h-full bg-white flex flex-col shadow-2xl z-20">
    
    <!-- Header รายการสั่งซื้อ -->
    <div class="p-6 border-b border-gray-100 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-4">
        <img src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-12 h-12 object-contain bg-pink-50 rounded-xl p-1">
        <div>
          <h1 class="text-2xl font-bold text-gray-800 leading-tight">รายการสั่งซื้อ</h1>
          <p class="text-sm text-gray-500">Order Summary</p>
        </div>
      </div>
      <div id="cdsStatusBadge" class="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-xs font-bold">รอรับออเดอร์</div>
    </div>

    <!-- รายการสินค้า (Cart Items) -->
    <div class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar bg-gray-50/30" id="cdsCartItems">
      <!-- กรณีว่างเปล่า -->
      <div class="h-full flex flex-col items-center justify-center text-gray-300">
        <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span class="text-xl font-medium">ยังไม่มีรายการสินค้า</span>
      </div>
    </div>

    <!-- ส่วนสรุปยอดเงินด้านล่าง -->
    <div class="bg-white p-6 shrink-0 border-t border-gray-100">
      <div class="flex justify-between text-gray-500 mb-2 font-medium text-lg">
        <span>ยอดรวม (Subtotal)</span>
        <span id="cdsSubTotal">฿0.00</span>
      </div>
      <div class="flex justify-between text-pink-500 mb-4 font-medium text-lg">
        <span>ส่วนลด (Discount)</span>
        <span id="cdsDiscount">-฿0.00</span>
      </div>
      <div class="flex justify-between items-end border-t border-dashed border-gray-200 pt-4 mt-2">
        <span class="text-xl font-bold text-gray-800">ยอดสุทธิ (Net Total)</span>
        <span id="cdsGrandTotal" class="text-5xl font-bold text-pink-600 tracking-tight">฿0.00</span>
      </div>
    </div>
  </div>

  <!-- ================= ฝั่งขวา: พื้นที่อเนกประสงค์ (โฆษณา หรือ QR Code) ================= -->
  <div class="w-1/2 lg:w-7/12 h-full relative bg-gray-100 flex flex-col">
    
    <!-- 1. โหมดโฆษณา (Ad Slider) -->
    <div id="adContainer" class="absolute inset-0 flex flex-col items-center justify-center overflow-hidden transition-opacity duration-500">
      <img id="adImage" src="https://i.postimg.cc/W3bYw9R9/2f597a3c-9e6d-473b-a13c-500c4835f076.png" class="w-full h-full object-cover">
      <div id="adText" class="absolute bottom-0 left-0 w-full text-center text-white text-3xl font-bold p-8 bg-gradient-to-t from-black/80 to-transparent"></div>
    </div>

    <!-- 2. โหมดชำระเงิน QR Code (จะมาแทนที่หน้าโฆษณาเมื่อกดโอนเงิน) -->
    <div id="qrContainer" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500 z-10">
      <div class="pop-in flex flex-col items-center">
        <div class="bg-blue-900 text-white px-6 py-2 rounded-full text-sm font-bold mb-6 tracking-wider">THAI QR PAYMENT</div>
        <h2 class="text-3xl font-bold text-gray-800 mb-2">สแกนเพื่อชำระเงิน</h2>
        <p class="text-gray-500 mb-8 text-lg">รองรับทุกแอปธนาคาร (Mobile Banking)</p>
        
        <!-- รูป QR -->
        <div class="bg-white p-4 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-gray-100 mb-8">
          <img id="cdsQrImage" src="" class="w-72 h-72 lg:w-96 lg:h-96 object-contain">
        </div>
        
        <div class="text-gray-500 mb-1 font-medium">ยอดชำระสุทธิ</div>
        <div id="cdsQrAmount" class="text-6xl font-bold text-pink-600">฿0.00</div>
      </div>
    </div>

    <!-- 3. โหมดชำระเงินสำเร็จ (Thank You) -->
    <div id="successContainer" class="hidden absolute inset-0 bg-pink-500 flex flex-col items-center justify-center p-8 text-center text-white transition-opacity duration-500 z-20">
      <div class="pop-in flex flex-col items-center">
        <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-8 shadow-lg">
          <svg class="w-20 h-20 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-5xl font-bold mb-4">ชำระเงินสำเร็จ</h2>
        <p class="text-2xl font-medium opacity-90">ขอบคุณที่ใช้บริการ โอกาสหน้าเชิญใหม่ค่ะ</p>
      </div>
    </div>

  </div>

  <script>
    // =========================================================================
    // 🔗 ลิงก์ API หลังบ้าน (Web App URL) สำหรับให้หน้าจอไอแพดคุยกับฐานข้อมูล
    // =========================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwoYiZEvKuN4u3DYy4T0xqcUscVwRAlCfDTHZRBVoBBsyUvJZvtLPnOXqKpd5n7Shh35g/exec";

    let adsList = [];
    let currentAdIndex = 0;
    let adTimer = null;
    let lastStateStr = "";

    // ฟังก์ชันตัวกลางสำหรับยิง Request ไปหา Google Apps Script
    async function fetchFromGAS(actionName, argsArray = []) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: actionName, args: argsArray }),
          redirect: "follow"
        });
        const data = await response.json();
        if(data.status === "Success") return data.result;
        return null;
      } catch (err) {
        console.error("Fetch API Error:", err);
        return null;
      }
    }

    // 1. ดึงข้อมูลโฆษณา
    async function loadAds() {
      const ads = await fetchFromGAS('getAdSettingsGS');
      if(ads && ads.length > 0) {
        adsList = ads;
        showNextAd();
      }
    }

    // สลับภาพโฆษณาวนไปเรื่อยๆ
    function showNextAd() {
      if(adsList.length === 0) return;
      
      let ad = adsList[currentAdIndex];
      let imgEl = document.getElementById('adImage');
      let txtEl = document.getElementById('adText');
      
      // รีเซ็ตคลาสเพื่อเล่นอนิเมชั่นใหม่
      imgEl.classList.remove('fade-in');
      void imgEl.offsetWidth; 
      
      imgEl.src = ad.existingUrl;
      imgEl.classList.add('fade-in');
      txtEl.innerText = ad.text || "";
      
      let durationMs = (ad.duration || 5) * 1000;
      currentAdIndex = (currentAdIndex + 1) % adsList.length;
      
      clearTimeout(adTimer);
      adTimer = setTimeout(showNextAd, durationMs);
    }

    // 2. ดึงสถานะปัจจุบันของตะกร้าสินค้าจากแคชเชียร์ (ทำซ้ำทุกๆ 1.5 วินาที)
    async function fetchCDSState() {
      const stateStr = await fetchFromGAS('getCDSStateGS');
      if(stateStr && stateStr !== lastStateStr) {
        lastStateStr = stateStr;
        try {
          let state = JSON.parse(stateStr);
          updateUI(state);
        } catch(e) { console.error("JSON Parse error:", e); }
      }
    }

    // 3. ควบคุมหน้าจอฝั่งขวา (Ads / QR / Success) และอัปเดตรายการฝั่งซ้าย
    function updateUI(state) {
      const adContainer = document.getElementById('adContainer');
      const qrContainer = document.getElementById('qrContainer');
      const successContainer = document.getElementById('successContainer');
      const cartItems = document.getElementById('cdsCartItems');
      const statusBadge = document.getElementById('cdsStatusBadge');

      // ----------------------------------------------------
      // จัดการรายการฝั่งซ้าย (Order List)
      // ----------------------------------------------------
      if (state.status === 'idle' || (!state.cart || state.cart.length === 0)) {
        cartItems.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-gray-300">
            <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span class="text-xl font-medium">ยังไม่มีรายการสินค้า</span>
          </div>`;
        document.getElementById('cdsSubTotal').innerText = "฿0.00";
        document.getElementById('cdsDiscount').innerText = "-฿0.00";
        document.getElementById('cdsGrandTotal').innerText = "฿0.00";
        statusBadge.innerText = "รอรับออเดอร์";
        statusBadge.className = "bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-xs font-bold";
      } else {
        let html = '';
        state.cart.forEach(item => {
          html += `
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
              <div class="flex-1 pr-4">
                <div class="text-lg font-bold text-gray-800">${item.name}</div>
                <div class="text-sm text-gray-500 font-medium mt-0.5">฿${parseFloat(item.price).toFixed(2)} x ${item.qty}</div>
              </div>
              <div class="text-xl font-bold text-gray-800 shrink-0">฿${parseFloat(item.total).toFixed(2)}</div>
            </div>
          `;
        });
        cartItems.innerHTML = html;
        document.getElementById('cdsSubTotal').innerText = "฿" + (state.subTotal || 0).toFixed(2);
        document.getElementById('cdsDiscount').innerText = "-฿" + ((state.discount || 0) + (state.pointDiscount || 0)).toFixed(2);
        document.getElementById('cdsGrandTotal').innerText = "฿" + (state.grandTotal || 0).toFixed(2);
        
        // บังคับเลื่อนลงล่างสุดอัตโนมัติ
        cartItems.scrollTop = cartItems.scrollHeight;
      }

      // ----------------------------------------------------
      // จัดการหน้าต่างฝั่งขวา (Ads / QR / Success)
      // ----------------------------------------------------
      if (state.status === 'qr_payment' && state.qrUrl) {
        // โหมดสแกนจ่าย: ซ่อนโฆษณา, โชว์ QR
        adContainer.classList.add('hidden');
        successContainer.classList.add('hidden');
        qrContainer.classList.remove('hidden');
        
        document.getElementById('cdsQrImage').src = state.qrUrl;
        document.getElementById('cdsQrAmount').innerText = "฿" + (state.grandTotal || 0).toFixed(2);
        
        statusBadge.innerText = "รอชำระเงิน";
        statusBadge.className = "bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold";

      } else if (state.status === 'success') {
        // โหมดชำระเงินสำเร็จ: โชว์หน้า Thank you
        adContainer.classList.add('hidden');
        qrContainer.classList.add('hidden');
        successContainer.classList.remove('hidden');
        
        statusBadge.innerText = "ชำระเงินสำเร็จ";
        statusBadge.className = "bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold";

      } else {
        // โหมดปกติ / พักบิล: โชว์ภาพโฆษณา
        qrContainer.classList.add('hidden');
        successContainer.classList.add('hidden');
        adContainer.classList.remove('hidden');
        
        if (state.status === 'active') {
            statusBadge.innerText = "กำลังทำรายการ";
            statusBadge.className = "bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-bold";
        }
      }
    }

    // เริ่มการทำงาน
    window.onload = function() {
      loadAds();
      setInterval(fetchCDSState, 1500); // วนลูปถามข้อมูลทุกๆ 1.5 วินาที
    };
  </script>
</body>
</html>
