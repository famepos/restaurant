<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamePOS Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7cbdc; margin: 0; height: 100vh; width: 100vw; overflow: hidden; }
        .main-box { background-color: white; height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="main-box p-4 gap-4">
        <!-- ฝั่งซ้าย: รายการสินค้า -->
        <section class="w-[55%] flex flex-col p-6 overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-3xl font-black text-pink-700">FamePOS</h1>
                <div id="lblDateTime" class="text-sm font-bold text-gray-400">00:00:00</div>
            </div>
            
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <!-- ข้อมูลจะรอโหลดจากแคชเชียร์เท่านั้น -->
            </div>

            <!-- สรุปท้ายบิล (จะโชว์เมื่อมีสินค้า) -->
            <div id="summaryFooter" class="hidden border-t border-gray-100 pt-4 space-y-2 text-sm font-bold text-gray-500">
                <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="txtSubTotal">0.00</span></div>
                <div class="flex justify-between"><span>ภาษี/ค่าบริการ</span><span id="txtTaxService">0.00</span></div>
                <div class="flex justify-between text-2xl font-black text-pink-600 border-t pt-2">
                    <span>ยอดรวมทั้งสิ้น</span>
                    <span><span id="txtGrandTotal">0.00</span> บาท</span>
                </div>
            </div>
        </section>

        <!-- ฝั่งขวา: พื้นที่ว่างรอการโต้ตอบ -->
        <section id="rightPanel" class="w-[45%] flex flex-col justify-center items-center bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
            <!-- สถานะรอรับข้อมูล -->
            <div id="idleState" class="text-center">
                <div class="text-8xl mb-4">✨</div>
                <h3 class="text-3xl font-bold text-gray-400">ยินดีต้อนรับ</h3>
                <p class="text-gray-400 font-medium">รอรายการอาหารจากหน้าแคชเชียร์...</p>
            </div>
            
            <!-- สถานะมีสินค้า (จะถูกแสดงแทนที่ idleState) -->
            <div id="activeState" class="hidden w-full h-full p-6 flex flex-col justify-center items-center">
                <!-- ตรงนี้จะถูกเติม QR หรือสถานะการชำระเงินโดยอัตโนมัติ -->
            </div>
        </section>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaXqbOFGMQltGnk-oLbKbyA65NxXGK3T4QeOog9bLTcGpIiGmQsWQOsG8N4yj8BNUpQQ/exec";

    // 🚀 ระบบ Proxy
    const google = {
        script: { get run() { 
            const proxy = new Proxy({}, { get: (target, prop) => (...args) => {
                fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: prop, args: args }), redirect: "follow" })
                .then(res => res.json()).then(data => { if(data.status === "Success" && window.successCb) window.successCb(data.result); });
            }});
            return proxy;
        }}
    };
    window.successCb = null;
    google.script.run.withSuccessHandler = (cb) => { window.successCb = cb; return google.script.run; };

    setInterval(() => {
        document.getElementById('lblDateTime').innerText = new Date().toLocaleTimeString('th-TH');
        google.script.run.getCDSStateGS();
    }, 1000);

    function updateUI(state) {
        if(!state) return;
        
        // 1. จัดการฝั่งซ้าย
        const cartCont = document.getElementById('cartItemsContainer');
        const summaryFooter = document.getElementById('summaryFooter');
        
        if(state.cart && state.cart.length > 0) {
            let html = '';
            state.cart.forEach(item => {
                html += `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100 fade-in">
                    <div class="font-bold text-gray-800 text-lg">${item.name}</div>
                    <div class="flex gap-6 font-bold text-gray-500">
                        <span>x${item.qty}</span>
                        <span class="text-pink-600">฿${parseFloat(item.total).toFixed(2)}</span>
                    </div>
                </div>`;
            });
            cartCont.innerHTML = html;
            summaryFooter.classList.remove('hidden');
            document.getElementById('txtSubTotal').innerText = (state.subTotal || 0).toFixed(2);
            document.getElementById('txtGrandTotal').innerText = (state.grandTotal || 0).toFixed(2);
        } else {
            cartCont.innerHTML = '';
            summaryFooter.classList.add('hidden');
        }

        // 2. จัดการฝั่งขวา (อัปเดตตามสถานะแคชเชียร์)
        const idle = document.getElementById('idleState');
        const active = document.getElementById('activeState');
        
        if (state.status !== 'idle' && state.cart && state.cart.length > 0) {
            idle.classList.add('hidden');
            active.classList.remove('hidden');
            // ตรงนี้คุณใส่ logic แสดง QR หรือสถานะชำระเงินตาม mode ได้เลย
        } else {
            idle.classList.remove('hidden');
            active.classList.add('hidden');
        }
    }
</script>
</body>
</html>
